# Step.2 - Manage UpdateRing Tags
# This pipeline creates or updates UpdateRing tags on Azure Local clusters from a CSV file
#
# WORKFLOW:
#   1. Run the "Inventory Azure Local Clusters" pipeline first
#   2. Download the CSV artifact from that pipeline run
#   3. Edit the CSV in Excel - populate the 'UpdateRing' column with values (e.g., Wave1, Wave2, Production)
#   4. Commit the edited CSV to your repository (e.g., to a 'config/' folder)
#   5. Run this pipeline and specify the path to your committed CSV file
#
# NOTE: Azure DevOps does not support file uploads as pipeline parameters.
#       The edited CSV must be committed to the repository first.

# BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
# Add or modify `schedules:` blocks here to enable cron-driven runs. Content
# between BEGIN/END markers is preserved by Update-AzLocalPipelineExample
# across module upgrades.
trigger: none
# END-AZLOCAL-CUSTOMIZE:schedule-triggers

parameters:
  - name: csvFilePath
    displayName: 'Path to edited CSV file in repository (e.g., config/ClusterUpdateRings.csv)'
    type: string
    default: 'config/ClusterUpdateRings.csv'
  
  - name: forceOverwrite
    displayName: 'Force overwrite existing UpdateRing tags'
    type: boolean
    default: false
  
  - name: dryRun
    displayName: 'Preview changes without applying (WhatIf mode)'
    type: boolean
    default: true

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  - name: GENERATED_AGAINST_MODULE_VERSION
    value: '0.7.84'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  - name: REQUIRED_MODULE_VERSION
    value: '${{ parameters.moduleVersion }}'

pool:
  vmImage: 'windows-latest'

stages:
  - stage: ManageTags
    displayName: 'Manage UpdateRing Tags'
    jobs:
      - job: ApplyTags
        displayName: 'Apply UpdateRing Tags'
        
        steps:
          - checkout: self
            displayName: 'Checkout Repository'
          
          - task: PowerShell@2
            displayName: 'Validate CSV File Exists'
            inputs:
              targetType: 'inline'
              script: |
                $csvPath = Join-Path "$(System.DefaultWorkingDirectory)" "${{ parameters.csvFilePath }}"
                
                if (-not (Test-Path $csvPath)) {
                    Write-Host "##vso[task.logissue type=error]CSV file not found: ${{ parameters.csvFilePath }}"
                    Write-Host ""
                    Write-Host "===========================================================================" -ForegroundColor Yellow
                    Write-Host " UpdateRing tagging is a TWO-STAGE pipeline. You must run the inventory" -ForegroundColor Yellow
                    Write-Host " pipeline first, edit the CSV, commit it, then re-run THIS pipeline." -ForegroundColor Yellow
                    Write-Host "===========================================================================" -ForegroundColor Yellow
                    Write-Host ""
                    Write-Host "STEP 1 - Generate the cluster inventory (one-off, then on demand)" -ForegroundColor Cyan
                    Write-Host "  a. Open Azure DevOps Pipelines in this project."
                    Write-Host "  b. Run the pipeline named 'Inventory Azure Local Clusters'"
                    Write-Host "     (file: azure-pipelines/Step.1_inventory-clusters.yml or similar)."
                    Write-Host "  c. Wait for the run to finish successfully."
                    Write-Host "  d. On the completed run summary, open the published artifact"
                    Write-Host "     named 'cluster-inventory' and download it."
                    Write-Host "  e. Extract it locally. You will get 'ClusterUpdateRings.csv' (the"
                    Write-Host "     one to edit), a timestamped audit copy, a .json copy, and a"
                    Write-Host "     'README_Instructions.txt' file that mirrors these instructions."
                    Write-Host ""
                    Write-Host "STEP 2 - Edit the CSV in Excel" -ForegroundColor Cyan
                    Write-Host "  a. Open 'ClusterUpdateRings.csv' in Excel."
                    Write-Host "  b. For each cluster row, fill in the 'UpdateRing' column with the wave"
                    Write-Host "     name you want that cluster to belong to. Examples:"
                    Write-Host "       Canary, Pilot, Production"
                    Write-Host "       (or your own scheme, e.g. Wave1, Wave2, Wave3 / Dev, Test, Prod)."
                    Write-Host "  c. Leave the 'UpdateRing' column EMPTY for any cluster you do not want"
                    Write-Host "     this run to tag - those rows will be skipped."
                    Write-Host "  d. Save as CSV (UTF-8). Do not change other columns or column order."
                    Write-Host "  e. Do NOT rename the file - keep it as 'ClusterUpdateRings.csv' so"
                    Write-Host "     the default 'csvFilePath' below picks it up."
                    Write-Host ""
                    Write-Host "STEP 3 - Commit the edited CSV to this repository" -ForegroundColor Cyan
                    Write-Host "  a. Copy the edited CSV into a stable location in this repo, for example:"
                    Write-Host "       config/ClusterUpdateRings.csv"
                    Write-Host "  b. Commit and push it (PR review optional but recommended)."
                    Write-Host "  c. The path you commit it to is what you will pass as 'csvFilePath'"
                    Write-Host "     on the next run of this pipeline."
                    Write-Host ""
                    Write-Host "STEP 4 - Re-run THIS pipeline ('Manage UpdateRing Tags')" -ForegroundColor Cyan
                    Write-Host "  a. Click 'Run pipeline' on this pipeline."
                    Write-Host "  b. Set 'csvFilePath' to the path you committed in step 3"
                    Write-Host "     (default is 'config/ClusterUpdateRings.csv')."
                    Write-Host "  c. RECOMMENDED FIRST RUN: leave 'dryRun' = true to preview which tags"
                    Write-Host "     would be set/changed, without modifying any Azure resources."
                    Write-Host "  d. Once the preview looks correct, re-run with 'dryRun' = false to"
                    Write-Host "     apply the tags. Use 'force' = true only if you need to overwrite"
                    Write-Host "     existing UpdateRing values already set on a cluster."
                    Write-Host ""
                    Write-Host "Documentation:" -ForegroundColor Yellow
                    Write-Host "  AzLocal.UpdateManagement/README.md - 'Update Rings' section"
                    Write-Host "  AzLocal.UpdateManagement/Automation-Pipeline-Examples/README.md"
                    Write-Host ""
                    Write-Host "The path you supplied ('${{ parameters.csvFilePath }}') does not exist" -ForegroundColor Red
                    Write-Host "in the checked-out branch of this repository. Did you forget to commit" -ForegroundColor Red
                    Write-Host "the CSV, point at the wrong branch on 'Run pipeline', or mistype it?" -ForegroundColor Red
                    exit 1
                }
                
                Write-Host "Found CSV file: $csvPath"
                Write-Host "##vso[task.setvariable variable=CsvPath]$csvPath"
          
          - task: PowerShell@2
            displayName: 'Validate CSV File'
            inputs:
              targetType: 'inline'
              script: |
                $csvPath = "$(CsvPath)"
                $data = Import-Csv $csvPath
                
                Write-Host "CSV File: $csvPath"
                Write-Host "Total Rows: $($data.Count)"
                
                # Check required columns
                $requiredColumns = @('ResourceId', 'UpdateRing')
                $columns = $data[0].PSObject.Properties.Name
                
                foreach ($col in $requiredColumns) {
                    if ($col -notin $columns) {
                        Write-Error "Required column '$col' not found in CSV"
                        exit 1
                    }
                }
                
                # Count rows with UpdateRing values
                $rowsWithValues = ($data | Where-Object { $_.UpdateRing -and $_.UpdateRing.Trim() -ne '' }).Count
                Write-Host "Rows with UpdateRing values: $rowsWithValues"
                
                if ($rowsWithValues -eq 0) {
                    Write-Error "No rows have UpdateRing values set. Please edit the CSV and set UpdateRing values before running this pipeline."
                    exit 1
                }
          
          - task: PowerShell@2
            displayName: 'Install AzLocal.UpdateManagement from PSGallery'
            env:
              REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
              GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                $ErrorActionPreference = 'Stop'
                $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
                if ($env:REQUIRED_MODULE_VERSION) {
                    $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
                    Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
                } else {
                    Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
                }
                Install-Module @installArgs
                Import-Module AzLocal.UpdateManagement -Force
                $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
                $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
                $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
                Write-Host ""
                Write-Host "Module version summary"
                Write-Host "  Installed on agent        : $installed"
                Write-Host "  YAML generated against    : $generated"
                Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
                Write-Host ""
                Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
                # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
                if ($installed -lt $generated) {
                    Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$installed is OLDER than the version this pipeline YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Platform AzureDevOps -Update'."
                }
                if ($installed -gt $generated) {
                    $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
                if ($latest -and ($latest -gt $installed)) {
                    $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
          
          - task: AzureCLI@2
            displayName: 'Apply UpdateRing Tags'
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Import-Module AzLocal.UpdateManagement -Force
                
                $csvPath = "$(CsvPath)"
                $forceOverwrite = [System.Convert]::ToBoolean("${{ parameters.forceOverwrite }}")
                $dryRun = [System.Convert]::ToBoolean("${{ parameters.dryRun }}")
                
                # Create output directory for logs
                $outputDir = "$(Build.ArtifactStagingDirectory)"
                
                # Build parameters
                $params = @{
                    InputCsvPath = $csvPath
                    LogFolderPath = $outputDir
                }
                
                if ($forceOverwrite) {
                    $params['Force'] = $true
                    Write-Host "Force mode enabled - will overwrite existing tags"
                }
                
                if ($dryRun) {
                    $params['WhatIf'] = $true
                    Write-Host "##vso[task.logissue type=warning]DRY RUN MODE - No changes will be applied"
                }
                
                Write-Host ""
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Applying UpdateRing Tags" -ForegroundColor Cyan
                Write-Host "========================================" -ForegroundColor Cyan
                
                # Run tag management
                Set-AzLocalClusterUpdateRingTag @params
                
                Write-Host ""
                Write-Host "Tag management complete"
          
          # compute a UTC timestamp variable so every downloadable artifact name is unique per run.
          - pwsh: |
              $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
              Write-Host "##vso[task.setvariable variable=artifactStamp;isOutput=true]$stamp"
              Write-Host "Artifact timestamp: $stamp"
            displayName: 'Compute Artifact Timestamp'
            condition: always()
            name: stamp

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Log Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'azlocal-updatering-tag-logs_$(stamp.artifactStamp)'
              publishLocation: 'Container'
          
          - task: PowerShell@2
            displayName: 'Generate Summary'
            inputs:
              targetType: 'inline'
              script: |
                $dryRun = [System.Convert]::ToBoolean("${{ parameters.dryRun }}")
                $forceOverwrite = [System.Convert]::ToBoolean("${{ parameters.forceOverwrite }}")
                
                $summary = @"
                # UpdateRing Tag Management Summary
                
                | Setting | Value |
                |---------|-------|
                | Dry Run | $dryRun |
                | Force Overwrite | $forceOverwrite |
                "@
                
                if ($dryRun) {
                    $summary += "`n`n**This was a dry run. No changes were applied.**"
                    $summary += "`n`nRe-run the pipeline with 'Preview changes' set to false to apply changes."
                }
                
                $summary | Out-File "$(Build.ArtifactStagingDirectory)/summary.md" -Encoding UTF8
                Write-Host "##vso[task.uploadsummary]$(Build.ArtifactStagingDirectory)/summary.md"

