# Step.3 - Apply-Updates Schedule Coverage Audit Pipeline
# This pipeline runs the read-only Test-AzLocalApplyUpdatesScheduleCoverage advisor
# weekly to detect drift between the cron schedule(s) in your apply-updates pipeline
# YAML and the UpdateWindow tags that operators have placed on Azure Local clusters.
#
# WHY THIS PIPELINE EXISTS
# ------------------------
# Step.6_apply-updates.yml ships with NO default schedule (trigger:none) on purpose, so
# customers must consciously choose when updates fire. After you have configured
# UpdateWindow tags on your clusters and added cron entries to Step.6_apply-updates.yml, this
# pipeline is the safety net that catches:
#   - a new ring tagged with UpdateWindow that no cron in Step.6_apply-updates.yml will reach
#   - an UpdateWindow tag value that fails to parse (typo / wrong syntax)
#   - Step.6_apply-updates.yml cron entries that the advisor cannot reason about
#     (DayOfMonth restrictions, step values) so you can audit them manually
#
# REPORTS GENERATED:
# - Pipeline run summary (uploaded via ##vso[task.uploadsummary]): Audit + Recommend views
# - JUnit XML: published to the Test Results tab. One <testcase> per (UpdateRing,
#   UpdateWindow) pair; uncovered pairs become <failure>.
# - CSV: schedule-coverage-audit.csv + schedule-coverage-matrix.csv
# - Markdown: schedule-coverage-recommend.md with the ready-to-paste cron block
#
# AUTHENTICATION:
# Uses Workload Identity Federation (OIDC) - recommended for secretless authentication.

# BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
# Edits inside this block are preserved across Update-AzLocalPipelineExample
# module upgrades. Add or modify `schedules:` blocks below.
trigger: none  # Manual or scheduled only

schedules:
  # Weekly on Monday at 05:00 UTC - well before any common Saturday/Sunday or weekday
  # evening update window so a coverage drift report lands in the inbox before the
  # next scheduled apply-updates run.
  - cron: '0 5 * * 1'
    displayName: 'Weekly Apply-Updates Schedule Coverage Audit'
    branches:
      include:
        - main
    always: true
# END-AZLOCAL-CUSTOMIZE:schedule-triggers

parameters:
  - name: pipelinePath
    displayName: 'Path (file or folder) to Step.6_apply-updates.yml to audit, repo-relative. Leave empty to audit ONLY the schedulePath (schedule file). Default `.azure-pipelines` matches the standard Azure DevOps consumer layout; for repos that keep Step.6_apply-updates.yml at the repo root pass `.`'
    type: string
    default: '.azure-pipelines'

  - name: schedulePath
    displayName: 'Path to apply-updates-schedule.yml. When set, the audit also reports RingMissingFromSchedule (fleet ring with no schedule row) and RingOrphanedInSchedule (schedule ring no cluster carries). Leave empty to skip the schedule-file two-way diff.'
    type: string
    default: './apply-updates-schedule.yml'

  - name: leadTimeMinutes
    displayName: 'Minutes before UpdateWindow opens that the pipeline should fire (0-60)'
    type: number
    default: 5

  - name: includeUntagged
    displayName: 'Surface clusters with no UpdateWindow tag as their own row'
    type: boolean
    default: true

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

  - name: debug
    displayName: 'Enable verbose/debug PowerShell streams for self-service triage. Surfaces $VerbosePreference=Continue, $DebugPreference=Continue, plus a one-shot environment snapshot before the audit runs.'
    type: boolean
    default: false

variables:
  GENERATED_AGAINST_MODULE_VERSION: '0.7.89'
  REQUIRED_MODULE_VERSION: '${{ parameters.moduleVersion }}'
  reportsPath: '$(Build.ArtifactStagingDirectory)/reports'

stages:
- stage: ScheduleCoverage
  displayName: 'Audit Apply-Updates Schedule Coverage'
  jobs:
  - job: Audit
    displayName: 'Run Schedule Coverage Advisor'
    pool:
      vmImage: 'windows-latest'

    steps:
    - checkout: self
      displayName: 'Checkout repository'

    - task: PowerShell@2
      displayName: 'Install AzLocal.UpdateManagement from PSGallery'
      env:
        REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
        GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = 'Stop'
          $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
          if ($env:REQUIRED_MODULE_VERSION) {
              $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
              Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
          } else {
              Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
          }
          Install-Module @installArgs
          Import-Module AzLocal.UpdateManagement -Force
          $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
          $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
          $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
          Write-Host ""
          Write-Host "Module version summary"
          Write-Host "  Installed on agent        : $installed"
          Write-Host "  YAML generated against    : $generated"
          Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
          # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
          if ($installed -lt $generated) {
              Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$installed is OLDER than the version this pipeline YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Platform AzureDevOps -Update'."
          }
          if ($installed -gt $generated) {
              Write-Host "##vso[task.logissue type=warning]Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Refresh via 'Copy-AzLocalPipelineExample -Platform AzureDevOps -Update'."
          }
          if ($latest -and ($latest -gt $installed)) {
              Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed."
          }

    - task: AzureCLI@2
      displayName: 'Run Schedule Coverage Audit'
      name: audit
      inputs:
        # Replace with your service connection name
        azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Stop'
          az extension add --name resource-graph --yes
          Import-Module AzLocal.UpdateManagement -Force

          $outputDir = "$(reportsPath)"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $pipelinePath = "${{ parameters.pipelinePath }}"
          $schedulePath = "${{ parameters.schedulePath }}"
          $leadTime     = [int]"${{ parameters.leadTimeMinutes }}"
          $includeUnt   = ${{ lower(parameters.includeUntagged) }}
          $debug        = ('${{ parameters.debug }}' -ieq 'true')

          # Debug toggle: flips Verbose/Debug preferences and emits a
          # one-shot environment snapshot so operators can self-triage without
          # needing a code change. Default OFF to keep normal runs concise. Note:
          # Azure DevOps also honours queue-time variable system.debug=true as a
          # built-in mechanism; either flips on detailed agent logging.
          if ($debug) {
              $VerbosePreference = 'Continue'
              $DebugPreference   = 'Continue'
              Write-Host "##[group]Debug environment"
              Write-Host "PSVersion                : $($PSVersionTable.PSVersion)"
              Write-Host "PSEdition                : $($PSVersionTable.PSEdition)"
              Write-Host "OS                       : $($PSVersionTable.OS)"
              $mod = Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1
              Write-Host "AzLocal.UpdateManagement : v$($mod.Version) (path: $($mod.Path))"
              Write-Host "VerbosePreference        : $VerbosePreference"
              Write-Host "DebugPreference          : $DebugPreference"
              Write-Host "##[endgroup]"
          }

          # pipelinePath is OPTIONAL when schedulePath is set. The audit
          # cmdlet requires at least one of -PipelineYamlPath / -SchedulePath; if
          # both are blank, fall through to the original pipeline-yaml-only check
          # to keep the original error message.
          $havePipeline = -not [string]::IsNullOrWhiteSpace($pipelinePath)
          $haveSchedule = -not [string]::IsNullOrWhiteSpace($schedulePath) -and (Test-Path -LiteralPath $schedulePath)
          if ($haveSchedule -and -not $havePipeline) {
              Write-Host "PipelineYamlPath is empty - auditing schedule file only ('$schedulePath')"
              $pipelinePath = $null
              $havePipeline = $false
          }
          elseif ($havePipeline -and -not (Test-Path -LiteralPath $pipelinePath)) {
              $candidates = @('.azure-pipelines', 'pipelines', '.github/workflows', '.') | Where-Object { Test-Path -LiteralPath $_ }
              $hint = if ($candidates) { "Common locations that DO exist in this repo: $($candidates -join ', '). Re-queue the pipeline and override the 'pipelinePath' parameter." } else { "No common pipeline folders (.azure-pipelines, pipelines, .github/workflows, repo root) were found - commit your Step.6_apply-updates.yml first, or set 'pipelinePath' to wherever you keep it." }
              throw "PipelineYamlPath '$pipelinePath' does not exist on the agent. $hint"
          }

          Write-Host "========================================"
          Write-Host "Apply-Updates Schedule Coverage Audit"
          Write-Host "========================================"
          Write-Host "PipelineYamlPath : $(if ($pipelinePath) { $pipelinePath } else { '(skipped - pipelinePath empty)' })"
          Write-Host "SchedulePath     : $(if ($haveSchedule) { $schedulePath } else { '(skipped - schedulePath empty or file missing)' })"
          Write-Host "LeadTimeMinutes  : $leadTime"
          Write-Host "IncludeUntagged  : $includeUnt"
          Write-Host ""

          $auditCsv  = Join-Path $outputDir 'schedule-coverage-audit.csv'
          $recoMd    = Join-Path $outputDir 'schedule-coverage-recommend.md'
          $matrixCsv = Join-Path $outputDir 'schedule-coverage-matrix.csv'

          # v0.7.74: pin -Platform AzureDevOps so the Recommend snippet ONLY
          # emits the ADO `schedules:` block (not the GitHub Actions `schedule:`
          # block, which would be irrelevant noise in an ADO pipeline summary).
          # The cmdlet's default is 'Both' (intentional for ad-hoc operator use),
          # so the pipeline yml has to specify which platform it's running on.
          $auditArgs = @{
              View             = 'Audit'
              LeadTimeMinutes  = $leadTime
              ExportPath       = $auditCsv
              Platform         = 'AzureDevOps'
              PassThru         = $true
          }
          if ($havePipeline) { $auditArgs.PipelineYamlPath = $pipelinePath }
          if ($haveSchedule) { $auditArgs.SchedulePath     = $schedulePath }
          if ($includeUnt)   { $auditArgs.IncludeUntagged  = $true }
          $auditResult = Test-AzLocalApplyUpdatesScheduleCoverage @auditArgs
          if (-not $auditResult) { $auditResult = @() }

          Test-AzLocalApplyUpdatesScheduleCoverage -View Matrix -LeadTimeMinutes $leadTime -ExportPath $matrixCsv | Out-Null
          Test-AzLocalApplyUpdatesScheduleCoverage -View Recommend -LeadTimeMinutes $leadTime -Platform AzureDevOps -ExportPath $recoMd | Out-Null

          $covered     = @($auditResult | Where-Object Status -eq 'Covered')
          $uncovered   = @($auditResult | Where-Object Status -eq 'Uncovered')
          $partial     = @($auditResult | Where-Object Status -eq 'PartiallyCovered')
          $malformed   = @($auditResult | Where-Object Status -eq 'MalformedTag')
          $unparseable = @($auditResult | Where-Object Status -eq 'UnparseableCron')
          # schedule-file two-way diff buckets.
          $ringMissing = @($auditResult | Where-Object Status -eq 'RingMissingFromSchedule')
          $ringOrphan  = @($auditResult | Where-Object Status -eq 'RingOrphanedInSchedule')

          function Convert-XmlEscape([string]$s) {
              if ($null -eq $s) { return '' }
              ($s.Replace('&','&amp;').Replace('<','&lt;').Replace('>','&gt;').Replace('"','&quot;').Replace("'",'&apos;'))
          }
          function Write-Suite {
              param(
                  [System.Text.StringBuilder]$Sb,
                  [string]$SuiteName,
                  [object[]]$Rows,
                  [string]$EmptyPlaceholderName
              )
              $failures = @($Rows | Where-Object { $_.Status -ne 'Covered' }).Count
              [void]$Sb.AppendLine(("  <testsuite name=`"{0}`" tests=`"{1}`" failures=`"{2}`">" -f (Convert-XmlEscape $SuiteName), $Rows.Count, $failures))
              foreach ($row in $Rows) {
                  $tcName = ("{0} / {1}" -f $row.UpdateRing, ($(if ($row.UpdateWindow) { $row.UpdateWindow } else { '(no window)' })))
                  [void]$Sb.AppendLine(("    <testcase classname=`"ScheduleCoverage`" name=`"{0}`">" -f (Convert-XmlEscape $tcName)))
                  if ($row.Status -ne 'Covered') {
                      $issue = Convert-XmlEscape $row.Issue
                      $reco  = Convert-XmlEscape $row.Recommendation
                      [void]$Sb.AppendLine(("      <failure type=`"{0}`" message=`"{1}`">Recommendation: {2}{3}Cluster count: {4}</failure>" -f $row.Status, $issue, $reco, [Environment]::NewLine, $row.ClusterCount))
                  }
                  [void]$Sb.AppendLine('    </testcase>')
              }
              if ($Rows.Count -eq 0 -and $EmptyPlaceholderName) {
                  [void]$Sb.AppendLine(("    <testcase classname=`"ScheduleCoverage`" name=`"{0}`" />" -f (Convert-XmlEscape $EmptyPlaceholderName)))
              }
              [void]$Sb.AppendLine('  </testsuite>')
          }

          # two <testsuite> elements. Schedule (ring-file gap) FIRST -
          # higher blast radius; Cron coverage SECOND.
          $scheduleRows = @($auditResult | Where-Object { $_.Section -eq 'Schedule' })
          $cronRows     = @($auditResult | Where-Object { $_.Section -ne 'Schedule' })

          $xmlPath = Join-Path $outputDir 'schedule-coverage-audit.xml'
          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
          [void]$sb.AppendLine('<testsuites>')
          if ($haveSchedule -or $scheduleRows.Count -gt 0) {
              Write-Suite -Sb $sb `
                  -SuiteName 'Apply-Updates Schedule Coverage - Schedule (ring diff)' `
                  -Rows $scheduleRows `
                  -EmptyPlaceholderName 'Schedule and fleet ring sets match - no gaps.'
          }
          if ($cronRows.Count -gt 0 -or -not $haveSchedule) {
              Write-Suite -Sb $sb `
                  -SuiteName 'Apply-Updates Schedule Coverage - Cron coverage' `
                  -Rows $cronRows `
                  -EmptyPlaceholderName 'No tagged clusters found - nothing to audit'
          }
          [void]$sb.AppendLine('</testsuites>')
          [System.IO.File]::WriteAllText($xmlPath, $sb.ToString(), [System.Text.UTF8Encoding]::new($false))

          "##vso[task.setvariable variable=totalRows;isOutput=true]$($auditResult.Count)"      | Write-Host
          "##vso[task.setvariable variable=covered;isOutput=true]$($covered.Count)"             | Write-Host
          "##vso[task.setvariable variable=uncovered;isOutput=true]$($uncovered.Count)"         | Write-Host
          "##vso[task.setvariable variable=partial;isOutput=true]$($partial.Count)"             | Write-Host
          "##vso[task.setvariable variable=malformed;isOutput=true]$($malformed.Count)"         | Write-Host
          "##vso[task.setvariable variable=unparseable;isOutput=true]$($unparseable.Count)"     | Write-Host
          "##vso[task.setvariable variable=ringMissing;isOutput=true]$($ringMissing.Count)"     | Write-Host
          "##vso[task.setvariable variable=ringOrphan;isOutput=true]$($ringOrphan.Count)"       | Write-Host
          "##vso[task.setvariable variable=haveSchedule;isOutput=true]$([int]$haveSchedule)"    | Write-Host
          # v0.7.89: surface the schedule file path to the summary step
          # so it can re-load the schedule for the allow-list coverage
          # section (separate pwsh process - module + file have to be
          # re-loaded). Empty when -SchedulePath was not supplied.
          if ($haveSchedule) {
              "##vso[task.setvariable variable=schedulePath;isOutput=true]$schedulePath" | Write-Host
          }

          Write-Host ""
          Write-Host "Audit complete:"
          Write-Host "  Covered                  : $($covered.Count)"
          Write-Host "  Uncovered                : $($uncovered.Count)"
          Write-Host "  PartiallyCovered         : $($partial.Count)"
          Write-Host "  MalformedTag             : $($malformed.Count)"
          Write-Host "  UnparseableCron          : $($unparseable.Count)"
          Write-Host "  RingMissingFromSchedule  : $($ringMissing.Count)"
          Write-Host "  RingOrphanedInSchedule   : $($ringOrphan.Count)"

    # compute a UTC timestamp variable so every downloadable artifact name is unique per run.
    - pwsh: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        Write-Host "##vso[task.setvariable variable=artifactStamp;isOutput=true]$stamp"
        Write-Host "Artifact timestamp: $stamp"
      displayName: 'Compute Artifact Timestamp'
      condition: always()
      name: stamp

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Schedule Coverage Reports'
      condition: always()
      inputs:
        PathtoPublish: '$(reportsPath)'
        ArtifactName: 'azlocal-apply-updates-schedule-audit-report_$(stamp.artifactStamp)'
        publishLocation: 'Container'

    - pwsh: |
        $total       = "$(audit.totalRows)"
        $covered     = "$(audit.covered)"
        $uncovered   = "$(audit.uncovered)"
        $partial     = "$(audit.partial)"
        $malformed   = "$(audit.malformed)"
        $unparseable = "$(audit.unparseable)"
        $ringMissing = "$(audit.ringMissing)"
        $ringOrphan  = "$(audit.ringOrphan)"
        $haveSchedule = ("$(audit.haveSchedule)" -eq '1')
        $schedulePath = "$(audit.schedulePath)"

        Write-Host "##vso[task.uploadsummary]Schedule Coverage: $covered covered, $uncovered uncovered, $partial partial, $malformed malformed, $unparseable unparseable, $ringMissing missing-from-schedule, $ringOrphan orphan-in-schedule"

        $rowsPath = Join-Path '$(reportsPath)' 'schedule-coverage-audit.csv'
        $recoPath = Join-Path '$(reportsPath)' 'schedule-coverage-recommend.md'
        $rows = if (Test-Path $rowsPath) { @(Import-Csv -Path $rowsPath) } else { @() }
        $reco = if (Test-Path $recoPath) { Get-Content -Path $recoPath -Raw } else { '' }

        # when there is at least one issue row, surface the action-required
        # markdown at the TOP of the summary so operators can act without scrolling past
        # the detail table. The Recommend output now ships its own '## Action required - ...'
        # headings (one per kind of fix), numbered '(1 of N)' when more than one applies,
        # so we inline it as-is rather than wrapping it in our own code fence.
        $hasIssues = (([int]$uncovered) + ([int]$partial) + ([int]$malformed) + ([int]$unparseable) + ([int]$ringMissing) + ([int]$ringOrphan)) -gt 0

        $md = @"
        ## Apply-Updates Schedule Coverage Audit

        | Metric | Count |
        |--------|-------|
        | **(Ring, Window) pairs audited** | $total |
        | **Covered** | $covered |
        | **Uncovered** | $uncovered |
        | **PartiallyCovered** | $partial |
        | **MalformedTag** | $malformed |
        | **UnparseableCron** | $unparseable |
        | **RingMissingFromSchedule** | $ringMissing |
        | **RingOrphanedInSchedule** | $ringOrphan |

        "@

        if ($hasIssues -and $reco) {
            $md += "`n" + $reco + "`n"
        }

        # split Audit Detail into two sub-tables. Schedule rows
        # (RingMissingFromSchedule / RingOrphanedInSchedule) come FIRST -
        # higher blast radius because a missing-from-schedule ring means
        # apply-updates NEVER fires for those clusters. The Schedule
        # sub-table is rendered whenever -SchedulePath was supplied (so
        # operators see the "no gaps" confirmation) OR whenever any
        # Schedule-section rows are present (defensive fallback in case
        # $haveSchedule didn't make it across step scopes).
        $scheduleRowsMd = @($rows | Where-Object { $_.Section -eq 'Schedule' })
        $cronRowsMd     = @($rows | Where-Object { $_.Section -ne 'Schedule' })

        function Add-DetailTable {
            param([string]$Heading, [object[]]$DetailRows, [string]$EmptyText)
            $body = "`n$Heading`n"
            if ($DetailRows.Count -eq 0) {
                $body += "`n*$EmptyText*`n"
                return $body
            }
            $body += "`n| Status | UpdateRing | UpdateWindow | Clusters | Required Cron (UTC) | Recommendation |`n"
            $body += "|--------|------------|--------------|---------:|----------------------|----------------|`n"
            foreach ($r in ($DetailRows | Select-Object -First 100)) {
                $body += ('| {0} | {1} | {2} | {3} | {4} | {5} |' -f $r.Status, $r.UpdateRing, $r.UpdateWindow, $r.ClusterCount, $r.RequiredCronUTC, $r.Recommendation) + "`n"
            }
            if ($DetailRows.Count -gt 100) {
                $body += "`n*Showing first 100 of $($DetailRows.Count); see ``schedule-coverage-audit.csv`` artifact for the full list.*`n"
            }
            return $body
        }

        if ($haveSchedule -or $scheduleRowsMd.Count -gt 0) {
            $md += "`n### Audit Detail - Schedule (ring-file gap)`n"
            $md += "`n> **Higher blast radius.** A ``RingMissingFromSchedule`` row means apply-updates will NEVER fire on those clusters until you either add the ring to ``apply-updates-schedule.yml`` or retag them onto an existing scheduled ring.`n"
            $md += (Add-DetailTable -Heading '' -DetailRows $scheduleRowsMd -EmptyText 'Schedule and fleet ring sets match - no gaps.')
        }

        # v0.7.89: Allow-list coverage section. When -SchedulePath was
        # supplied, re-load the schedule file (the summary step is a
        # separate pwsh process so we have to import the module + read
        # the schedule here too) and surface the effective
        # 'allowedUpdateVersions' for each schedule row. For schema v1
        # we just nudge the operator to migrate. For schema v2 we
        # render a per-row table and recommend per-ring override
        # snippets for rows that inherit the top-level default. Wrapped
        # in try/catch so a malformed schedule never blocks the summary.
        if ($haveSchedule -and -not [string]::IsNullOrWhiteSpace($schedulePath) -and (Test-Path -LiteralPath $schedulePath)) {
            try {
                Import-Module AzLocal.UpdateManagement -Force -ErrorAction Stop
                $sched = Get-AzLocalApplyUpdatesScheduleConfig -Path $schedulePath -ErrorAction Stop
            } catch {
                $sched = $null
                $md += "`n### Allow-list coverage`n`n*Could not load schedule file ``$schedulePath`` for allow-list analysis: $($_.Exception.Message)*`n"
            }
            if ($sched) {
                $md += "`n### Allow-list coverage (schema v$($sched.SchemaVersion))`n"
                if ($sched.SchemaVersion -lt 2) {
                    $md += "`n*This schedule is on schema v1. Schema v2 adds ``allowedUpdateVersions`` for fleet-wide + per-ring update allow-lists (e.g. enforce a 'minimum updates' policy on Prod). Migrate the file with:*`n"
                    $md += "`n``````powershell`n"
                    $md += "Update-AzLocalApplyUpdatesScheduleConfig -Path '$schedulePath' -SchemaMigrate`n"
                    $md += "``````n"
                } else {
                    $topAllow = @($sched.AllowedUpdateVersions)
                    $topIsLatest = ($topAllow.Count -eq 1 -and $topAllow[0] -eq 'Latest')
                    if ($topIsLatest) {
                        $topLabel = "``Latest`` _(no constraint - install the latest Ready update on each cluster)_"
                    } else {
                        $topLabel = "``$($topAllow -join '; ')`` _(explicit allow-list - clusters only install matching updates)_"
                    }
                    $md += "`n**Top-level fleet default:** $topLabel`n"

                    $md += "`n| Row | weeksInCycle | daysOfWeek | rings | Effective allowedUpdateVersions |`n"
                    $md += "|----:|--------------|------------|-------|---------------------------------|`n"
                    $rowsMissingOverride = New-Object System.Collections.Generic.List[object]
                    $rowIdx = 0
                    foreach ($r in @($sched.Schedule)) {
                        $rowIdx++
                        $rowAllow = @()
                        if ($r.PSObject.Properties.Match('AllowedUpdateVersionsParsed').Count -and $r.AllowedUpdateVersionsParsed) {
                            $rowAllow = @($r.AllowedUpdateVersionsParsed)
                        }
                        if ($rowAllow.Count -gt 0) {
                            if ($rowAllow.Count -eq 1 -and $rowAllow[0] -eq 'Latest') {
                                $effLabel = "``Latest`` _(row override: no constraint)_"
                            } else {
                                $effLabel = "``$($rowAllow -join '; ')`` _(row override)_"
                            }
                        } else {
                            if ($topIsLatest) {
                                $effLabel = "``Latest`` _(inherits top-level - no constraint)_"
                            } else {
                                $effLabel = "``$($topAllow -join '; ')`` _(inherits top-level)_"
                            }
                            $rowsMissingOverride.Add([pscustomobject]@{
                                Row          = $rowIdx
                                WeeksInCycle = $r.weeksInCycle
                                DaysOfWeek   = $r.daysOfWeek
                                Rings        = $r.rings
                            })
                        }
                        $md += ('| {0} | {1} | {2} | {3} | {4} |' -f $rowIdx, $r.weeksInCycle, $r.daysOfWeek, $r.rings, $effLabel) + "`n"
                    }

                    if ($rowsMissingOverride.Count -gt 0) {
                        $md += "`n> **Tip - per-ring overrides.** Rows above without a row-level ``allowedUpdateVersions:`` inherit the top-level. To enforce a 'minimum updates' policy on a specific ring (e.g. keep Prod on the latest feature drop only - YY04 / YY10 - and skip cumulative updates), add a per-row override. Use ``Get-AzLocalUpdate -Status Ready`` (or the Azure portal -> Azure Local -> Updates) to find valid update names / version strings. Suggested edit sites for this schedule (first 3 inheriting rows):`n"
                        $md += "`n``````yaml`n"
                        foreach ($m in ($rowsMissingOverride | Select-Object -First 3)) {
                            $md += "# Row $($m.Row): rings='$($m.Rings)' weeksInCycle='$($m.WeeksInCycle)' daysOfWeek='$($m.DaysOfWeek)'`n"
                            $md += "#   allowedUpdateVersions: '10.2604.0.123;10.2610.0.456'`n"
                        }
                        $md += "``````n"
                        if ($rowsMissingOverride.Count -gt 3) {
                            $md += "`n*Showing first 3 of $($rowsMissingOverride.Count) rows that inherit the top-level allow-list.*`n"
                        }
                    } else {
                        $md += "`n*Every schedule row has an explicit ``allowedUpdateVersions:`` override - no inheritance from the top-level default.*`n"
                    }
                }
            }
        }

        $md += (Add-DetailTable -Heading '### Audit Detail - Cron coverage (Uncovered / Partial / Malformed first)' -DetailRows $cronRowsMd -EmptyText 'No tagged clusters found - nothing to audit.')

        # When there are no issues, still print the recommendation block at the bottom for
        # operators who want the canonical list as a reference. When there are issues we
        # already printed it at the top so skip the duplicate.
        if (-not $hasIssues -and $reco) {
            $md += "`n### Reference - Recommended schedule (copy into Step.6_apply-updates.yml)`n"
            $md += "`n" + $reco + "`n"
        }

        $summaryFile = Join-Path '$(reportsPath)' 'schedule-coverage-summary.md'
        $md | Out-File -FilePath $summaryFile -Encoding utf8
        Write-Host "##vso[task.uploadsummary]$summaryFile"
        Write-Host $md
      displayName: 'Display Schedule Coverage Summary'
      condition: always()

    - task: PublishTestResults@2
      displayName: 'Publish Schedule Coverage as Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(reportsPath)/schedule-coverage-audit.xml'
        testRunTitle: 'Apply-Updates Schedule Coverage - $(Build.BuildNumber)'
        mergeTestResults: false
        failTaskOnFailedTests: false

