# Apply Updates to Azure Local Clusters
# This pipeline applies updates to clusters filtered by UpdateRing tag value

trigger: none

parameters:
  - name: updateRing
    displayName: 'UpdateRing tag value to target'
    type: string
    default: 'Wave1'
    values:
      - Wave1
      - Wave2
      - Wave3
      - Pilot
      - Production
  
  - name: updateName
    displayName: 'Specific update version (leave empty for latest ready update)'
    type: string
    default: ''
  
  - name: dryRun
    displayName: 'Preview which clusters would be updated (WhatIf mode)'
    type: boolean
    default: true

  - name: throttleLimit
    displayName: 'Parallel per-cluster ARM calls (v0.7.0). Default 4, range 1-16.'
    type: number
    default: 4

  # --- ITSM Connector (v0.7.4 Phase 1: ServiceNow) ---
  # Opt-in ticket creation. Defaults preserve the previous pipeline behaviour
  # (no ITSM calls). Secrets are wired via the variable group referenced below
  # in the Raise ITSM tickets step (`env:`), never on the PowerShell command line.
  - name: raiseItsmTicket
    displayName: 'Open ITSM tickets (ServiceNow) for clusters needing manual action'
    type: boolean
    default: false

  - name: itsmConfigPath
    displayName: 'Path to ITSM matrix config (YAML or JSON)'
    type: string
    default: './.itsm/azurelocal-itsm.yml'

  - name: itsmDryRun
    displayName: 'ITSM: build payloads + run read-only dedupe but do NOT create tickets'
    type: boolean
    default: false

  - name: itsmForceCreate
    displayName: 'ITSM: bypass dedupe and always create new tickets (use with caution)'
    type: boolean
    default: false

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  - name: GENERATED_AGAINST_MODULE_VERSION
    value: '0.7.62'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  - name: REQUIRED_MODULE_VERSION
    value: '${{ parameters.moduleVersion }}'
  # ITSM connector (v0.7.4 Phase 1). Uncomment the group reference once you
  # have created a variable group named 'AzureLocal-ITSM-Secrets' containing:
  #   ITSM_SN_INSTANCE_URL, ITSM_SN_CLIENT_ID, ITSM_SN_CLIENT_SECRET
  # When raiseItsmTicket=false the Raise ITSM step is skipped and these
  # variables are not required.
  # - group: AzureLocal-ITSM-Secrets

pool:
  vmImage: 'windows-latest'

stages:
  # Stage 1: Check Readiness
  - stage: CheckReadiness
    displayName: 'Check Update Readiness'
    jobs:
      - job: ReadinessCheck
        displayName: 'Assess Cluster Readiness'
        
        steps:
          - checkout: self
            displayName: 'Checkout Repository'
          
          - task: AzureCLI@2
            displayName: 'Install Resource Graph Extension'
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az extension add --name resource-graph --yes
          
          - task: PowerShell@2
            displayName: 'Install AzLocal.UpdateManagement from PSGallery'
            env:
              REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
              GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                $ErrorActionPreference = 'Stop'
                $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
                if ($env:REQUIRED_MODULE_VERSION) {
                    $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
                    Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
                } else {
                    Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
                }
                Install-Module @installArgs
                Import-Module AzLocal.UpdateManagement -Force
                $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
                $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
                $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
                Write-Host ""
                Write-Host "Module version summary"
                Write-Host "  Installed on agent        : $installed"
                Write-Host "  YAML generated against    : $generated"
                Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
                Write-Host ""
                Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
                if ($installed -gt $generated) {
                    $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
                if ($latest -and ($latest -gt $installed)) {
                    $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
          
          - task: AzureCLI@2
            displayName: 'Check Cluster Readiness'
            name: readiness
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Import-Module AzLocal.UpdateManagement -Force
                
                $updateRing = "${{ parameters.updateRing }}"
                $throttle = [int]"${{ parameters.throttleLimit }}"; if ($throttle -lt 1) { $throttle = 4 }
                
                Write-Host "Checking readiness for clusters with UpdateRing = '$updateRing' (ThrottleLimit=$throttle)"
                
                # Create output directory
                $outputDir = "$(Build.ArtifactStagingDirectory)"
                $csvPath = Join-Path $outputDir "readiness-report.csv"
                
                # Run readiness check
                $results = Get-AzureLocalClusterUpdateReadiness `
                    -ScopeByUpdateRingTag `
                    -UpdateRingValue $updateRing `
                    -ThrottleLimit $throttle `
                    -ExportPath $csvPath `
                    -PassThru
                
                $totalCount = $results.Count
                $readyCount = ($results | Where-Object { $_.ReadyForUpdate -eq $true }).Count
                $notReadyCount = $totalCount - $readyCount
                
                Write-Host ""
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Readiness Summary" -ForegroundColor Cyan
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Total Clusters: $totalCount"
                Write-Host "Ready for Update: $readyCount"
                Write-Host "Not Ready: $notReadyCount"
                
                # Set output variables
                Write-Host "##vso[task.setvariable variable=TotalCount;isOutput=true]$totalCount"
                Write-Host "##vso[task.setvariable variable=ReadyCount;isOutput=true]$readyCount"
                Write-Host "##vso[task.setvariable variable=NotReadyCount;isOutput=true]$notReadyCount"
                
                if ($readyCount -eq 0) {
                    Write-Host "##vso[task.logissue type=warning]No clusters are ready for updates in ring '$updateRing'"
                }
          
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Readiness Report'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'readiness-report'
              publishLocation: 'Container'

  # Stage 2: Apply Updates (with approval gate for production)
  - stage: ApplyUpdates
    displayName: 'Apply Updates'
    dependsOn: CheckReadiness
    condition: and(succeeded(), gt(dependencies.CheckReadiness.outputs['ReadinessCheck.readiness.ReadyCount'], 0))
    
    # Optional: Add environment with approval for production rings
    # Uncomment the following lines to enable manual approval
    # variables:
    #   - name: environment
    #     ${{ if eq(parameters.updateRing, 'Production') }}:
    #       value: 'Production'
    #     ${{ else }}:
    #       value: 'Development'
    
    jobs:
      # Optional: Manual validation job for production
      # - job: WaitForApproval
      #   displayName: 'Wait for Approval'
      #   condition: eq('${{ parameters.updateRing }}', 'Production')
      #   pool: server
      #   steps:
      #     - task: ManualValidation@0
      #       inputs:
      #         notifyUsers: 'your-approvers-email@company.com'
      #         instructions: 'Please review the readiness report and approve to proceed with Production updates.'
      
      - job: ApplyClusterUpdates
        displayName: 'Apply Cluster Updates'
        # dependsOn: WaitForApproval
        # condition: or(ne('${{ parameters.updateRing }}', 'Production'), succeeded('WaitForApproval'))
        
        variables:
          readyCount: $[ stageDependencies.CheckReadiness.ReadinessCheck.outputs['readiness.ReadyCount'] ]
          totalCount: $[ stageDependencies.CheckReadiness.ReadinessCheck.outputs['readiness.TotalCount'] ]
        
        steps:
          - checkout: self
            displayName: 'Checkout Repository'
          
          - task: AzureCLI@2
            displayName: 'Install Resource Graph Extension'
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az extension add --name resource-graph --yes
          
          - task: PowerShell@2
            displayName: 'Install AzLocal.UpdateManagement from PSGallery'
            env:
              REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
              GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                $ErrorActionPreference = 'Stop'
                $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
                if ($env:REQUIRED_MODULE_VERSION) {
                    $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
                    Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
                } else {
                    Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
                }
                Install-Module @installArgs
                Import-Module AzLocal.UpdateManagement -Force
                $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
                $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
                $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
                Write-Host ""
                Write-Host "Module version summary"
                Write-Host "  Installed on agent        : $installed"
                Write-Host "  YAML generated against    : $generated"
                Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
                Write-Host ""
                Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
                if ($installed -gt $generated) {
                    $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
                if ($latest -and ($latest -gt $installed)) {
                    $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
          
          # v0.7.62: Download the readiness CSV produced by the CheckReadiness stage
          # so the apply step operates on the readiness gate's decision rather than
          # re-discovering clusters by tag. Apply still re-validates each cluster
          # (defence in depth) - this just enforces the upstream gate exactly.
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Readiness Report'
            inputs:
              source: 'current'
              artifact: 'readiness-report'
              path: '$(Build.ArtifactStagingDirectory)'
          
          - task: AzureCLI@2
            displayName: 'Apply Updates'
            name: applyUpdates
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Import-Module AzLocal.UpdateManagement -Force
                
                $updateRing = "${{ parameters.updateRing }}"
                $updateName = "${{ parameters.updateName }}"
                $dryRun = [System.Convert]::ToBoolean("${{ parameters.dryRun }}")
                
                # Create output directory
                $outputDir = "$(Build.ArtifactStagingDirectory)"
                $junitPath = Join-Path $outputDir "update-results.xml"
                
                # v0.7.62: Read the readiness CSV from the CheckReadiness stage and
                # extract the ARM resource IDs of clusters marked ReadyForUpdate=True.
                # The ClusterResourceId column was added to
                # Get-AzureLocalClusterUpdateReadiness output in v0.7.62 specifically
                # to make this hand-off explicit and exact (no second tag query,
                # no drift between the two stages' scopes).
                $readinessCsv = Join-Path $outputDir 'readiness-report.csv'
                if (-not (Test-Path $readinessCsv)) {
                    throw "Readiness CSV not found at '$readinessCsv'. The CheckReadiness stage did not publish a readiness-report artifact - cannot determine which clusters to apply."
                }
                $readinessRows = @(Import-Csv -Path $readinessCsv)
                if ($readinessRows.Count -gt 0 -and -not ($readinessRows[0].PSObject.Properties.Name -contains 'ClusterResourceId')) {
                    throw "Readiness CSV at '$readinessCsv' is missing the 'ClusterResourceId' column. This column was added in AzLocal.UpdateManagement v0.7.62. Re-run CheckReadiness with v0.7.62+ or refresh this pipeline YAML via Copy-AzureLocalPipelineExample -Update."
                }
                $readyResourceIds = @($readinessRows |
                    Where-Object { $_.ReadyForUpdate -eq 'True' -and $_.ClusterResourceId } |
                    ForEach-Object { $_.ClusterResourceId })
                Write-Host "Readiness CSV: $($readinessRows.Count) row(s), $($readyResourceIds.Count) marked ReadyForUpdate=True."
                if ($readyResourceIds.Count -eq 0) {
                    Write-Host "##vso[task.logissue type=warning]Readiness CSV reports zero clusters with ReadyForUpdate=True - nothing to apply."
                    Write-Host "##vso[task.setvariable variable=Succeeded;isOutput=true]0"
                    Write-Host "##vso[task.setvariable variable=Skipped;isOutput=true]0"
                    Write-Host "##vso[task.setvariable variable=Failed;isOutput=true]0"
                    Write-Host "##vso[task.setvariable variable=HealthBlocked;isOutput=true]0"
                    Write-Host "##vso[task.setvariable variable=ScheduleBlocked;isOutput=true]0"
                    Write-Host "##vso[task.setvariable variable=SideloadedBlocked;isOutput=true]0"
                    exit 0
                }
                
                # Build parameters - use -ClusterResourceIds (the readiness gate's
                # decision) rather than -ScopeByUpdateRingTag (which would re-discover
                # the full ring and force apply to re-evaluate already-blocked clusters).
                $params = @{
                    ClusterResourceIds = $readyResourceIds
                    Force = $true
                    LogFolderPath = $outputDir
                    ExportResultsPath = $junitPath
                }
                
                if ($updateName -and $updateName -ne '') {
                    $params['UpdateName'] = $updateName
                    Write-Host "Applying specific update: $updateName"
                }
                
                if ($dryRun) {
                    $params['WhatIf'] = $true
                    Write-Host "##vso[task.logissue type=warning]DRY RUN MODE - No updates will be applied"
                }
                
                Write-Host ""
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Applying Updates to UpdateRing: $updateRing" -ForegroundColor Cyan
                Write-Host "  Clusters (from readiness CSV): $($readyResourceIds.Count)" -ForegroundColor Cyan
                Write-Host "========================================" -ForegroundColor Cyan
                
                # Run updates
                $results = Start-AzureLocalClusterUpdate @params -PassThru
                
                Write-Host ""
                Write-Host "Update operation complete"
                
                # Count results
                $succeeded = ($results | Where-Object { $_.Status -eq 'Started' -or $_.Status -eq 'Success' -or $_.Status -eq 'UpdateStarted' }).Count
                $skipped = ($results | Where-Object { $_.Status -in @('Skipped', 'NotReady', 'NoUpdatesAvailable', 'NoReadyUpdates', 'NotFound', 'UpdateNotFound') }).Count
                $failed = ($results | Where-Object { $_.Status -in @('Failed', 'Error') }).Count
                $healthBlocked = ($results | Where-Object { $_.Status -eq 'HealthCheckBlocked' }).Count
                $scheduleBlocked = ($results | Where-Object { $_.Status -eq 'ScheduleBlocked' }).Count
                $sideloadedBlocked = ($results | Where-Object { $_.Status -eq 'SideloadedBlocked' }).Count
                
                Write-Host "##vso[task.setvariable variable=Succeeded;isOutput=true]$succeeded"
                Write-Host "##vso[task.setvariable variable=Skipped;isOutput=true]$skipped"
                Write-Host "##vso[task.setvariable variable=Failed;isOutput=true]$failed"
                Write-Host "##vso[task.setvariable variable=HealthBlocked;isOutput=true]$healthBlocked"
                Write-Host "##vso[task.setvariable variable=ScheduleBlocked;isOutput=true]$scheduleBlocked"
                Write-Host "##vso[task.setvariable variable=SideloadedBlocked;isOutput=true]$sideloadedBlocked"
                
                if ($failed -gt 0) {
                    # Per-cluster failures are expected in large fleets (day-to-day environmental
                    # issues on a small subset of clusters). Log as a warning so the partial
                    # success for the healthy clusters is not lost. Only promote to a hard error
                    # when the entire batch failed AND nothing started - that indicates a systemic
                    # issue (auth, module, subscription scope) worth failing the stage on.
                    if ($succeeded -eq 0 -and $skipped -eq 0 -and $healthBlocked -eq 0 -and $scheduleBlocked -eq 0 -and $sideloadedBlocked -eq 0) {
                        Write-Host "##vso[task.logissue type=error]All $failed cluster(s) in scope failed to start updates. Review the Azure Local portal, cluster health, and the published update-results.xml for per-cluster detail."
                    } else {
                        Write-Host "##vso[task.logissue type=warning]$failed cluster(s) failed to start updates. $succeeded succeeded, $skipped skipped, $healthBlocked health-blocked, $scheduleBlocked schedule-blocked, $sideloadedBlocked sideloaded-blocked. See update-results.xml for per-cluster detail."
                    }
                }
                if ($healthBlocked -gt 0) {
                    Write-Host "##vso[task.logissue type=warning]$healthBlocked cluster(s) blocked by critical health check failures"
                }
                if ($scheduleBlocked -gt 0) {
                    Write-Host "##vso[task.logissue type=warning]$scheduleBlocked cluster(s) blocked by maintenance schedule (outside UpdateWindow or in UpdateExclusions period)"
                }
                if ($sideloadedBlocked -gt 0) {
                    Write-Host "##vso[task.logissue type=warning]$sideloadedBlocked cluster(s) blocked by UpdateSideloaded=False - operator must stage the sideloaded payload and flip the tag (or run Reset-AzureLocalSideloadedTag) before updates can proceed"
                }
          
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Update Logs'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'update-logs'
              publishLocation: 'Container'
          
          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/update-results.xml'
              testRunTitle: 'Azure Local Cluster Updates - ${{ parameters.updateRing }}'
          
          # --------------------------------------------------------------
          # ITSM Connector (v0.7.4 Phase 1 - ServiceNow)
          # Fully opt-in. Runs AFTER PublishTestResults so the apply stage
          # surfaces its own results first; ITSM is strictly additive.
          # Secrets must be wired via the 'AzureLocal-ITSM-Secrets' variable
          # group at the top of this file (uncomment when ready).
          # --------------------------------------------------------------
          - task: PowerShell@2
            displayName: 'Install powershell-yaml (ITSM config parser)'
            condition: and(succeeded(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
                    Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber
                }

          - task: AzureCLI@2
            displayName: 'Raise ITSM tickets'
            name: itsm
            condition: and(succeeded(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
            env:
              # Secrets sourced from the variable group above. Mapping them
              # here keeps them off the PowerShell command line (no process-
              # listing or log leakage) and lets the module pick them up via
              # env:// references in azurelocal-itsm.yml.
              ITSM_SN_INSTANCE_URL: $(ITSM_SN_INSTANCE_URL)
              ITSM_SN_CLIENT_ID: $(ITSM_SN_CLIENT_ID)
              ITSM_SN_CLIENT_SECRET: $(ITSM_SN_CLIENT_SECRET)
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Import-Module AzLocal.UpdateManagement -Force

                $configPath = "${{ parameters.itsmConfigPath }}"
                $dryRun     = [System.Convert]::ToBoolean("${{ parameters.itsmDryRun }}")
                $force      = [System.Convert]::ToBoolean("${{ parameters.itsmForceCreate }}")

                if (-not (Test-Path $configPath)) {
                    Write-Host "##vso[task.logissue type=warning]ITSM config not found at '$configPath' - skipping ticket creation."
                    exit 0
                }

                $cfg = Get-AzureLocalItsmConfig -Path $configPath

                $junitInput = "$(Build.ArtifactStagingDirectory)/update-results.xml"
                if (-not (Test-Path $junitInput)) {
                    Write-Host "##vso[task.logissue type=warning]No update-results.xml found at '$junitInput' - skipping ticket creation."
                    exit 0
                }

                $params = @{
                    InputArtifactPath = $junitInput
                    Config            = $cfg
                    RunMetadata       = @{
                        Platform = 'azure-devops'
                        RunId    = $env:BUILD_BUILDID
                        RunUrl   = "$($env:SYSTEM_COLLECTIONURI)$($env:SYSTEM_TEAMPROJECT)/_build/results?buildId=$($env:BUILD_BUILDID)"
                        Branch   = $env:BUILD_SOURCEBRANCH
                    }
                    DryRun            = $dryRun
                    ForceCreate       = $force
                    ExportPath        = "$(Build.ArtifactStagingDirectory)/itsm-results.csv"
                    ExportJUnitPath   = "$(Build.ArtifactStagingDirectory)/itsm-results.xml"
                }

                $results = New-AzureLocalIncident @params
                $results | Format-Table ClusterName, Action, TicketId, Severity -AutoSize

          - task: PublishBuildArtifacts@1
            displayName: 'Publish ITSM Artefacts'
            condition: and(always(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'itsm-results'
              publishLocation: 'Container'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish ITSM Test Results'
            condition: and(always(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/itsm-results.xml'
              testRunTitle: 'ITSM Tickets - ${{ parameters.updateRing }}'
              failTaskOnFailedTests: false

          - task: PowerShell@2
            displayName: 'Generate Summary'
            inputs:
              targetType: 'inline'
              script: |
                $updateRing = "${{ parameters.updateRing }}"
                $dryRun = [System.Convert]::ToBoolean("${{ parameters.dryRun }}")
                $readyCount = "$(readyCount)"
                $totalCount = "$(totalCount)"
                
                $summary = @"
                # Update Application Summary
                
                **Target UpdateRing:** $updateRing
                
                ## Readiness
                
                | Metric | Count |
                |--------|-------|
                | Total Clusters | $totalCount |
                | Ready for Update | $readyCount |
                "@
                
                if ($dryRun) {
                    $summary += "`n`nâš ï¸ **This was a dry run. No updates were applied.**"
                    $summary += "`n`nRe-run the pipeline with 'Preview' set to false to apply updates."
                }
                else {
                    # Add Actions Required section for non-dry-run
                    $actionsRequired = @()
                    $healthBlocked = "$(applyUpdates.HealthBlocked)"
                    $scheduleBlocked = "$(applyUpdates.ScheduleBlocked)"
                    $sideloadedBlocked = "$(applyUpdates.SideloadedBlocked)"
                    $failed = "$(applyUpdates.Failed)"
                    
                    if ([int]$failed -gt 0) { $actionsRequired += "- **$failed cluster(s) failed** - Review pipeline logs and cluster health in Azure Portal" }
                    if ([int]$healthBlocked -gt 0) { $actionsRequired += "- **$healthBlocked cluster(s) blocked by health checks** - Resolve critical health failures before retrying" }
                    if ([int]$scheduleBlocked -gt 0) { $actionsRequired += "- **$scheduleBlocked cluster(s) outside maintenance window** - Updates will proceed when the cluster's UpdateWindow schedule allows, or re-run during the maintenance window" }
                    if ([int]$sideloadedBlocked -gt 0) { $actionsRequired += "- **$sideloadedBlocked cluster(s) blocked by UpdateSideloaded=False** - Operator must stage the sideloaded payload and flip the tag to True (or run Reset-AzureLocalSideloadedTag) before updates can proceed" }
                    
                    if ($actionsRequired.Count -gt 0) {
                        $summary += "`n`n## âš ï¸ Actions Required`n"
                        $summary += ($actionsRequired -join "`n")
                    }
                }
                
                $summary | Out-File "$(Build.ArtifactStagingDirectory)/summary.md" -Encoding UTF8
                Write-Host "##vso[task.uploadsummary]$(Build.ArtifactStagingDirectory)/summary.md"

  # Stage 3: Handle no ready clusters
  - stage: NoClustersReady
    displayName: 'No Clusters Ready'
    dependsOn: CheckReadiness
    condition: and(succeeded(), eq(dependencies.CheckReadiness.outputs['ReadinessCheck.readiness.ReadyCount'], 0))
    
    jobs:
      - job: ReportNoReadyClusters
        displayName: 'Report Status'
        
        variables:
          totalCount: $[ stageDependencies.CheckReadiness.ReadinessCheck.outputs['readiness.TotalCount'] ]
        
        steps:
          - task: PowerShell@2
            displayName: 'Generate Report'
            inputs:
              targetType: 'inline'
              script: |
                $updateRing = "${{ parameters.updateRing }}"
                $totalCount = "$(totalCount)"
                
                Write-Host "##vso[task.logissue type=warning]No clusters are ready for updates in ring '$updateRing'"
                
                $summary = @"
                # No Clusters Ready for Update
                
                **Target UpdateRing:** $updateRing
                "@
                
                if ($totalCount -eq 0) {
                    $summary += "`n`nâš ï¸ No clusters found with UpdateRing tag value '$updateRing'"
                } else {
                    $summary += @"
                
                âš ï¸ Found $totalCount cluster(s) with UpdateRing='$updateRing', but none are ready for updates.
                
                **Possible reasons:**
                - Clusters may already be up to date
                - Updates may be in progress
                - Clusters may have health check failures
                
                Download the readiness report artifact for details.
                "@
                }
                
                $summary | Out-File "$(Build.ArtifactStagingDirectory)/summary.md" -Encoding UTF8 -Force
                New-Item -ItemType Directory -Path "$(Build.ArtifactStagingDirectory)" -Force | Out-Null
                Write-Host "##vso[task.uploadsummary]$(Build.ArtifactStagingDirectory)/summary.md"
