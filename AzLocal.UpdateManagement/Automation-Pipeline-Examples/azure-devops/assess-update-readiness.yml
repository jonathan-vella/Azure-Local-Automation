# Assess Update Readiness (Pre-flight go/no-go gate)
# --------------------------------------------------
# Runs Get-AzureLocalClusterUpdateReadiness and Test-AzureLocalClusterHealth -BlockingOnly
# against a target UpdateRing (or the whole fleet) BEFORE apply-updates.yml runs.
#
# Publishes two JUnit XML results to the Azure DevOps Tests tab:
#   - readiness.xml       (one test per cluster; fails if ReadyForUpdate = $false)
#   - health-blocking.xml (one test per cluster; fails if any Critical health failure exists)
#
# CSV artifacts are also attached for spreadsheet triage.
#
# This pipeline is REPORT-ONLY and always succeeds. It surfaces not-ready / unhealthy
# clusters via the Tests tab (JUnit), the CSV artifacts, and the job summary - but it
# does NOT block downstream runs. In large fleets, day-to-day environmental issues
# (transient storage noise, a single node out, etc.) routinely affect a small subset of
# clusters; blocking the entire wave for one unhealthy cluster is rarely the desired
# behavior. apply-updates.yml is itself per-cluster scoped, so clusters that are not
# ready will simply no-op there too.
#
# If you want a hard pass/fail signal for a chained gate, read the output variables
# (NOT_READY, CRITICAL_FAILURES) from a downstream pipeline via a pipeline resource and
# apply your own tolerance threshold there.
#
# Remediation of Critical health failures is out of scope for this module - see the module
# README "Assess Readiness and Health BEFORE Applying Updates" section for pointers.

trigger: none

parameters:
  - name: scope
    displayName: 'Scope of clusters to check'
    type: string
    default: 'by-update-ring'
    values:
      - 'by-update-ring'
      - 'all'

  - name: updateRing
    displayName: 'UpdateRing tag value (only used when scope=by-update-ring)'
    type: string
    default: 'Wave1'

  - name: throttleLimit
    displayName: 'Parallel per-cluster ARM calls (v0.7.0). Default 4, range 1-16.'
    type: number
    default: 4

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.64'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  REQUIRED_MODULE_VERSION: '${{ parameters.moduleVersion }}'
  artifactsPath: '$(Build.ArtifactStagingDirectory)/readiness-assessment'

pool:
  vmImage: 'windows-latest'

stages:
  - stage: Assess
    displayName: 'Assess Update Readiness'
    jobs:
      - job: AssessReadiness
        displayName: 'Readiness + blocking health gate'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: PowerShell@2
            displayName: 'Install AzLocal.UpdateManagement from PSGallery'
            env:
              REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
              GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                $ErrorActionPreference = 'Stop'
                $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
                if ($env:REQUIRED_MODULE_VERSION) {
                    $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
                    Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
                } else {
                    Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
                }
                Install-Module @installArgs
                Import-Module AzLocal.UpdateManagement -Force
                $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
                $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
                $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
                Write-Host ""
                Write-Host "Module version summary"
                Write-Host "  Installed on agent        : $installed"
                Write-Host "  YAML generated against    : $generated"
                Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
                Write-Host ""
                Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
                if ($installed -gt $generated) {
                    $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
                if ($latest -and ($latest -gt $installed)) {
                    $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }

          - task: AzureCLI@2
            displayName: 'Run readiness + blocking health checks'
            inputs:
              # Replace with your service connection name
              azureSubscription: 'YOUR-SERVICE-CONNECTION-NAME'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az extension add --name resource-graph --yes

                Import-Module AzLocal.UpdateManagement -Force

                $scope = "${{ parameters.scope }}"
                $updateRing = "${{ parameters.updateRing }}"
                $throttle = [int]"${{ parameters.throttleLimit }}"; if ($throttle -lt 1) { $throttle = 4 }

                $outputDir = "$(artifactsPath)"
                New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

                $readinessCsv = Join-Path $outputDir 'readiness.csv'
                $readinessXml = Join-Path $outputDir 'readiness.xml'
                $healthCsv    = Join-Path $outputDir 'health-blocking.csv'
                $healthXml    = Join-Path $outputDir 'health-blocking.xml'

                $scopeParams = @{}
                if ($scope -eq 'by-update-ring' -and $updateRing) {
                    $scopeParams['ScopeByUpdateRingTag'] = $true
                    $scopeParams['UpdateRingValue']      = $updateRing
                    Write-Host "Scope: UpdateRing = $updateRing"
                } else {
                    Write-Host "Scope: all clusters (via inventory)"
                    $inventory = Get-AzureLocalClusterInventory -PassThru
                    if (-not $inventory -or $inventory.Count -eq 0) {
                        Write-Warning 'No clusters found in inventory.'
                        Write-Host "##vso[task.setvariable variable=NOT_READY;isOutput=true]0"
                        Write-Host "##vso[task.setvariable variable=CRITICAL_FAILURES;isOutput=true]0"
                        exit 0
                    }
                    $scopeParams['ClusterResourceIds'] = @($inventory | Select-Object -ExpandProperty ResourceId)
                }

                Write-Host ''
                Write-Host '========================================' -ForegroundColor Cyan
                Write-Host 'Step 1: Readiness (Get-AzureLocalClusterUpdateReadiness)' -ForegroundColor Cyan
                Write-Host '========================================' -ForegroundColor Cyan

                $readiness = Get-AzureLocalClusterUpdateReadiness @scopeParams `
                    -ThrottleLimit $throttle `
                    -ExportPath $readinessCsv `
                    -PassThru

                $null = Get-AzureLocalClusterUpdateReadiness @scopeParams `
                    -ThrottleLimit $throttle `
                    -ExportPath $readinessXml

                $notReady = @($readiness | Where-Object { $_.ReadyForUpdate -ne $true }).Count
                $total = @($readiness).Count

                Write-Host ''
                Write-Host "Total clusters in scope: $total"
                Write-Host "Not ready for update  : $notReady"

                Write-Host ''
                Write-Host '========================================' -ForegroundColor Cyan
                Write-Host 'Step 2: Blocking health (Test-AzureLocalClusterHealth -BlockingOnly)' -ForegroundColor Cyan
                Write-Host '========================================' -ForegroundColor Cyan

                $health = Test-AzureLocalClusterHealth @scopeParams `
                    -BlockingOnly `
                    -ExportPath $healthCsv `
                    -PassThru

                $null = Test-AzureLocalClusterHealth @scopeParams `
                    -BlockingOnly `
                    -ExportPath $healthXml

                $critical = @($health | Where-Object { $_.Severity -eq 'Critical' }).Count
                $clustersWithCritical = @($health | Where-Object { $_.Severity -eq 'Critical' } |
                    Select-Object -ExpandProperty ClusterName -Unique).Count

                Write-Host ''
                Write-Host "Critical findings      : $critical"
                Write-Host "Clusters with Critical : $clustersWithCritical"

                Write-Host "##vso[task.setvariable variable=NOT_READY;isOutput=true]$notReady"
                Write-Host "##vso[task.setvariable variable=CRITICAL_FAILURES;isOutput=true]$clustersWithCritical"

                # Azure DevOps summary markdown
                $summaryPath = Join-Path $outputDir 'summary.md'
                $summaryLines = New-Object 'System.Collections.Generic.List[string]'
                $summaryLines.Add('# Update Readiness Assessment')
                $summaryLines.Add('')
                $summaryLines.Add('| Metric | Count |')
                $summaryLines.Add('|--------|-------|')
                $summaryLines.Add("| Total clusters in scope | $total |")
                $summaryLines.Add("| Not ready for update | $notReady |")
                $summaryLines.Add("| Clusters with Critical health failures | $clustersWithCritical |")
                $summaryLines.Add("| Total Critical findings | $critical |")
                $summaryLines.Add('')
                $scopeLabel = $scope
                if ($updateRing) { $scopeLabel = "$scope (UpdateRing = $updateRing)" }
                $summaryLines.Add("**Scope**: $scopeLabel")
                $summaryLines.Add("**ThrottleLimit**: $throttle")
                $summaryLines.Add('')
                if ($notReady -gt 0 -or $clustersWithCritical -gt 0) {
                    $summaryLines.Add("**Action required**: $notReady cluster(s) not ready and/or $clustersWithCritical cluster(s) with Critical health failures. Remediate (hardware vendor SBE / firmware / cluster health) before or alongside the next apply-updates run. The healthy clusters are safe to proceed - apply-updates.yml is per-cluster scoped.")
                } else {
                    $summaryLines.Add('**All clear**: every cluster in scope is ready for update. Safe to proceed with apply-updates for this ring.')
                }

                # Per-cluster detail table
                if ($total -gt 0) {
                    $summaryLines.Add('')
                    $summaryLines.Add('## Cluster detail')
                    $summaryLines.Add('')
                    $summaryLines.Add('| Cluster | Current version | Current SBE version | Update state | Health | Ready | Recommended update |')
                    $summaryLines.Add('|---------|-----------------|---------------------|--------------|--------|-------|--------------------|')
                    foreach ($r in $readiness) {
                        $cv  = if ($r.CurrentVersion) { $r.CurrentVersion } else { '-' }
                        $csv = if ($r.PSObject.Properties['CurrentSbeVersion'] -and $r.CurrentSbeVersion) { $r.CurrentSbeVersion } else { '-' }
                        $ru  = if ($r.RecommendedUpdate) { $r.RecommendedUpdate } else { '-' }
                        $summaryLines.Add("| $($r.ClusterName) | $cv | $csv | $($r.UpdateState) | $($r.HealthState) | $($r.ReadyForUpdate) | $ru |")
                    }
                }

                ($summaryLines -join [Environment]::NewLine) | Out-File -FilePath $summaryPath -Encoding utf8
                Write-Host "##vso[task.uploadsummary]$summaryPath"
            name: gate

          - task: PublishTestResults@2
            displayName: 'Publish Readiness JUnit'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(artifactsPath)/readiness.xml'
              testRunTitle: 'Readiness (one test per cluster)'
              mergeTestResults: false
              failTaskOnFailedTests: false

          - task: PublishTestResults@2
            displayName: 'Publish Blocking-Health JUnit'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(artifactsPath)/health-blocking.xml'
              testRunTitle: 'Blocking Health Checks (one test per cluster)'
              mergeTestResults: false
              failTaskOnFailedTests: false

          - task: PublishPipelineArtifact@1
            displayName: 'Publish readiness assessment artifacts'
            condition: always()
            inputs:
              targetPath: '$(artifactsPath)'
              artifact: 'readiness-assessment'
