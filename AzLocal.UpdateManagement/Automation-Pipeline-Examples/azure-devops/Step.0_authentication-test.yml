# Step.0 - Authentication Validation and Subscription Scope Report
#
# PURPOSE:
#   Validates that the service connection (Workload Identity Federation), App Registration,
#   and RBAC role assignments all line up, AND produces a Subscription Scope report that
#   lists every subscription the pipeline identity can see. Run this:
#       - BEFORE importing the seven real pipelines (inventory, tags, readiness, apply,
#         status, fleet-status, fleet-health). It narrows any failure to one small pipeline
#         rather than seven interacting pipelines.
#       - PERIODICALLY (recommended monthly, or after every RBAC change in the tenant) to
#         confirm the pipeline identity's subscription scope has not silently widened or
#         narrowed - new subscriptions get onboarded, MG-level role assignments inherit,
#         leavers / re-orgs change tenant scope. A drift in this report is the earliest
#         signal that downstream fleet reports are about to under- or over-count clusters.
#
# WHAT THIS PIPELINE PROBES:
#       1. AzureCLI@2 task auth against the service connection (Workload Identity
#          Federation auto-managed by ADO).
#       2. Service-connection -> App Registration -> subscription wiring.
#       3. Azure RBAC on the App Registration's service principal.
#       4. Resource Graph reachability (proves the SP can actually see clusters).
#       5. Subscription scope: total count and full Subscription ID / Name table
#          visible to the pipeline identity.
#
#   Unlike the GitHub Actions twin (Step.0_authentication-test.yml in github-actions/), ADO
#   does not expose env-scoped federated credentials at the auth layer - the service
#   connection IS the federation. So this pipeline only validates one auth path. Environment
#   approval gates (Pipelines -> Environments) are a separate concern and are not exercised
#   here.
#
# REPORTS GENERATED:
#   - JUnit XML published via PublishTestResults@2 (renders in the ADO Tests tab).
#   - Markdown summary uploaded via ##vso[task.uploadsummary] (renders in the run Summary tab).
#   - Pipeline artifact (auth-report) containing JUnit XML + subscriptions.json + .csv.
#
# HOW TO RUN (after the file is committed and the pipeline is imported):
#   Pipelines -> Step.0 - Authentication Validation and Subscription Scope Report -> Run pipeline.
#
# See Automation-Pipeline-Examples/README.md, section 5.2, for the full setup story.

name: Step.0 - Authentication Validation and Subscription Scope Report

trigger: none

parameters:
  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  - name: GENERATED_AGAINST_MODULE_VERSION
    value: '0.7.78'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  - name: REQUIRED_MODULE_VERSION
    value: '${{ parameters.moduleVersion }}'

# No further parameters - this pipeline is deliberately fixed: one service connection,
# one identity, four probes. If the service connection name does not match your
# environment, update `azureSubscription` below.

pool:
  vmImage: 'windows-latest'

stages:
  - stage: Validate
    displayName: 'Validate Workload Identity Federation + RBAC + Subscription Scope'
    jobs:
      - job: ValidateAuthAndScope
        displayName: 'Run auth, RBAC, and Subscription Scope probes'

        steps:
          - task: PowerShell@2
            displayName: 'Install AzLocal.UpdateManagement from PSGallery'
            # Step.0 itself does not call the module (the auth/RBAC/ARG probes
            # below use raw az CLI), but installing the module here gives operators
            # an early, consistent drift signal *before* the rest of the seven
            # pipelines run. If this step warns that the YAML is stale or the
            # installed module is older than expected, refresh the YAMLs via
            # Copy-AzLocalPipelineExample -Platform AzureDevOps -Update and re-run -
            # same pattern as Step.1+.
            env:
              REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
              GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                $ErrorActionPreference = 'Stop'
                $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
                if ($env:REQUIRED_MODULE_VERSION) {
                    $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
                    Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
                } else {
                    Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
                }
                Install-Module @installArgs
                Import-Module AzLocal.UpdateManagement -Force
                # Get-Module can return multiple entries when nested modules are loaded - pick the highest version.
                $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
                $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
                $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
                Write-Host ""
                Write-Host "Module version summary"
                Write-Host "  Installed on agent        : $installed"
                Write-Host "  YAML generated against    : $generated"
                Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
                Write-Host ""
                Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
                # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
                if ($installed -lt $generated) {
                    Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$installed is OLDER than the version this pipeline YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Platform AzureDevOps -Update'."
                }
                if ($installed -gt $generated) {
                    $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
                if ($latest -and ($latest -gt $installed)) {
                    $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
                    Write-Host "##vso[task.logissue type=warning]$msg"
                }
                # Persist the three versions so the report step (below) can include them
                # in the JUnit XML + markdown summary alongside the auth/RBAC checks.
                Write-Host "##vso[task.setvariable variable=installedModuleVersion;isOutput=false]$installed"
                Write-Host "##vso[task.setvariable variable=generatedAgainstVersion;isOutput=false]$generated"
                Write-Host "##vso[task.setvariable variable=latestOnPsGallery;isOutput=false]$(if ($latest) { $latest } else { '' })"

          - task: AzureCLI@2
            displayName: 'Collect Authentication and Subscription Scope Report'
            inputs:
              azureSubscription: 'AzureLocal-ServiceConnection'  # Update if your service connection has a different name.
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                $reportDir = Join-Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY 'auth-report'
                New-Item -ItemType Directory -Path $reportDir -Force | Out-Null

                Write-Host '--- 1. az account show (proves service-connection auth) ---'
                $accountJson = az account show -o json
                if ($LASTEXITCODE -ne 0) { throw "az account show failed (exit $LASTEXITCODE)" }
                $account = $accountJson | ConvertFrom-Json
                $account | Format-List name, id, tenantId, user

                Write-Host ''
                Write-Host '--- 2. role assignments for the service connection identity (proves RBAC grant) ---'
                $appId = az account show --query user.name -o tsv
                Write-Host "Service connection identity (appId): $appId"
                az role assignment list `
                    --assignee $appId `
                    --all `
                    -o table

                Write-Host ''
                Write-Host '--- 3. Subscription Scope: enumerating all subscriptions visible to the pipeline identity ---'
                $subsJson = az account list --refresh --query "[].{name:name, subscriptionId:id, tenantId:tenantId, state:state}" -o json
                if ($LASTEXITCODE -ne 0) { throw "az account list failed (exit $LASTEXITCODE)" }
                $subs = @($subsJson | ConvertFrom-Json | Sort-Object name)
                $subCount = $subs.Count
                Write-Host "Count of subscriptions accessible = $subCount"
                $subs | Format-Table @{N='#';E={[array]::IndexOf($subs,$_)+1}}, name, subscriptionId, state -AutoSize

                $subs | ConvertTo-Json -Depth 4 | Out-File "$reportDir/subscriptions.json" -Encoding utf8
                $subs | Select-Object name, subscriptionId, tenantId, state |
                    Export-Csv "$reportDir/subscriptions.csv" -NoTypeInformation -Encoding utf8

                Write-Host ''
                Write-Host '--- 4. Resource Graph query (proves cluster reachability) ---'
                az extension add --name resource-graph --yes --only-show-errors | Out-Null
                $clusterJson = az graph query `
                    -q "resources | where type =~ 'microsoft.azurestackhci/clusters' | project name, resourceGroup, subscriptionId" `
                    --first 1000 `
                    -o json
                $clusterRows = @()
                if ($LASTEXITCODE -eq 0 -and $clusterJson) {
                    $parsed = $clusterJson | ConvertFrom-Json
                    if ($parsed -is [System.Collections.IEnumerable] -and -not ($parsed -is [string])) {
                        $clusterRows = @($parsed)
                    } elseif ($parsed.data) {
                        $clusterRows = @($parsed.data)
                    }
                }
                $clusterCount = $clusterRows.Count
                Write-Host "Clusters visible to the pipeline identity = $clusterCount"
                if ($clusterCount -gt 0) {
                    $clusterRows | Select-Object -First 10 | Format-Table -AutoSize
                }

                # ------------------------------------------------------------------
                # Emit JUnit XML
                # ------------------------------------------------------------------
                $now = Get-Date -Format 'yyyy-MM-ddTHH:mm:ss'
                function ConvertTo-XmlSafe([string]$s) {
                    if ($null -eq $s) { return '' }
                    $s -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
                }

                $xml = [System.Text.StringBuilder]::new()
                [void]$xml.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
                [void]$xml.AppendLine('<testsuites name="Step.0 - Authentication Validation and Subscription Scope Report">')

                [void]$xml.AppendLine("  <testsuite name=`"&#x1F510; Authentication`" tests=`"3`" failures=`"0`" timestamp=`"$now`">")
                [void]$xml.AppendLine("    <testcase classname=`"Authentication`" name=`"OIDC token exchange (az account show succeeded)`"><system-out><![CDATA[Tenant: $($account.tenantId)`nSubscription: $($account.name) ($($account.id))`nIdentity: $($account.user.name)]]></system-out></testcase>")
                [void]$xml.AppendLine("    <testcase classname=`"Authentication`" name=`"Default subscription = $(ConvertTo-XmlSafe $account.name)`" />")
                [void]$xml.AppendLine("    <testcase classname=`"Authentication`" name=`"Pipeline identity (appId) = $(ConvertTo-XmlSafe $account.user.name)`" />")
                [void]$xml.AppendLine('  </testsuite>')

                [void]$xml.AppendLine("  <testsuite name=`"&#x1F4CB; Subscription Scope (count=$subCount)`" tests=`"$($subCount + 1)`" failures=`"0`" timestamp=`"$now`">")
                [void]$xml.AppendLine("    <testcase classname=`"SubscriptionScope`" name=`"Count of subscriptions accessible = $subCount`" />")
                $i = 0
                foreach ($s in $subs) {
                    $i++
                    $nm = ConvertTo-XmlSafe $s.name
                    $sid = ConvertTo-XmlSafe $s.subscriptionId
                    $st  = ConvertTo-XmlSafe $s.state
                    [void]$xml.AppendLine("    <testcase classname=`"SubscriptionScope`" name=`"#$i  $nm  ($sid)  [$st]`" />")
                }
                [void]$xml.AppendLine('  </testsuite>')

                [void]$xml.AppendLine("  <testsuite name=`"&#x1F310; Resource Graph Reachability`" tests=`"1`" failures=`"0`" timestamp=`"$now`">")
                [void]$xml.AppendLine("    <testcase classname=`"ResourceGraph`" name=`"Clusters visible to pipeline identity = $clusterCount`" />")
                [void]$xml.AppendLine('  </testsuite>')

                # Suite 4: Module Version Drift (informational - never fails)
                $installedVersion = "$env:INSTALLEDMODULEVERSION"
                $generatedVersion = "$env:GENERATEDAGAINSTVERSION"
                $latestVersion    = "$env:LATESTONPSGALLERY"
                [void]$xml.AppendLine("  <testsuite name=`"&#x1F4E6; Module Version Drift`" tests=`"3`" failures=`"0`" timestamp=`"$now`">")
                [void]$xml.AppendLine("    <testcase classname=`"ModuleVersion`" name=`"Installed AzLocal.UpdateManagement = $installedVersion`" />")
                [void]$xml.AppendLine("    <testcase classname=`"ModuleVersion`" name=`"YAML generated against = $generatedVersion`" />")
                [void]$xml.AppendLine("    <testcase classname=`"ModuleVersion`" name=`"Latest on PSGallery = $(if ($latestVersion) { $latestVersion } else { '(lookup failed)' })`" />")
                [void]$xml.AppendLine('  </testsuite>')

                [void]$xml.AppendLine('</testsuites>')
                $xmlPath = "$reportDir/auth-report.xml"
                [System.IO.File]::WriteAllText($xmlPath, $xml.ToString(), [System.Text.UTF8Encoding]::new($false))
                Write-Host "JUnit XML written to: $xmlPath"

                # ------------------------------------------------------------------
                # Emit markdown summary for the ADO run Summary tab
                # ------------------------------------------------------------------
                $md = [System.Text.StringBuilder]::new()
                [void]$md.AppendLine('## Step.0 - Authentication Validation and Subscription Scope Report')
                [void]$md.AppendLine('')
                [void]$md.AppendLine('| Check | Result |')
                [void]$md.AppendLine('|---|---|')
                [void]$md.AppendLine("| Authentication (Workload Identity Federation) | :white_check_mark: working |")
                [void]$md.AppendLine("| Default Subscription | $($account.name) (``$($account.id)``) |")
                [void]$md.AppendLine("| Tenant | ``$($account.tenantId)`` |")
                [void]$md.AppendLine("| Pipeline identity (appId) | ``$($account.user.name)`` |")
                [void]$md.AppendLine("| Resource Graph reachability | :white_check_mark: $clusterCount cluster(s) visible |")
                [void]$md.AppendLine("| AzLocal.UpdateManagement (installed) | ``$installedVersion`` |")
                [void]$md.AppendLine("| AzLocal.UpdateManagement (YAML generated against) | ``$generatedVersion`` |")
                [void]$md.AppendLine("| AzLocal.UpdateManagement (latest on PSGallery) | ``$(if ($latestVersion) { $latestVersion } else { '(lookup failed)' })`` |")
                [void]$md.AppendLine('')
                [void]$md.AppendLine("### Count of subscriptions accessible = $subCount")
                [void]$md.AppendLine('')
                [void]$md.AppendLine('| # | Subscription Name | Subscription ID | Tenant ID | State |')
                [void]$md.AppendLine('|---|---|---|---|---|')
                $i = 0
                foreach ($s in $subs) {
                    $i++
                    [void]$md.AppendLine("| $i | $($s.name) | ``$($s.subscriptionId)`` | ``$($s.tenantId)`` | $($s.state) |")
                }
                [void]$md.AppendLine('')
                [void]$md.AppendLine("*Generated at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')*")
                $summaryPath = Join-Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY 'auth-report-summary.md'
                $md.ToString() | Out-File -FilePath $summaryPath -Encoding utf8
                Write-Host "##vso[task.uploadsummary]$summaryPath"

                Write-Host "##vso[task.setvariable variable=subscriptionCount;isOutput=false]$subCount"
                Write-Host "##vso[task.setvariable variable=clusterCount;isOutput=false]$clusterCount"

          - task: PublishTestResults@2
            displayName: 'Publish Authentication Validation JUnit Diagnostics'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/auth-report/auth-report.xml'
              testRunTitle: '[JUnit Debug] Authentication Validation and Subscription Scope'
              failTaskOnFailedTests: false
              mergeTestResults: false

          # artifact convention: compute a UTC timestamp variable so every downloadable artifact name is unique per run.
          - pwsh: |
              $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
              Write-Host "##vso[task.setvariable variable=artifactStamp;isOutput=true]$stamp"
              Write-Host "Artifact timestamp: $stamp"
            displayName: 'Compute Artifact Timestamp'
            condition: always()
            name: stamp

          - task: PublishPipelineArtifact@1
            displayName: 'Publish auth-report artifact'
            condition: always()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/auth-report'
              artifact: 'azlocal-auth-report_$(stamp.artifactStamp)'
              publishLocation: 'pipeline'

