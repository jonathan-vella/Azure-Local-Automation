# Step.7 - Fleet Update Status Monitoring Pipeline
# This pipeline monitors update status across all Azure Local clusters and generates reports
#
# USE CASES:
# - Daily/weekly health checks on cluster update status
# - Executive dashboards showing fleet-wide update adoption
# - Alerting when clusters have update failures
# - Compliance tracking for update deployments
#
# REPORTS GENERATED:
# - JUnit XML: Shows each cluster as a test case (passed/failed/skipped) in Test tab
#   (testcase bodies now include `Start Time:` and `End Time:` lines per cluster).
# - CSV: Detailed export for spreadsheet analysis (includes `EndTime` column sourced
#   from properties.progress.endTimeUtc, with fallback to properties.lastUpdatedTime - blank for InProgress runs).
# - HTML report (Recent Update Run History section): includes `End Time` column for the
#   aggregated multi-attempt row.
# - JSON: Machine-readable format for custom integrations
#
# AUTHENTICATION:
# Uses Workload Identity Federation (OIDC) - recommended for secretless authentication
# See: https://learn.microsoft.com/en-us/azure/devops/pipelines/library/connect-to-azure?view=azure-devops#create-an-azure-resource-manager-service-connection-using-workload-identity-federation

# BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
# Edits inside this block are preserved across Update-AzLocalPipelineExample
# module upgrades. Add or modify `schedules:` blocks below.
trigger: none  # Manual or scheduled only

schedules:
  # Run daily at 6 AM UTC
  - cron: '0 6 * * *'
    displayName: 'Daily Fleet Status Check'
    branches:
      include:
        - main
    always: true  # Run even if no code changes
# END-AZLOCAL-CUSTOMIZE:schedule-triggers

parameters:
  - name: scope
    displayName: 'Scope of clusters to check'
    type: string
    default: 'all'
    values:
      - 'all'
      - 'by-update-ring'
  
  - name: updateRing
    # accepts single ring, 'Prod;Ring2' list, or '***' wildcard (three stars - deliberate).
    displayName: "UpdateRing tag value (only used when scope=by-update-ring). Single, 'Prod;Ring2', or '***'."
    type: string
    default: ''
  
  - name: includeUpdateRuns
    displayName: 'Include recent update run history in report'
    type: boolean
    default: true

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

  # --- ITSM Connector (ServiceNow auto-raise on fleet-update-status) ---
  # Set raiseItsmTicket=true to open ServiceNow incidents from each unresolved
  # Failed update run reported by the 'Update Run History and Error Details'
  # testsuite (and any failed AzureLocalFleetUpdateStatus row). Default is false
  # so existing schedules stay byte-identical until you opt in. The connector
  # reads the JUnit file Step.6 already produces (readiness-status.xml) and
  # the trigger matrix in ./.itsm/azurelocal-itsm.yml.
  - name: raiseItsmTicket
    displayName: 'Open ITSM tickets (ServiceNow) for fleet-update-status failures'
    type: boolean
    default: false

  - name: itsmConfigPath
    displayName: 'Path to ITSM matrix config (YAML or JSON)'
    type: string
    default: './.itsm/azurelocal-itsm.yml'

  - name: itsmDryRun
    displayName: 'ITSM: build payloads + run read-only dedupe but do NOT create tickets'
    type: boolean
    default: false

  - name: itsmForceCreate
    displayName: 'ITSM: bypass dedupe and always create new tickets (use with caution)'
    type: boolean
    default: false

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.87'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  REQUIRED_MODULE_VERSION: '${{ parameters.moduleVersion }}'
  reportsPath: '$(Build.ArtifactStagingDirectory)/reports'
  # ITSM connector. When raiseItsmTicket=true the Raise ITSM
  # task below references $(ITSM_SN_INSTANCE_URL), $(ITSM_SN_CLIENT_ID),
  # $(ITSM_SN_CLIENT_SECRET). The simplest binding is an ADO variable group
  # named 'AzureLocal-ITSM-Secrets'. ADO does not allow mixing mapping-form
  # variables with '- group:' entries in the same block, so to enable the
  # group reference convert this entire 'variables:' block to list form:
  #   variables:
  #     - name: GENERATED_AGAINST_MODULE_VERSION
  #       value: '0.7.77'
  #     - name: REQUIRED_MODULE_VERSION
  #       value: '${{ parameters.moduleVersion }}'
  #     - name: reportsPath
  #       value: '$(Build.ArtifactStagingDirectory)/reports'
  #     - group: AzureLocal-ITSM-Secrets
  # When raiseItsmTicket=false the Raise ITSM task is skipped and the secrets
  # are not consulted, so the conversion is only required for opt-in users.

stages:
- stage: FleetStatus
  displayName: 'Collect Fleet Update Status'
  jobs:
  - job: CollectStatus
    displayName: 'Collect and Report Fleet Status'
    pool:
      vmImage: 'windows-latest'
    
    steps:
    - checkout: self
      displayName: 'Checkout repository'
    
    - task: PowerShell@2
      displayName: 'Install AzLocal.UpdateManagement from PSGallery'
      env:
        REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
        GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = 'Stop'
          $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
          if ($env:REQUIRED_MODULE_VERSION) {
              $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
              Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
          } else {
              Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
          }
          Install-Module @installArgs
          Import-Module AzLocal.UpdateManagement -Force
          $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
          $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
          $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
          Write-Host ""
          Write-Host "Module version summary"
          Write-Host "  Installed on agent        : $installed"
          Write-Host "  YAML generated against    : $generated"
          Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
          Write-Host ""
          Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
          # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
          if ($installed -lt $generated) {
              Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$installed is OLDER than the version this pipeline YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Platform AzureDevOps -Update'."
          }
          if ($installed -gt $generated) {
              $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
              Write-Host "##vso[task.logissue type=warning]$msg"
          }
          if ($latest -and ($latest -gt $installed)) {
              $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
              Write-Host "##vso[task.logissue type=warning]$msg"
          }
    
    # Use Azure CLI task with Workload Identity Federation (OIDC)
    - task: AzureCLI@2
      displayName: 'Collect Fleet Update Status'
      inputs:
        # Replace with your service connection name
        azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Install resource-graph extension
          az extension add --name resource-graph --yes
          
          # Import module
          Import-Module AzLocal.UpdateManagement -Force
          
          # Create output directory
          $outputDir = "$(reportsPath)"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          
          $scope = "${{ parameters.scope }}"
          $updateRing = "${{ parameters.updateRing }}"
          $includeRuns = [System.Convert]::ToBoolean("${{ parameters.includeUpdateRuns }}")
          
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Fleet Update Status Collection" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Scope: $scope"
          if ($updateRing) { Write-Host "UpdateRing Filter: $updateRing" }
          Write-Host "Include Update Runs: $includeRuns"
          Write-Host ""
          
          # Step 1: Get cluster inventory
          Write-Host "Step 1: Getting cluster inventory..." -ForegroundColor Yellow
          
          $inventoryCsv = Join-Path $outputDir "cluster-inventory.csv"
          $inventory = Get-AzLocalClusterInventory -ExportPath $inventoryCsv -PassThru
          
          if (-not $inventory -or $inventory.Count -eq 0) {
              Write-Warning "No clusters found in inventory"
              exit 0
          }
          
          Write-Host "Found $($inventory.Count) total cluster(s)" -ForegroundColor Green
          
          # Step 2: Get readiness status
          Write-Host ""
          Write-Host "Step 2: Checking update readiness..." -ForegroundColor Yellow
          
          $readinessParams = @{}
          
          if ($scope -eq 'by-update-ring' -and $updateRing) {
              $readinessParams['ScopeByUpdateRingTag'] = $true
              $readinessParams['UpdateRingValue'] = $updateRing
          }
          else {
              $resourceIds = $inventory | Select-Object -ExpandProperty ResourceId
              $readinessParams['ClusterResourceIds'] = $resourceIds
          }
          
          # Export to multiple formats
          $readinessCsv = Join-Path $outputDir "readiness-status.csv"
          $readinessJson = Join-Path $outputDir "readiness-status.json"
          $readinessXml = Join-Path $outputDir "readiness-status.xml"
          
          $readiness = Get-AzLocalClusterUpdateReadiness @readinessParams -ExportPath $readinessCsv -PassThru
          
          # Export to JSON
          $hasPrerequisite = @($readiness | Where-Object { $_.HasPrerequisiteUpdates -ne "" }).Count
          $readinessExport = @{
              Timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"
              TotalClusters = $readiness.Count
              Summary = @{
                  Ready = @($readiness | Where-Object { $_.ReadyForUpdate -eq $true }).Count
                  InProgress = @($readiness | Where-Object { $_.UpdateState -eq "UpdateInProgress" }).Count
                  HealthFailures = @($readiness | Where-Object { $_.HealthState -eq "Failure" }).Count
                  HasPrerequisite = $hasPrerequisite
                  NotReady = @($readiness | Where-Object { $_.ReadyForUpdate -ne $true -and $_.UpdateState -ne "UpdateInProgress" }).Count
              }
              Clusters = $readiness
          }
          $readinessExport | ConvertTo-Json -Depth 10 | Out-File $readinessJson -Encoding UTF8
          
          # Step 3: Generate JUnit XML for Azure DevOps Test tab
          Write-Host ""
          Write-Host "Step 3: Generating JUnit XML report..." -ForegroundColor Yellow
          
          $timestamp = Get-Date -Format "yyyy-MM-ddTHH:mm:ss"
          $totalTests = $readiness.Count

          # Critical Health Status (this is what the JUnit XML pass/fail represents):
          #   FAILED = HealthState=Failure OR UpdateState=Failed OR SBE prerequisite blocked
          #   PASSED = everything else
          $failures = @($readiness | Where-Object { $_.HealthState -eq "Failure" -or $_.UpdateState -eq "Failed" -or $_.HasPrerequisiteUpdates -ne "" }).Count
          $criticalHealthPassed = $totalTests - $failures

          # Mutually-exclusive primary status buckets so the summary table rows
          # always sum to Total Clusters. Priority cascade (first match wins):
          #   UpdateFailed > HealthFailure > SbeBlocked > InProgress > ReadyForUpdate > UpToDate > Other
          $stUpdateFailed = 0
          $stHealthFailure = 0
          $stSbeBlocked = 0
          $stInProgress = 0
          $stReadyForUpdate = 0
          $stUpToDate = 0
          $stOther = 0
          foreach ($c in $readiness) {
              if ($c.UpdateState -eq 'Failed') { $stUpdateFailed++ }
              elseif ($c.HealthState -eq 'Failure') { $stHealthFailure++ }
              elseif ($c.HasPrerequisiteUpdates) { $stSbeBlocked++ }
              elseif ($c.UpdateState -eq 'UpdateInProgress') { $stInProgress++ }
              elseif ($c.ReadyForUpdate -eq $true) { $stReadyForUpdate++ }
              elseif ($c.UpdateState -in @('UpToDate','AppliedSuccessfully')) { $stUpToDate++ }
              else { $stOther++ }
          }

          # Legacy variable names (kept for backwards-compatible pipeline outputs)
          $inProgress = $stInProgress
          $ready = $stReadyForUpdate
          $upToDate = $stUpToDate

          # Fleet Version Distribution - pivot clusters by CurrentVersion
          # so the JUnit XML (and the markdown summary) lead with "what versions
          # are presently installed across the fleet, and what % of clusters
          # are on each one". One row per distinct CurrentVersion, sorted by
          # cluster count (descending). SupportStatus is a fleet-derived heuristic:
          #   Supported   = YYMM in top-6 most-recent distinct YYMM values across the fleet
          #   Unsupported = parseable YYMM older than the top-6
          #   Unknown     = CurrentVersion empty / malformed / no YYMM token
          # YYMM token must match regex '^[0-9]{4}$'. Always cross-check against
          # the Microsoft Azure Local lifecycle docs before operator action.
          $versionGroups = @($readiness | Group-Object {
              if ([string]::IsNullOrWhiteSpace($_.CurrentVersion)) { '(unknown)' } else { [string]$_.CurrentVersion }
          } | Sort-Object Count -Descending)
          $versionDistribution = @($versionGroups | ForEach-Object {
              $clusterNames = @($_.Group | Sort-Object ClusterName | ForEach-Object { [string]$_.ClusterName })
              [PSCustomObject]@{
                  Version    = $_.Name
                  Count      = $_.Count
                  Percentage = if ($totalTests -gt 0) { [math]::Round(($_.Count / $totalTests) * 100, 1) } else { 0 }
                  Clusters   = ($clusterNames -join ', ')
              }
          })
          $distinctVersions = $versionDistribution.Count
          $mostCommonVersion = if ($distinctVersions -gt 0) { $versionDistribution[0].Version } else { '(none)' }
          $mostCommonVersionPct = if ($distinctVersions -gt 0) { $versionDistribution[0].Percentage } else { 0 }

          # Compute the rolling 6-month YYMM support window used by SupportStatus.
          # Preferred anchor: the latest released Azure Local solution version from the
          # Microsoft public catalog (https://aka.ms/AzureEdgeUpdates), via the
          # Get-AzLocalLatestSolutionVersion cmdlet. Fallback: top-6 distinct YYMM
          # values observed across the fleet. As soon as Microsoft publishes any release
          # with a newer YYMM (e.g. 2604), the window slides forward and older YYMM
          # values (e.g. 2510) fall out, even if no cluster has installed the new release.
          $supportSource         = 'fleet-observed'
          $latestReleasedYymm    = ''
          $latestReleasedVersion = ''
          $manifestFetchedAt     = ''
          $manifestUrl           = 'https://aka.ms/AzureEdgeUpdates'
          $manifestError         = ''
          try {
              Write-Host "Querying $manifestUrl for the latest released Azure Local solution version..."
              $manifestProbe = Get-AzLocalLatestSolutionVersion -ErrorAction Stop
              $supportedYymms        = @($manifestProbe.SupportedYYMMs)
              $supportSource         = 'Microsoft manifest'
              $latestReleasedYymm    = [string]$manifestProbe.LatestYYMM
              $latestReleasedVersion = [string]$manifestProbe.LatestVersion
              $manifestFetchedAt     = $manifestProbe.ManifestFetchedAt.ToString('o')
              Write-Host ("Latest released solution version: {0} (YYMM={1}); support window anchored on Microsoft manifest." -f $latestReleasedVersion, $latestReleasedYymm)
          } catch {
              $manifestError = $_.Exception.Message
              Write-Host "##vso[task.logissue type=warning]Failed to query $manifestUrl - falling back to fleet-observed top-6 YYMM window. Error: $manifestError"
              $observedYymms = @($versionDistribution | ForEach-Object {
                  $parts = ([string]$_.Version) -split '\.'
                  if ($parts.Count -ge 2) { $parts[1] } else { '' }
              } | Where-Object { $_ -match '^[0-9]{4}$' } | Sort-Object -Unique)
              $supportedYymms = @($observedYymms | Sort-Object -Descending | Select-Object -First 6)
          }
          $supportedCount = 0
          $unsupportedCount = 0
          $unknownVersionCount = 0
          foreach ($v in $versionDistribution) {
              $parts = ([string]$v.Version) -split '\.'
              $yymm = if ($parts.Count -ge 2) { $parts[1] } else { '' }
              $supportStatus = if ($yymm -match '^[0-9]{4}$') {
                  if ($supportedYymms -contains $yymm) { 'Supported' } else { 'Unsupported' }
              } else { 'Unknown' }
              $v | Add-Member -MemberType NoteProperty -Name Yymm -Value $yymm -Force
              $v | Add-Member -MemberType NoteProperty -Name SupportStatus -Value $supportStatus -Force
              switch ($supportStatus) {
                  'Supported'   { $supportedCount   += [int]$v.Count }
                  'Unsupported' { $unsupportedCount += [int]$v.Count }
                  'Unknown'     { $unknownVersionCount += [int]$v.Count }
              }
          }
          $supportedYymmWindow = if ($supportedYymms.Count -gt 0) { ($supportedYymms -join ',') } else { '(none)' }

          Write-Host ""
          Write-Host "Fleet Version Distribution ($distinctVersions distinct version(s) across $totalTests cluster(s)):" -ForegroundColor Cyan
          Write-Host ("Support source: {0}" -f $supportSource)
          if ($latestReleasedYymm) {
              Write-Host ("Latest released YYMM (Microsoft manifest): {0} ({1})" -f $latestReleasedYymm, $latestReleasedVersion)
          }
          Write-Host ("Supported YYMM window (top {0}): {1}" -f $supportedYymms.Count, $supportedYymmWindow)
          foreach ($v in $versionDistribution) {
              Write-Host ("  {0,-30} {1,5} cluster(s)  ({2,5}%)  [{3}]" -f $v.Version, $v.Count, $v.Percentage, $v.SupportStatus)
          }

          $xmlContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites>
            <testsuite name="Fleet Version Distribution" tests="$distinctVersions" failures="0" errors="0" skipped="0" time="0" timestamp="$timestamp">
              <properties>
                <property name="testCategory" value="FleetVersionDistribution"/>
                <property name="description" value="Overall Fleet Update Status - cluster count and percentage per distinct CurrentVersion (StackHCI build presently installed). Source field: Get-AzLocalClusterUpdateReadiness.CurrentVersion. SupportStatus uses the rolling 6-month YYMM window anchored on the latest released Azure Local solution version published at https://aka.ms/AzureEdgeUpdates (supportSource='Microsoft manifest'); when the manifest is unreachable the pipeline falls back to the top-6 distinct YYMM values observed in the fleet (supportSource='fleet-observed'). Cross-check against the Microsoft Azure Local lifecycle docs before operator action."/>
                <property name="totalClusters" value="$totalTests"/>
                <property name="distinctVersions" value="$distinctVersions"/>
                <property name="mostCommonVersion" value="$mostCommonVersion"/>
                <property name="mostCommonVersionPercentage" value="$mostCommonVersionPct"/>
                <property name="supportSource" value="$supportSource"/>
                <property name="latestReleasedYymm" value="$latestReleasedYymm"/>
                <property name="latestReleasedVersion" value="$latestReleasedVersion"/>
                <property name="manifestUrl" value="$manifestUrl"/>
                <property name="manifestFetchedAt" value="$manifestFetchedAt"/>
                <property name="supportedYymmWindow" value="$supportedYymmWindow"/>
                <property name="supportedClusters" value="$supportedCount"/>
                <property name="unsupportedClusters" value="$unsupportedCount"/>
                <property name="unknownVersionClusters" value="$unknownVersionCount"/>
              </properties>
          "@
          foreach ($v in $versionDistribution) {
              $vNameEsc     = ([string]$v.Version)  -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              $vTestName    = "Version-$vNameEsc"
              $vClustersEsc = ([string]$v.Clusters) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              $vSystemOut   = "Version: $($v.Version)`nYYMM: $($v.Yymm)`nSupportStatus: $($v.SupportStatus)`nClusters: $($v.Count)`nPercentage: $($v.Percentage)%`nClusterNames: $($v.Clusters)"
              $vSystemOut   = $vSystemOut -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
              $xmlContent += "    <testcase name=`"$vTestName`" classname=`"FleetVersionDistribution`" time=`"0`">`n"
              $xmlContent += "      <properties>`n"
              $xmlContent += "        <property name=`"Version`" value=`"$vNameEsc`"/>`n"
              $xmlContent += "        <property name=`"Yymm`" value=`"$($v.Yymm)`"/>`n"
              $xmlContent += "        <property name=`"SupportStatus`" value=`"$($v.SupportStatus)`"/>`n"
              $xmlContent += "        <property name=`"ClusterCount`" value=`"$($v.Count)`"/>`n"
              $xmlContent += "        <property name=`"Percentage`" value=`"$($v.Percentage)`"/>`n"
              $xmlContent += "        <property name=`"Clusters`" value=`"$vClustersEsc`"/>`n"
              $xmlContent += "      </properties>`n"
              $xmlContent += "      <system-out><![CDATA[$vSystemOut]]></system-out>`n"
              $xmlContent += "    </testcase>`n"
          }
          $xmlContent += "  </testsuite>`n"

          $xmlContent += @"
            <testsuite name="AzureLocalFleetUpdateStatus" tests="$totalTests" failures="$failures" errors="0" skipped="0" time="0" timestamp="$timestamp">
              <properties>
                <property name="testCategory" value="CriticalHealthStatus"/>
                <property name="description" value="Each testcase = one cluster's Critical Health Status. PASSED = healthy + no failures + not SBE-blocked. FAILED = HealthState=Failure OR UpdateState=Failed OR SBE prerequisite blocked."/>
                <property name="totalClusters" value="$totalTests"/>
                <property name="criticalHealthPassed" value="$criticalHealthPassed"/>
                <property name="criticalHealthFailed" value="$failures"/>
                <property name="primaryUpdateFailed" value="$stUpdateFailed"/>
                <property name="primaryHealthFailure" value="$stHealthFailure"/>
                <property name="primarySbeBlocked" value="$stSbeBlocked"/>
                <property name="primaryInProgress" value="$stInProgress"/>
                <property name="primaryReadyForUpdate" value="$stReadyForUpdate"/>
                <property name="primaryUpToDate" value="$stUpToDate"/>
                <property name="primaryNeedsInvestigation" value="$stOther"/>
              </properties>
          "@

          # bucket clusters into 'failed' vs 'passed' BEFORE emission so the Azure DevOps
          # Tests tab renders all failed clusters first (in the run summary, in source order).
          # Within each bucket clusters are sorted by ClusterName for stable, scannable output.
          $failedClusters = @()
          $passedClusters = @()
          foreach ($cluster in $readiness) {
              if ($cluster.HealthState -eq "Failure" -or $cluster.UpdateState -eq "Failed" -or ($cluster.HasPrerequisiteUpdates -ne "")) {
                  $failedClusters += $cluster
              } else {
                  $passedClusters += $cluster
              }
          }
          $orderedClusters = @($failedClusters | Sort-Object ClusterName) + @($passedClusters | Sort-Object ClusterName)

          foreach ($cluster in $orderedClusters) {
              $clusterName = $cluster.ClusterName -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
              $testName = "UpdateStatus-$clusterName"
              $className = "AzureLocalFleetUpdateStatus.$($cluster.ResourceGroup)"
              
              $status = "passed"
              $failureMessage = ""
              $failureType = "UpdateFailure"
              
              if ($cluster.HealthState -eq "Failure" -or $cluster.UpdateState -eq "Failed") {
                  $status = "failed"
                  $failureType = "UpdateFailure"
                  $failureMessage = "UpdateState: $($cluster.UpdateState), Health: $($cluster.HealthState)"
                  if ($cluster.HealthCheckFailures) {
                      $failureMessage += ", Issues: $($cluster.HealthCheckFailures -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                  }
              }
              elseif ($cluster.HasPrerequisiteUpdates -ne "") {
                  $status = "failed"
                  $failureType = "HasPrerequisite"
                  $failureMessage = "Updates blocked by SBE prerequisite: $($cluster.HasPrerequisiteUpdates -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                  if ($cluster.SBEDependency) {
                      $failureMessage += " - Vendor: $($cluster.SBEDependency -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                  }
              }
              
              $systemOut = @"
          Cluster: $($cluster.ClusterName)
          Resource Group: $($cluster.ResourceGroup)
          Subscription: $($cluster.SubscriptionId)
          Update State: $($cluster.UpdateState)
          Health State: $($cluster.HealthState)
          Ready for Update: $($cluster.ReadyForUpdate)
          Has Prerequisite Updates: $($cluster.HasPrerequisiteUpdates)
          SBE Dependency: $($cluster.SBEDependency)
          Recommended Update: $($cluster.RecommendedUpdate)
          "@
              $systemOut = $systemOut -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
              
              # per-testcase <properties> for the ITSM connector. The dedupe
              # key in New-AzLocalIncident is SHA256(ClusterResourceId|UpdateName|Category);
              # without these properties the connector reports Action='Skipped'
              # with "Row missing ClusterResourceId or UpdateName". Status is
              # mirrored so the trigger-matrix evaluator can pick the right
              # severity/category for fleet-update-status rows.
              $clusterResIdEsc = ([string]$cluster.ResourceId) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              $recoUpdEsc      = ([string]$cluster.RecommendedUpdate) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              $clusterPortalEsc = if ($cluster.ResourceId) { "https://portal.azure.com/#@/resource$($cluster.ResourceId)" -replace '&','&amp;' -replace '"','&quot;' } else { '' }
              $statusValue = if ($status -eq "failed") { $failureType } else { 'Success' }

              $xmlContent += @"
          
              <testcase name="$testName" classname="$className" time="0">
                <properties>
                  <property name="ClusterName" value="$clusterName"/>
                  <property name="ClusterResourceId" value="$clusterResIdEsc"/>
                  <property name="UpdateName" value="$recoUpdEsc"/>
                  <property name="Status" value="$statusValue"/>
                  <property name="ClusterPortalUrl" value="$clusterPortalEsc"/>
                </properties>
                <system-out><![CDATA[$systemOut]]></system-out>
          "@
              
              if ($status -eq "failed") {
                  $xmlContent += @"
          
                <failure message="Critical Health Status: Failed" type="$failureType">$failureMessage</failure>
          "@
              }
              
              $xmlContent += @"
          
              </testcase>
          "@
          }
          
          $xmlContent += @"
          
            </testsuite>
          "@

          # ---------------------------------------------------------------
          # '📜 Update Run History and Error Details' testsuite.
          # ARG-first Update Run History projection (fleet-scale)
          # table. Each Failed/unresolved update run becomes a testcase with
          # the verbose error details (DeepestErrMsg) as the failure body
          # and Status / CurrentStep / Duration / PortalLink in system-out.
          # The cmdlet's -OnlyUnresolved filter dedupes against any later
          # Succeeded run on the same (cluster, update) pair (dedup aligned with
          # default UX.
          # ---------------------------------------------------------------
          Write-Host ""
          Write-Host "Step 3b: Collecting Update Run History + Verbose Error Details (ARG-first, fleet-scale)..." -ForegroundColor Yellow
          $runFailures = @()
          try {
              $runFailures = @(Get-AzLocalUpdateRunFailures -State Failed -OnlyUnresolved -Since (Get-Date).AddDays(-30))
          }
          catch {
              Write-Warning "Get-AzLocalUpdateRunFailures threw: $($_.Exception.Message). Continuing with empty run-history section."
              $runFailures = @()
          }
          $runFailures = @($runFailures | Sort-Object StartTime -Descending)
          $runHistoryCount = $runFailures.Count
          Write-Host "Found $runHistoryCount unresolved Failed update run(s)." -ForegroundColor $(if ($runHistoryCount -gt 0) { 'Yellow' } else { 'Green' })

          # Export run-history rows as CSV + JSON for the artifact bundle.
          $runHistoryCsv  = Join-Path $outputDir "update-run-history.csv"
          $runHistoryJson = Join-Path $outputDir "update-run-history.json"
          if ($runHistoryCount -gt 0) {
              $runFailures |
                  Select-Object ClusterName, UpdateName, State, Status, CurrentStep, Duration, StartTime, LastUpdated, DeepestStepName, ErrorCategory, DeepestErrMsg, UpdateRunPortalUrl, ClusterResourceId, RunId |
                  Export-Csv -Path $runHistoryCsv -NoTypeInformation -Force
              $runFailures | ConvertTo-Json -Depth 4 | Out-File $runHistoryJson -Encoding UTF8
          }

          # Build the run-history testsuite using string concat (avoids YAML/here-string nesting issues).
          $xmlContent += "`n  <testsuite name=`"📜 Update Run History and Error Details`" tests=`"$runHistoryCount`" failures=`"$runHistoryCount`" errors=`"0`" skipped=`"0`" time=`"0`" timestamp=`"$timestamp`">`n"
          $xmlContent += "    <properties>`n"
          $xmlContent += "      <property name=`"description`" value=`"Verbose error details for each unresolved Failed update run (ARG-first, fleet-scale).`"/>`n"
          $xmlContent += "      <property name=`"sourceCmdlet`" value=`"Get-AzLocalUpdateRunFailures -State Failed -OnlyUnresolved -Since (Get-Date).AddDays(-30)`"/>`n"
          $xmlContent += "      <property name=`"failedRunCount`" value=`"$runHistoryCount`"/>`n"
          $xmlContent += "    </properties>`n"

          foreach ($f in $runFailures) {
              $fcName    = ([string]$f.ClusterName) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
              $fuName    = ([string]$f.UpdateName)  -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
              $fStatus   = ([string]$f.Status)      -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
              $fCurStep  = ([string]$f.CurrentStep) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
              $fDuration = [string]$f.Duration
              $fStart    = [string]$f.StartTime
              $fLast     = [string]$f.LastUpdated
              $fCategory = [string]$f.ErrorCategory
              $fPortal   = [string]$f.UpdateRunPortalUrl
              $fErr = if ($f.DeepestErrMsg) {
                  if ($f.DeepestErrMsg.Length -gt 4000) { $f.DeepestErrMsg.Substring(0,4000) + ' ... (truncated)' } else { $f.DeepestErrMsg }
              } else { '(no error message captured)' }
              $fStackEsc = ([string]$f.StackTracePreview) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'

              $tcName  = "$fcName - $fuName"
              $tcClass = "UpdateRunHistory"
              $tcSysOut = "Cluster: $fcName`nUpdate: $fuName`nUpdate State: Failed`nStatus: $fStatus`nCurrent Step: $fCurStep`nDuration: $fDuration`nTime Started: $fStart`nLast Updated: $fLast`nError Category: $fCategory`nPortal Link: $fPortal"
              if ($f.StackTracePreview) { $tcSysOut += "`nStack Trace Preview: $fStackEsc" }
              $tcSysOut = $tcSysOut -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'

              $xmlContent += "`n    <testcase name=`"$tcName`" classname=`"$tcClass`" time=`"0`">`n"
              # properties for the ITSM connector dedupe key plus extended context
              # (UpdateRunPortalUrl, ClusterPortalUrl, CurrentStep,
              # Duration, ErrorCategory) so the optional incident-body template
              # rendered by New-AzLocalIncident can deep-link straight into
              # the SingleInstanceHistoryDetails ReactView for this failed run.
              $fClusterResIdEsc = ([string]$f.ClusterResourceId) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              $fClusterPortalEsc = if ($f.ClusterResourceId) { "https://portal.azure.com/#@/resource$($f.ClusterResourceId)" -replace '&','&amp;' -replace '"','&quot;' } else { '' }
              $fPortalEsc       = $fPortal -replace '&','&amp;' -replace '"','&quot;'
              $fStatusEsc       = ([string]$f.Status) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              $fCurStepAttr     = $fCurStep -replace '"','&quot;'
              $fDurationAttr    = $fDuration -replace '"','&quot;'
              $fCategoryAttr    = $fCategory -replace '"','&quot;'
              $xmlContent += "      <properties>`n"
              $xmlContent += "        <property name=`"ClusterName`" value=`"$fcName`"/>`n"
              $xmlContent += "        <property name=`"ClusterResourceId`" value=`"$fClusterResIdEsc`"/>`n"
              $xmlContent += "        <property name=`"UpdateName`" value=`"$fuName`"/>`n"
              $xmlContent += "        <property name=`"Status`" value=`"Failed`"/>`n"
              $xmlContent += "        <property name=`"UpdateState`" value=`"$fStatusEsc`"/>`n"
              $xmlContent += "        <property name=`"CurrentStep`" value=`"$fCurStepAttr`"/>`n"
              $xmlContent += "        <property name=`"Duration`" value=`"$fDurationAttr`"/>`n"
              $xmlContent += "        <property name=`"ErrorCategory`" value=`"$fCategoryAttr`"/>`n"
              $xmlContent += "        <property name=`"UpdateRunPortalUrl`" value=`"$fPortalEsc`"/>`n"
              $xmlContent += "        <property name=`"ClusterPortalUrl`" value=`"$fClusterPortalEsc`"/>`n"
              $xmlContent += "      </properties>`n"
              $xmlContent += "      <system-out><![CDATA[$tcSysOut]]></system-out>`n"
              $xmlContent += "      <failure message=`"$fcName / $fuName failed at: $fCurStep`" type=`"$fCategory`"><![CDATA[$fErr]]></failure>`n"
              $xmlContent += "    </testcase>`n"
          }
          $xmlContent += "  </testsuite>`n"

          $xmlContent += @"
          </testsuites>
          "@
          
          $xmlContent | Out-File $readinessXml -Encoding UTF8
          Write-Host "JUnit XML saved to: $readinessXml" -ForegroundColor Green
          
          # Step 4: Collect additional fleet data using fleet-wide capabilities
          # NOTE: Readiness (Step 2) already fetches summaries and available updates internally.
          # Steps 4a/4b re-export this data in dedicated CSV files for analysis.
          # Use ClusterResourceIds (not ClusterNames) to avoid redundant name-to-ID resolution.
          
          # Build resource ID list for downstream calls (avoids per-cluster name resolution)
          $fleetResourceIds = @()
          if ($scope -eq 'by-update-ring' -and $updateRing) {
              # For tag-based scope, get IDs from readiness results
              $fleetResourceIds = @($readiness | Where-Object { $_.SubscriptionId -and $_.ResourceGroup -and $_.ClusterName } | ForEach-Object {
                  "/subscriptions/$($_.SubscriptionId)/resourceGroups/$($_.ResourceGroup)/providers/Microsoft.AzureStackHCI/clusters/$($_.ClusterName)"
              })
          }
          else {
              $fleetResourceIds = @($inventory | Select-Object -ExpandProperty ResourceId)
          }
          
          # Step 4a: Get update summary across fleet
          Write-Host ""
          Write-Host "Step 4a: Collecting fleet update summaries..." -ForegroundColor Yellow
          
          $summaryCsv = Join-Path $outputDir "update-summaries.csv"
          $summaries = Get-AzLocalUpdateSummary -ClusterResourceIds $fleetResourceIds -ExportPath $summaryCsv -PassThru
          Write-Host "Update summaries collected for $($summaries.Count) cluster(s)" -ForegroundColor Green
          
          # Step 4b: Get available updates across fleet
          Write-Host ""
          Write-Host "Step 4b: Collecting available updates..." -ForegroundColor Yellow
          
          $availableCsv = Join-Path $outputDir "available-updates.csv"
          $available = Get-AzLocalAvailableUpdates -ClusterResourceIds $fleetResourceIds -ExportPath $availableCsv -PassThru
          Write-Host "Found $($available.Count) available update(s) across fleet" -ForegroundColor Green
          
          # Step 4c: Optionally collect recent update runs using fleet-wide query
          if ($includeRuns) {
              Write-Host ""
              Write-Host "Step 4c: Collecting recent update run history..." -ForegroundColor Yellow
              
              $runsCsv = Join-Path $outputDir "update-runs.csv"
              $allRuns = Get-AzLocalUpdateRuns -ClusterResourceIds $fleetResourceIds -Latest -ExportPath $runsCsv -PassThru
              Write-Host "Update runs collected for $($allRuns.Count) cluster(s)" -ForegroundColor Green
              
              # Display summary
              $succeeded = @($allRuns | Where-Object { $_.State -eq 'Succeeded' }).Count
              $inProgressRuns = @($allRuns | Where-Object { $_.State -eq 'InProgress' }).Count
              $failedRuns = @($allRuns | Where-Object { $_.State -eq 'Failed' }).Count
              Write-Host "  Succeeded: $succeeded, In Progress: $inProgressRuns, Failed: $failedRuns"
          }
          
          # Step 5: Output summary
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Fleet Status Summary" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Total Clusters: $totalTests"
          Write-Host ""
          Write-Host "Critical Health Status (matches JUnit XML pass/fail):" -ForegroundColor White
          Write-Host "  Passed: $criticalHealthPassed" -ForegroundColor Green
          Write-Host "  Failed: $failures" -ForegroundColor $(if ($failures -gt 0) { 'Red' } else { 'Green' })
          Write-Host ""
          Write-Host "Primary Status (each cluster counted once; rows sum to Total):" -ForegroundColor White
          Write-Host "  Up to Date: $stUpToDate" -ForegroundColor Green
          Write-Host "  Ready for Update: $stReadyForUpdate" -ForegroundColor Cyan
          Write-Host "  Update In Progress: $stInProgress" -ForegroundColor Yellow
          Write-Host "  SBE Prerequisite Blocked: $stSbeBlocked" -ForegroundColor $(if ($stSbeBlocked -gt 0) { 'Yellow' } else { 'Green' })
          Write-Host "  Health Failure: $stHealthFailure" -ForegroundColor $(if ($stHealthFailure -gt 0) { 'Red' } else { 'Green' })
          Write-Host "  Update Failed: $stUpdateFailed" -ForegroundColor $(if ($stUpdateFailed -gt 0) { 'Red' } else { 'Green' })
          Write-Host "  Needs Investigation: $stOther" -ForegroundColor $(if ($stOther -gt 0) { 'Yellow' } else { 'Green' })

          # Set pipeline variables
          Write-Host "##vso[task.setvariable variable=totalClusters;isOutput=true]$totalTests"
          Write-Host "##vso[task.setvariable variable=criticalHealthPassed;isOutput=true]$criticalHealthPassed"
          Write-Host "##vso[task.setvariable variable=criticalHealthFailed;isOutput=true]$failures"
          Write-Host "##vso[task.setvariable variable=upToDate;isOutput=true]$stUpToDate"
          Write-Host "##vso[task.setvariable variable=inProgress;isOutput=true]$stInProgress"
          Write-Host "##vso[task.setvariable variable=ready;isOutput=true]$stReadyForUpdate"
          Write-Host "##vso[task.setvariable variable=sbeBlocked;isOutput=true]$stSbeBlocked"
          Write-Host "##vso[task.setvariable variable=healthFailure;isOutput=true]$stHealthFailure"
          Write-Host "##vso[task.setvariable variable=updateFailed;isOutput=true]$stUpdateFailed"
          Write-Host "##vso[task.setvariable variable=needsInvestigation;isOutput=true]$stOther"
          Write-Host "##vso[task.setvariable variable=failures;isOutput=true]$failures"
          Write-Host "##vso[task.setvariable variable=hasPrerequisite;isOutput=true]$hasPrerequisite"
          Write-Host "##vso[task.setvariable variable=runHistoryCount;isOutput=true]$runHistoryCount"

          # persist version-distribution rows as a base64 JSON blob so
          # the 'Display Status Summary' step can render the markdown table
          # (with SupportStatus) without re-reading the CSV.
          if ($distinctVersions -gt 0) {
              $vTop = $versionDistribution | Select-Object Version, Yymm, SupportStatus, Count, Percentage, Clusters
              $vJson = $vTop | ConvertTo-Json -Depth 3 -Compress
              $vB64  = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($vJson))
              Write-Host "##vso[task.setvariable variable=versionDistB64;isOutput=true]$vB64"
              Write-Host "##vso[task.setvariable variable=versionDistCount;isOutput=true]$distinctVersions"
              Write-Host "##vso[task.setvariable variable=supportedYymmWindow;isOutput=true]$supportedYymmWindow"
              Write-Host "##vso[task.setvariable variable=supportedClusters;isOutput=true]$supportedCount"
              Write-Host "##vso[task.setvariable variable=unsupportedClusters;isOutput=true]$unsupportedCount"
              Write-Host "##vso[task.setvariable variable=unknownVersionClusters;isOutput=true]$unknownVersionCount"
              Write-Host "##vso[task.setvariable variable=supportSource;isOutput=true]$supportSource"
              Write-Host "##vso[task.setvariable variable=latestReleasedYymm;isOutput=true]$latestReleasedYymm"
              Write-Host "##vso[task.setvariable variable=latestReleasedVersion;isOutput=true]$latestReleasedVersion"
          } else {
              Write-Host "##vso[task.setvariable variable=versionDistB64;isOutput=true]"
              Write-Host "##vso[task.setvariable variable=versionDistCount;isOutput=true]0"
              Write-Host "##vso[task.setvariable variable=supportedYymmWindow;isOutput=true]"
              Write-Host "##vso[task.setvariable variable=supportedClusters;isOutput=true]0"
              Write-Host "##vso[task.setvariable variable=unsupportedClusters;isOutput=true]0"
              Write-Host "##vso[task.setvariable variable=unknownVersionClusters;isOutput=true]0"
              Write-Host "##vso[task.setvariable variable=supportSource;isOutput=true]$supportSource"
              Write-Host "##vso[task.setvariable variable=latestReleasedYymm;isOutput=true]$latestReleasedYymm"
              Write-Host "##vso[task.setvariable variable=latestReleasedVersion;isOutput=true]$latestReleasedVersion"
          }

          # persist update-run-history rows as a base64 JSON blob so the
          # 'Display Status Summary' step can render the markdown table without
          # re-querying ARG. Truncated to top 25 failures to keep the variable size sane.
          # include ClusterPortalUrl so the markdown table can render
          # Cluster Name as a deep link into the Azure portal cluster blade.
          if ($runHistoryCount -gt 0) {
              $top = $runFailures | Select-Object -First 25 ClusterName, ClusterPortalUrl, UpdateName, State, Status, CurrentStep, Duration, StartTime, LastUpdated, DeepestErrMsg, UpdateRunPortalUrl
              $json = $top | ConvertTo-Json -Depth 4 -Compress
              $b64  = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json))
              Write-Host "##vso[task.setvariable variable=runHistoryB64;isOutput=true]$b64"
          } else {
              Write-Host "##vso[task.setvariable variable=runHistoryB64;isOutput=true]"
          }
          
          if ($failures -gt 0) {
              Write-Warning " $failures cluster(s) have update failures or health issues!"
          }
      name: collect

    # compute a UTC timestamp variable so every downloadable artifact name is unique per run.
    - pwsh: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        Write-Host "##vso[task.setvariable variable=artifactStamp;isOutput=true]$stamp"
        Write-Host "Artifact timestamp: $stamp"
      displayName: 'Compute Artifact Timestamp'
      condition: always()
      name: stamp

    # Publish all reports as artifacts FIRST (lightweight) so the summary
    # task below runs before the JUnit Publish Test Results task, ensuring
    # the markdown summary uploaded via ##vso[task.uploadsummary] appears
    # at the top of the pipeline run extensions view.
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Fleet Status Reports'
      condition: always()
      inputs:
        PathtoPublish: '$(reportsPath)'
        ArtifactName: 'azlocal-fleet-update-status-report_$(stamp.artifactStamp)'
        publishLocation: 'Container'
    
    # Create summary in pipeline
    - pwsh: |
        $total = "$(collect.totalClusters)"
        $chPassed = "$(collect.criticalHealthPassed)"
        $chFailed = "$(collect.criticalHealthFailed)"
        $upToDate = "$(collect.upToDate)"
        $inProgress = "$(collect.inProgress)"
        $ready = "$(collect.ready)"
        $sbeBlocked = "$(collect.sbeBlocked)"
        $healthFailure = "$(collect.healthFailure)"
        $updateFailed = "$(collect.updateFailed)"
        $needsInvestigation = "$(collect.needsInvestigation)"
        $failures = "$(collect.failures)"
        $hasPrerequisite = "$(collect.hasPrerequisite)"
        $versionDistB64    = "$(collect.versionDistB64)"
        $versionDistCount  = "$(collect.versionDistCount)"
        $supportedYymmWin  = "$(collect.supportedYymmWindow)"
        $supportedClusters = "$(collect.supportedClusters)"
        $unsupportedClusters = "$(collect.unsupportedClusters)"
        $unknownVersionClusters = "$(collect.unknownVersionClusters)"
        $supportSource     = "$(collect.supportSource)"
        $latestReleasedYymm    = "$(collect.latestReleasedYymm)"
        $latestReleasedVersion = "$(collect.latestReleasedVersion)"
        $generatedUtc = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss UTC')

        Write-Host "##vso[task.uploadsummary]Fleet Status: $total clusters, $chPassed healthy / $chFailed failed (CriticalHealthStatus)"

        # Render the Overall Fleet Update Status (Version Distribution)
        # table FIRST so it leads the summary, matching the position of the
        # 'Fleet Version Distribution' testsuite at the top of the JUnit XML.
        $versionSection = ''
        if ($versionDistCount -and [int]$versionDistCount -gt 0 -and $versionDistB64) {
            try {
                $vRows = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($versionDistB64)) | ConvertFrom-Json
                $versionSection += "### Overall Fleet Update Status (Version Distribution)`n`n"
                $versionSection += "_One row per distinct ``CurrentVersion`` reported by ``Get-AzLocalClusterUpdateReadiness``. Sorted by cluster count (descending). Percentage is share of the $total cluster(s) in scope._`n`n"
                if ($supportSource -eq 'Microsoft manifest' -and $latestReleasedYymm) {
                    $versionSection += "_``SupportStatus`` uses the **rolling 6-month YYMM window anchored on the Microsoft public catalog** ([aka.ms/AzureEdgeUpdates](https://aka.ms/AzureEdgeUpdates)). Latest released YYMM = **$latestReleasedYymm** (``$latestReleasedVersion``); supported window = ``$supportedYymmWin``. As soon as Microsoft publishes a release with a newer YYMM, the window slides forward and the oldest in-window YYMM falls out._`n`n"
                    $versionSection += "_**Supported** = cluster's YYMM is inside the manifest-anchored window; **Unsupported** = older YYMM; **Unknown** = ``CurrentVersion`` empty or not in ``<prefix>.YYMM.X.X`` form. Always cross-check against the [Azure Local lifecycle cadence](https://learn.microsoft.com/azure/azure-local/update/about-updates-23h2#lifecycle-cadence) and the [Azure Local release information](https://learn.microsoft.com/azure/azure-local/release-information-23h2#about-azure-local-releases) before taking action._`n`n"
                } else {
                    $versionSection += "_``SupportStatus`` falls back to a **fleet-observed heuristic** (aka.ms/AzureEdgeUpdates was unreachable from the agent). **Supported** = YYMM is in the top-6 most-recent distinct YYMM values observed across the fleet (``$supportedYymmWin``); **Unsupported** = older YYMM; **Unknown** = ``CurrentVersion`` empty or not in ``<prefix>.YYMM.X.X`` form. Always cross-check against the [Azure Local lifecycle cadence](https://learn.microsoft.com/azure/azure-local/update/about-updates-23h2#lifecycle-cadence) and the [Azure Local release information](https://learn.microsoft.com/azure/azure-local/release-information-23h2#about-azure-local-releases) before taking action._`n`n"
                }
                $versionSection += "| Version | YYMM | Support | Cluster Count | Percentage | Clusters (first 15 shown only) |`n"
                $versionSection += "|---------|------|---------|---------------|------------|----------------------------------|`n"
                foreach ($vr in @($vRows)) {
                    $supportEmoji = switch ($vr.SupportStatus) {
                        'Supported'   { '✅ Supported' }
                        'Unsupported' { '⚠️ Unsupported' }
                        default       { '❓ Unknown' }
                    }
                  # Show only the first 15 cluster names so the markdown table
                  # stays scannable on large fleets. Full list remains in CSV/JSON.
                  $clusterNames = if ($vr.Clusters) {
                    @($vr.Clusters -split '; ' | Where-Object { $_ })
                  } else {
                    @()
                  }
                  $clCell = if ($clusterNames.Count -le 15) {
                    $clusterNames -join '; '
                  } else {
                    (($clusterNames | Select-Object -First 15) -join '; ') + (' ... (+{0} more)' -f ($clusterNames.Count - 15))
                  }
                    $clCell = $clCell -replace '\|','\|'
                    $versionSection += ('| {0} | {1} | {2} | {3} | {4}% | {5} |' -f $vr.Version, $vr.Yymm, $supportEmoji, $vr.Count, $vr.Percentage, $clCell) + "`n"
                }
                $versionSection += "`n_Support roll-up: Supported = $supportedClusters cluster(s), Unsupported = $unsupportedClusters, Unknown = $unknownVersionClusters. Anchor source: ``$supportSource``._`n"
                $versionSection += "_Note: the **Clusters (first 15 shown only)** column is intentionally truncated for readability. Download ``readiness-status.csv`` from artifacts to see the full cluster-name list._`n`n"
            } catch {
                Write-Warning "Failed to render Fleet Version Distribution markdown table: $($_.Exception.Message)"
                $versionSection = ''
            }
        }

        $summary = @"
        ## Fleet Update Status Summary  _(generated $generatedUtc)_

        $versionSection
        ### Critical Health Status (matches JUnit XML pass/fail)

        | Metric | Count | Status |
        |--------|-------|--------|
        | **Passed** (healthy, no failures, not SBE-blocked) | $chPassed | ✅ |
        | **Failed** (HealthState=Failure OR UpdateState=Failed OR SBE prerequisite blocked) | $chFailed | $(if ([int]$chFailed -gt 0) { '❌' } else { '✅' }) |

        ### Primary Status (each cluster counted once; rows sum to Total Clusters)

        | Metric | Count | Status |
        |--------|-------|--------|
        | **Total Clusters** | $total | ℹ️ |
        | **Up to Date** | $upToDate | ✅ |
        | **Ready for Update** | $ready | 🟢 |
        | **Update In Progress** | $inProgress | 🔄 |
        | **SBE Prerequisite Blocked** | $sbeBlocked | $(if ([int]$sbeBlocked -gt 0) { '🟡' } else { '✅' }) |
        | **Health Failure** (HealthState=Failure) | $healthFailure | $(if ([int]$healthFailure -gt 0) { '❌' } else { '✅' }) |
        | **Update Failed** (UpdateState=Failed) | $updateFailed | $(if ([int]$updateFailed -gt 0) { '❌' } else { '✅' }) |
        | **Needs Investigation** | $needsInvestigation | $(if ([int]$needsInvestigation -gt 0) { '⚠️' } else { '✅' }) |

        Priority cascade used to bucket each cluster exactly once:
        Update Failed > Health Failure > SBE Prerequisite Blocked > Update In Progress > Ready for Update > Up to Date > Needs Investigation.
        "@

        # Actions Required section
        $actionsRequired = @()
        if ([int]$updateFailed -gt 0) { $actionsRequired += "- **$updateFailed cluster(s) have UpdateState=Failed** - Review the most recent update run in Azure Portal and the ``update-runs.csv`` artifact for the failure detail." }
        if ([int]$healthFailure -gt 0) { $actionsRequired += "- **$healthFailure cluster(s) have HealthState=Failure** - Resolve critical health check issues in Azure Portal before retrying any updates." }
        if ([int]$hasPrerequisite -gt 0) { $actionsRequired += "- **$hasPrerequisite cluster(s) blocked by SBE prerequisite** - Install the required Solution Builder Extension (SBE) update from the hardware vendor. See ``available-updates.csv`` for vendor details." }

        if ($actionsRequired.Count -gt 0) {
            $summary += "`n`n### Actions Required`n`n"
            $summary += ($actionsRequired -join "`n")
        }

        # '📜 Update Run History and Error Details' markdown table
        # provides an ARG-first fleet-scale view of recent unresolved failures. Rendered only when there
        # are unresolved failed runs. Reads the base64 JSON blob set by the
        # collect step so we don't re-query ARG.
        # Cluster Name renders as a portal hyperlink (per-row
        # ClusterPortalUrl from ARG) so the operator can jump straight to the
        # cluster blade. Verbose Error Details renders inside an inline
        # <details><summary>...</summary>...</details> block so the full
        # parser/orchestrator stack is preserved (no 250-char truncation) but
        # the table stays scannable - rows expand on click. HTML-special chars
        # in the error text are escaped to keep the renderer honest.
        $runHistoryCount = "$(collect.runHistoryCount)"
        $runHistoryB64   = "$(collect.runHistoryB64)"
        if ($runHistoryCount -and ([int]$runHistoryCount) -gt 0 -and $runHistoryB64) {
            try {
                $rows = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($runHistoryB64)) | ConvertFrom-Json
                $summary += "`n`n### 📜 Update Run History and Error Details`n`n"
                $summary += "_ARG-first, fleet-scale failure-detail view. Shows up to 25 most recent unresolved Failed update runs (last 30 days). Source cmdlet: ``Get-AzLocalUpdateRunFailures -State Failed -OnlyUnresolved``._`n`n"
                $summary += "| Cluster Name | Update Name | Update State | Status | Current Step | Verbose Error Details | Duration | Time Started | Last Updated |`n"
                $summary += "|---|---|---|---|---|---|---|---|---|`n"
                foreach ($r in @($rows)) {
                    $errCell = if ($r.DeepestErrMsg) {
                        $e = [string]$r.DeepestErrMsg
                        # HTML-encode so '<', '>', '&' in stack traces don't get
                        # parsed as tags by the renderer; escape pipes so the
                        # table row stays intact; collapse newlines to <br> so
                        # multi-line stack traces remain readable inside the
                        # collapsible block.
                        $e = $e -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
                        $e = $e -replace "`r`n",'<br>' -replace "`n",'<br>' -replace '\|','\|'
                        '<details><summary>Show error</summary><br><code>' + $e + '</code></details>'
                    } else { '_(none)_' }
                    $clusterCell = if ($r.ClusterPortalUrl) { "[$($r.ClusterName)]($($r.ClusterPortalUrl))" } else { $r.ClusterName }
                    $updCell = if ($r.UpdateRunPortalUrl) { "[$($r.UpdateName)]($($r.UpdateRunPortalUrl))" } else { $r.UpdateName }
                    $summary += "| $clusterCell | $updCell | $($r.State) | $($r.Status) | $($r.CurrentStep) | $errCell | $($r.Duration) | $($r.StartTime) | $($r.LastUpdated) |`n"
                }
            } catch {
                Write-Warning "Failed to render Update Run History markdown table: $($_.Exception.Message)"
            }
        }

        $summary += @"

        ### Reports Available in Artifacts
        - ``readiness-status.csv`` - Detailed cluster status
        - ``readiness-status.json`` - Machine-readable format
        - ``readiness-status.xml`` - JUnit XML (see Tests tab; now includes the '📜 Update Run History and Error Details' suite)
        - ``cluster-inventory.csv`` - Full cluster inventory
        - ``update-summaries.csv`` - Fleet-wide update state summaries
        - ``available-updates.csv`` - All available updates across fleet
        - ``update-runs.csv`` - Recent update run history
        - ``update-run-history.csv`` - Verbose error details for unresolved Failed update runs (ARG-first, fleet-scale)
        - ``update-run-history.json`` - Same as above in JSON form for integrations
        "@

        Write-Host $summary
      displayName: 'Display Status Summary'
      condition: always()
    
    # Publish JUnit test results LAST so the Test Results tab is populated
    # but the markdown summary above is the first thing visible on the run
    # extensions view. failTaskOnFailedTests is left $false because cluster
    # health/update failures are surfaced via the summary; the pipeline
    # itself only fails on unrecoverable workflow errors.
    - task: PublishTestResults@2
      displayName: 'Publish Fleet Status as Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(reportsPath)/readiness-status.xml'
        testRunTitle: 'Fleet Update Status - $(Build.BuildNumber)'
        mergeTestResults: false
        failTaskOnFailedTests: false  # Don't fail pipeline on test failures

    # ----------------------------------------------------------------------
    # ITSM Connector (ServiceNow auto-raise on fleet failures)
    #
    # Fully opt-in (gated on parameters.raiseItsmTicket == true). Runs AFTER
    # PublishTestResults so the fleet-update-status surfaces its own results
    # first; ITSM is strictly additive - failures here never affect the
    # pipeline exit code.
    #
    # Reads the same readiness-status.xml that powers the run summary. The
    # JUnit emitter writes per-testcase <properties> (ClusterName /
    # ClusterResourceId / UpdateName / Status / ErrorCategory / CurrentStep /
    # Duration / UpdateRunPortalUrl / ClusterPortalUrl) so New-AzLocalIncident
    # can compute the SHA256 dedupe key and the Mustache body template can
    # deep-link straight into the SingleInstanceHistoryDetails ReactView for
    # the failed update run.
    # ----------------------------------------------------------------------
    - task: PowerShell@2
      displayName: 'Install powershell-yaml (ITSM config parser)'
      condition: and(succeeded(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
              Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber
          }

    - task: AzureCLI@2
      displayName: 'Raise ITSM tickets'
      name: itsm
      condition: and(succeeded(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      env:
        # BEGIN-AZLOCAL-CUSTOMIZE:itsm-secrets
        # Bind your ITSM connector secrets from the variable group above.
        # Defaults assume the ServiceNow OAuth client_credentials naming used
        # by azurelocal-itsm.yml (env://ITSM_SN_*). If your secret names differ,
        # update them here - this block is preserved by
        # Update-AzLocalPipelineExample across module upgrades.
        ITSM_SN_INSTANCE_URL: $(ITSM_SN_INSTANCE_URL)
        ITSM_SN_CLIENT_ID: $(ITSM_SN_CLIENT_ID)
        ITSM_SN_CLIENT_SECRET: $(ITSM_SN_CLIENT_SECRET)
        # END-AZLOCAL-CUSTOMIZE:itsm-secrets
      inputs:
        azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          Import-Module AzLocal.UpdateManagement -Force

          $configPath = "${{ parameters.itsmConfigPath }}"
          $dryRun     = [System.Convert]::ToBoolean("${{ parameters.itsmDryRun }}")
          $force      = [System.Convert]::ToBoolean("${{ parameters.itsmForceCreate }}")

          if (-not (Test-Path $configPath)) {
              Write-Host "##vso[task.logissue type=warning]ITSM config not found at '$configPath' - skipping ticket creation."
              exit 0
          }

          $cfg = Get-AzLocalItsmConfig -Path $configPath

          $junitInput = "$(reportsPath)/readiness-status.xml"
          if (-not (Test-Path $junitInput)) {
              Write-Host "##vso[task.logissue type=warning]No readiness-status.xml found at '$junitInput' - skipping ticket creation."
              exit 0
          }

          $params = @{
              InputArtifactPath = $junitInput
              Config            = $cfg
              RunMetadata       = @{
                  Platform = 'azure-devops'
                  RunId    = $env:BUILD_BUILDID
                  RunUrl   = "$($env:SYSTEM_COLLECTIONURI)$($env:SYSTEM_TEAMPROJECT)/_build/results?buildId=$($env:BUILD_BUILDID)"
                  Branch   = $env:BUILD_SOURCEBRANCH
              }
              DryRun            = $dryRun
              ForceCreate       = $force
              ExportPath        = "$(reportsPath)/itsm-results.csv"
              ExportJUnitPath   = "$(reportsPath)/itsm-results.xml"
          }

          $results = New-AzLocalIncident @params
          $results | Format-Table ClusterName, Action, TicketId, Severity -AutoSize

    - task: PublishBuildArtifacts@1
      displayName: 'Publish ITSM Artefacts'
      condition: and(always(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      inputs:
        PathtoPublish: '$(reportsPath)'
        ArtifactName: 'azlocal-fleet-update-status-itsm-results_$(stamp.artifactStamp)'
        publishLocation: 'Container'
      continueOnError: true

    - task: PublishTestResults@2
      displayName: 'Publish ITSM Test Results'
      condition: and(always(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(reportsPath)/itsm-results.xml'
        testRunTitle: 'ITSM Tickets (Step.6) - $(Build.BuildNumber)'
        failTaskOnFailedTests: false
