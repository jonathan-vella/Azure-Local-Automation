# Fleet Update Status Monitoring Pipeline
# This pipeline monitors update status across all Azure Local clusters and generates reports
#
# USE CASES:
# - Daily/weekly health checks on cluster update status
# - Executive dashboards showing fleet-wide update adoption
# - Alerting when clusters have update failures
# - Compliance tracking for update deployments
#
# REPORTS GENERATED:
# - JUnit XML: Shows each cluster as a test case (passed/failed/skipped) in Test tab
#   (v0.7.1: testcase bodies now include `Start Time:` and `End Time:` lines per cluster).
# - CSV: Detailed export for spreadsheet analysis (v0.7.1: includes `EndTime` column sourced
#   from properties.progress.endTimeUtc, with fallback to properties.lastUpdatedTime - blank for InProgress runs).
# - HTML report (Recent Update Run History section): includes `End Time` column for the
#   aggregated multi-attempt row (v0.7.1).
# - JSON: Machine-readable format for custom integrations
#
# AUTHENTICATION:
# Uses Workload Identity Federation (OIDC) - recommended for secretless authentication
# See: https://learn.microsoft.com/en-us/azure/devops/pipelines/library/connect-to-azure?view=azure-devops#create-an-azure-resource-manager-service-connection-using-workload-identity-federation

trigger: none  # Manual or scheduled only

schedules:
  # Run daily at 6 AM UTC
  - cron: '0 6 * * *'
    displayName: 'Daily Fleet Status Check'
    branches:
      include:
        - main
    always: true  # Run even if no code changes

parameters:
  - name: scope
    displayName: 'Scope of clusters to check'
    type: string
    default: 'all'
    values:
      - 'all'
      - 'by-update-ring'
  
  - name: updateRing
    displayName: 'UpdateRing tag value (only used when scope=by-update-ring)'
    type: string
    default: ''
  
  - name: includeUpdateRuns
    displayName: 'Include recent update run history in report'
    type: boolean
    default: true

  - name: throttleLimit
    displayName: 'Parallel per-cluster ARM calls (v0.7.0). Default 4, range 1-16.'
    type: number
    default: 4

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.62'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  REQUIRED_MODULE_VERSION: '${{ parameters.moduleVersion }}'
  reportsPath: '$(Build.ArtifactStagingDirectory)/reports'

stages:
- stage: FleetStatus
  displayName: 'Collect Fleet Update Status'
  jobs:
  - job: CollectStatus
    displayName: 'Collect and Report Fleet Status'
    pool:
      vmImage: 'windows-latest'
    
    steps:
    - checkout: self
      displayName: 'Checkout repository'
    
    - task: PowerShell@2
      displayName: 'Install AzLocal.UpdateManagement from PSGallery'
      env:
        REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
        GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = 'Stop'
          $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
          if ($env:REQUIRED_MODULE_VERSION) {
              $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
              Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
          } else {
              Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
          }
          Install-Module @installArgs
          Import-Module AzLocal.UpdateManagement -Force
          $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
          $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
          $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
          Write-Host ""
          Write-Host "Module version summary"
          Write-Host "  Installed on agent        : $installed"
          Write-Host "  YAML generated against    : $generated"
          Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
          Write-Host ""
          Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
          if ($installed -gt $generated) {
              $msg = "Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\pipelines -Platform AzureDevOps -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
              Write-Host "##vso[task.logissue type=warning]$msg"
          }
          if ($latest -and ($latest -gt $installed)) {
              $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
              Write-Host "##vso[task.logissue type=warning]$msg"
          }
    
    # Use Azure CLI task with Workload Identity Federation (OIDC)
    - task: AzureCLI@2
      displayName: 'Collect Fleet Update Status'
      inputs:
        # Replace with your service connection name
        azureSubscription: 'YOUR-SERVICE-CONNECTION-NAME'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Install resource-graph extension
          az extension add --name resource-graph --yes
          
          # Import module
          Import-Module AzLocal.UpdateManagement -Force
          
          # Create output directory
          $outputDir = "$(reportsPath)"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          
          $scope = "${{ parameters.scope }}"
          $updateRing = "${{ parameters.updateRing }}"
          $includeRuns = [System.Convert]::ToBoolean("${{ parameters.includeUpdateRuns }}")
          $throttle = [int]"${{ parameters.throttleLimit }}"; if ($throttle -lt 1) { $throttle = 4 }
          
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Fleet Update Status Collection" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Scope: $scope"
          if ($updateRing) { Write-Host "UpdateRing Filter: $updateRing" }
          Write-Host "Include Update Runs: $includeRuns"
          Write-Host ""
          
          # Step 1: Get cluster inventory
          Write-Host "Step 1: Getting cluster inventory..." -ForegroundColor Yellow
          
          $inventoryCsv = Join-Path $outputDir "cluster-inventory.csv"
          $inventory = Get-AzureLocalClusterInventory -ExportPath $inventoryCsv -PassThru
          
          if (-not $inventory -or $inventory.Count -eq 0) {
              Write-Warning "No clusters found in inventory"
              exit 0
          }
          
          Write-Host "Found $($inventory.Count) total cluster(s)" -ForegroundColor Green
          
          # Step 2: Get readiness status
          Write-Host ""
          Write-Host "Step 2: Checking update readiness..." -ForegroundColor Yellow
          
          $readinessParams = @{}
          
          if ($scope -eq 'by-update-ring' -and $updateRing) {
              $readinessParams['ScopeByUpdateRingTag'] = $true
              $readinessParams['UpdateRingValue'] = $updateRing
          }
          else {
              $resourceIds = $inventory | Select-Object -ExpandProperty ResourceId
              $readinessParams['ClusterResourceIds'] = $resourceIds
          }
          
          # Export to multiple formats
          $readinessCsv = Join-Path $outputDir "readiness-status.csv"
          $readinessJson = Join-Path $outputDir "readiness-status.json"
          $readinessXml = Join-Path $outputDir "readiness-status.xml"
          
          $readiness = Get-AzureLocalClusterUpdateReadiness @readinessParams -ThrottleLimit $throttle -ExportPath $readinessCsv -PassThru
          
          # Export to JSON
          $hasPrerequisite = @($readiness | Where-Object { $_.HasPrerequisiteUpdates -ne "" }).Count
          $readinessExport = @{
              Timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"
              TotalClusters = $readiness.Count
              Summary = @{
                  Ready = @($readiness | Where-Object { $_.ReadyForUpdate -eq $true }).Count
                  InProgress = @($readiness | Where-Object { $_.UpdateState -eq "UpdateInProgress" }).Count
                  HealthFailures = @($readiness | Where-Object { $_.HealthState -eq "Failure" }).Count
                  HasPrerequisite = $hasPrerequisite
                  NotReady = @($readiness | Where-Object { $_.ReadyForUpdate -ne $true -and $_.UpdateState -ne "UpdateInProgress" }).Count
              }
              Clusters = $readiness
          }
          $readinessExport | ConvertTo-Json -Depth 10 | Out-File $readinessJson -Encoding UTF8
          
          # Step 3: Generate JUnit XML for Azure DevOps Test tab
          Write-Host ""
          Write-Host "Step 3: Generating JUnit XML report..." -ForegroundColor Yellow
          
          $timestamp = Get-Date -Format "yyyy-MM-ddTHH:mm:ss"
          $totalTests = $readiness.Count
          $failures = @($readiness | Where-Object { $_.HealthState -eq "Failure" -or $_.UpdateState -eq "Failed" -or $_.HasPrerequisiteUpdates -ne "" }).Count
          $inProgress = @($readiness | Where-Object { $_.UpdateState -eq "UpdateInProgress" }).Count
          $ready = @($readiness | Where-Object { $_.ReadyForUpdate -eq $true }).Count
          $upToDate = @($readiness | Where-Object { $_.UpdateState -eq "UpToDate" }).Count
          
          $xmlContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites>
            <testsuite name="AzureLocalFleetUpdateStatus" tests="$totalTests" failures="$failures" errors="0" skipped="0" time="0" timestamp="$timestamp">
          "@
          
          foreach ($cluster in $readiness) {
              $clusterName = $cluster.ClusterName -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
              $testName = "UpdateStatus-$clusterName"
              $className = "AzureLocalFleetUpdateStatus.$($cluster.ResourceGroup)"
              
              $status = "passed"
              $failureMessage = ""
              $failureType = "UpdateFailure"
              
              if ($cluster.HealthState -eq "Failure" -or $cluster.UpdateState -eq "Failed") {
                  $status = "failed"
                  $failureType = "UpdateFailure"
                  $failureMessage = "Health: $($cluster.HealthState), UpdateState: $($cluster.UpdateState)"
                  if ($cluster.HealthCheckFailures) {
                      $failureMessage += ", Issues: $($cluster.HealthCheckFailures -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                  }
              }
              elseif ($cluster.HasPrerequisiteUpdates -ne "") {
                  $status = "failed"
                  $failureType = "HasPrerequisite"
                  $failureMessage = "Updates blocked by SBE prerequisite: $($cluster.HasPrerequisiteUpdates -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                  if ($cluster.SBEDependency) {
                      $failureMessage += " - Vendor: $($cluster.SBEDependency -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                  }
              }
              
              $systemOut = @"
          Cluster: $($cluster.ClusterName)
          Resource Group: $($cluster.ResourceGroup)
          Subscription: $($cluster.SubscriptionId)
          Update State: $($cluster.UpdateState)
          Health State: $($cluster.HealthState)
          Ready for Update: $($cluster.ReadyForUpdate)
          Has Prerequisite Updates: $($cluster.HasPrerequisiteUpdates)
          SBE Dependency: $($cluster.SBEDependency)
          Recommended Update: $($cluster.RecommendedUpdate)
          "@
              $systemOut = $systemOut -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
              
              $xmlContent += @"
          
              <testcase name="$testName" classname="$className" time="0">
                <system-out><![CDATA[$systemOut]]></system-out>
          "@
              
              if ($status -eq "failed") {
                  $xmlContent += @"
          
                <failure message="Cluster has update issues" type="$failureType">$failureMessage</failure>
          "@
              }
              
              $xmlContent += @"
          
              </testcase>
          "@
          }
          
          $xmlContent += @"
          
            </testsuite>
          </testsuites>
          "@
          
          $xmlContent | Out-File $readinessXml -Encoding UTF8
          Write-Host "JUnit XML saved to: $readinessXml" -ForegroundColor Green
          
          # Step 4: Collect additional fleet data using v0.5.6 fleet-wide capabilities
          # NOTE: Readiness (Step 2) already fetches summaries and available updates internally.
          # Steps 4a/4b re-export this data in dedicated CSV files for analysis.
          # Use ClusterResourceIds (not ClusterNames) to avoid redundant name-to-ID resolution.
          
          # Build resource ID list for downstream calls (avoids per-cluster name resolution)
          $fleetResourceIds = @()
          if ($scope -eq 'by-update-ring' -and $updateRing) {
              # For tag-based scope, get IDs from readiness results
              $fleetResourceIds = @($readiness | Where-Object { $_.SubscriptionId -and $_.ResourceGroup -and $_.ClusterName } | ForEach-Object {
                  "/subscriptions/$($_.SubscriptionId)/resourceGroups/$($_.ResourceGroup)/providers/Microsoft.AzureStackHCI/clusters/$($_.ClusterName)"
              })
          }
          else {
              $fleetResourceIds = @($inventory | Select-Object -ExpandProperty ResourceId)
          }
          
          # Step 4a: Get update summary across fleet
          Write-Host ""
          Write-Host "Step 4a: Collecting fleet update summaries..." -ForegroundColor Yellow
          
          $summaryCsv = Join-Path $outputDir "update-summaries.csv"
          $summaries = Get-AzureLocalUpdateSummary -ClusterResourceIds $fleetResourceIds -ThrottleLimit $throttle -ExportPath $summaryCsv -PassThru
          Write-Host "Update summaries collected for $($summaries.Count) cluster(s)" -ForegroundColor Green
          
          # Step 4b: Get available updates across fleet
          Write-Host ""
          Write-Host "Step 4b: Collecting available updates..." -ForegroundColor Yellow
          
          $availableCsv = Join-Path $outputDir "available-updates.csv"
          $available = Get-AzureLocalAvailableUpdates -ClusterResourceIds $fleetResourceIds -ExportPath $availableCsv -PassThru
          Write-Host "Found $($available.Count) available update(s) across fleet" -ForegroundColor Green
          
          # Step 4c: Optionally collect recent update runs using fleet-wide query
          if ($includeRuns) {
              Write-Host ""
              Write-Host "Step 4c: Collecting recent update run history..." -ForegroundColor Yellow
              
              $runsCsv = Join-Path $outputDir "update-runs.csv"
              $allRuns = Get-AzureLocalUpdateRuns -ClusterResourceIds $fleetResourceIds -Latest -ThrottleLimit $throttle -ExportPath $runsCsv -PassThru
              Write-Host "Update runs collected for $($allRuns.Count) cluster(s)" -ForegroundColor Green
              
              # Display summary
              $succeeded = @($allRuns | Where-Object { $_.State -eq 'Succeeded' }).Count
              $inProgressRuns = @($allRuns | Where-Object { $_.State -eq 'InProgress' }).Count
              $failedRuns = @($allRuns | Where-Object { $_.State -eq 'Failed' }).Count
              Write-Host "  Succeeded: $succeeded, In Progress: $inProgressRuns, Failed: $failedRuns"
          }
          
          # Step 5: Output summary
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Fleet Status Summary" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Total Clusters: $totalTests"
          Write-Host "Up to Date: $upToDate" -ForegroundColor Green
          Write-Host "Update In Progress: $inProgress" -ForegroundColor Yellow
          Write-Host "Ready for Update: $ready" -ForegroundColor Cyan
          Write-Host "Health Failures: $failures" -ForegroundColor $(if ($failures -gt 0) { "Red" } else { "Green" })
          
          # Set pipeline variables
          Write-Host "##vso[task.setvariable variable=totalClusters;isOutput=true]$totalTests"
          Write-Host "##vso[task.setvariable variable=upToDate;isOutput=true]$upToDate"
          Write-Host "##vso[task.setvariable variable=inProgress;isOutput=true]$inProgress"
          Write-Host "##vso[task.setvariable variable=ready;isOutput=true]$ready"
          Write-Host "##vso[task.setvariable variable=failures;isOutput=true]$failures"
          Write-Host "##vso[task.setvariable variable=hasPrerequisite;isOutput=true]$hasPrerequisite"
          
          if ($failures -gt 0) {
              Write-Warning "⚠️ $failures cluster(s) have update failures or health issues!"
          }
      name: collect
    
    # Publish JUnit test results to Azure DevOps Test tab
    - task: PublishTestResults@2
      displayName: 'Publish Fleet Status as Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(reportsPath)/readiness-status.xml'
        testRunTitle: 'Fleet Update Status - $(Build.BuildNumber)'
        mergeTestResults: false
        failTaskOnFailedTests: false  # Don't fail pipeline on test failures
    
    # Publish all reports as artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Fleet Status Reports'
      condition: always()
      inputs:
        PathtoPublish: '$(reportsPath)'
        ArtifactName: 'FleetStatusReports'
        publishLocation: 'Container'
    
    # Create summary in pipeline
    - pwsh: |
        $total = "$(collect.totalClusters)"
        $upToDate = "$(collect.upToDate)"
        $inProgress = "$(collect.inProgress)"
        $ready = "$(collect.ready)"
        $failures = "$(collect.failures)"
        $hasPrerequisite = "$(collect.hasPrerequisite)"
        
        Write-Host "##vso[task.uploadsummary]Fleet Status: $total clusters, $upToDate up-to-date, $inProgress in-progress, $ready ready, $failures failures, $hasPrerequisite SBE-blocked"
        
        $summary = @"
        ## 📊 Fleet Update Status Summary
        
        | Metric | Count |
        |--------|-------|
        | **Total Clusters** | $total |
        | **Up to Date** | $upToDate |
        | **Update In Progress** | $inProgress |
        | **Ready for Update** | $ready |
        | **SBE Prerequisite Blocked** | $hasPrerequisite |
        | **Health Failures** | $failures |
        "@
        
        # Actions Required section
        $actionsRequired = @()
        if ([int]$failures -gt 0) { $actionsRequired += "- **$failures cluster(s) have health failures** - Resolve critical health check issues in Azure Portal" }
        if ([int]$hasPrerequisite -gt 0) { $actionsRequired += "- **$hasPrerequisite cluster(s) blocked by SBE prerequisite** - Install the required Solution Builder Extension (SBE) update from the hardware vendor. See ``available-updates.csv`` for vendor details" }
        
        if ($actionsRequired.Count -gt 0) {
            $summary += "`n`n### Actions Required`n`n"
            $summary += ($actionsRequired -join "`n")
        }
        
        $summary += @"
        
        ### Reports Available in Artifacts
        - `readiness-status.csv` - Detailed cluster status
        - `readiness-status.json` - Machine-readable format
        - `readiness-status.xml` - JUnit XML (see Tests tab)
        - `cluster-inventory.csv` - Full cluster inventory
        - `update-summaries.csv` - Fleet-wide update state summaries
        - `available-updates.csv` - All available updates across fleet
        - `update-runs.csv` - Recent update run history
        "@
        
        Write-Host $summary
      displayName: 'Display Status Summary'
      condition: always()
