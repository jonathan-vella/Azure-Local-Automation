# Step.7 - Fleet Health Status Monitoring Pipeline
# This pipeline surfaces 24-hour system health-check failures across every Azure Local
# cluster the service connection can read - including clusters that are already
# "up to date" with no available updates. The 24-hour health checks continue to run
# on the cluster even when no update is in flight, so this pipeline is the dedicated
# place to triage fleet-wide health issues that exist OUTSIDE the update workflow.
#
# USE CASES:
# - Daily / weekly fleet-wide Critical & Warning health audit
# - Executive dashboard: "which failure reason hits the most clusters?"
# - Compliance tracking for cluster health, independent of update activity
# - Triage hand-off into ITSM: the JUnit XML and CSV exports are ready-made
#   incident payloads
#
# REPORTS GENERATED:
# - Pipeline run summary (uploaded via ##vso[task.uploadsummary]): pivoted by
#   FailureReason (top failures by cluster impact), with a per-cluster "Detailed
#   Results" table further down.
# - JUnit XML: published to the Test Results tab. One <testcase> per (cluster,
#   failing health check), grouped under "Critical Health Failures" /
#   "Warning Health Failures" testsuites for two-level drill-down.
# - CSV (detail):  fleet-health-detail.csv  - one row per (cluster, failing check)
# - CSV (summary): fleet-health-summary.csv - one row per (FailureReason, Severity)
# - JSON: same shape, machine-readable for downstream automation
#
# AUTHENTICATION:
# Uses Workload Identity Federation (OIDC) - recommended for secretless authentication.

# BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
# Edits inside this block are preserved across Update-AzureLocalPipelineExample
# module upgrades. Add or modify `schedules:` blocks below.
trigger: none  # Manual or scheduled only

schedules:
  # Run daily at 7 AM UTC (offset from fleet-update-status which runs at 06:00)
  - cron: '0 7 * * *'
    displayName: 'Daily Fleet Health Check'
    branches:
      include:
        - main
    always: true
# END-AZLOCAL-CUSTOMIZE:schedule-triggers

parameters:
  - name: scope
    displayName: 'Scope of clusters to check'
    type: string
    default: 'all'
    values:
      - 'all'
      - 'by-update-ring'

  - name: updateRing
    # v0.7.66: accepts single ring, 'Prod;Ring2' list, or '***' wildcard (three stars - deliberate).
    displayName: "UpdateRing tag value (only used when scope=by-update-ring). Single, 'Prod;Ring2', or '***'."
    type: string
    default: ''

  - name: severity
    displayName: 'Severity filter at Resource Graph (default All = Critical + Warning; Informational always excluded)'
    type: string
    default: 'All'
    values:
      - 'All'
      - 'Critical'
      - 'Warning'

  - name: moduleVersion
    displayName: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
    type: string
    default: ''

  # --- ITSM Connector (v0.7.70 Phase D: ServiceNow auto-raise on fleet-health failures) ---
  # Set raiseItsmTicket=true to open ServiceNow incidents from each Critical /
  # Warning health-check failure published by this pipeline. Default is false
  # so existing schedules stay byte-identical until you opt in. The connector
  # reads the JUnit file Step.7 already produces (fleet-health-status.xml) and
  # the trigger matrix in ./.itsm/azurelocal-itsm.yml. Dedupe granularity is
  # one ticket per (cluster, failing health check) pair - FailureReason is fed
  # into the UpdateName slot of the SHA256 dedupe key.
  - name: raiseItsmTicket
    displayName: 'Open ITSM tickets (ServiceNow) for fleet-health failures'
    type: boolean
    default: false

  - name: itsmConfigPath
    displayName: 'Path to ITSM matrix config (YAML or JSON)'
    type: string
    default: './.itsm/azurelocal-itsm.yml'

  - name: itsmDryRun
    displayName: 'ITSM: build payloads + run read-only dedupe but do NOT create tickets'
    type: boolean
    default: false

  - name: itsmForceCreate
    displayName: 'ITSM: bypass dedupe and always create new tickets (use with caution)'
    type: boolean
    default: false

variables:
  # Module version this YAML was generated against. The install step compares this to
  # the version actually installed and to the latest on PSGallery, and emits a warning
  # log if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.70'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): queue-time parameter > pipeline variable
  # 'REQUIRED_MODULE_VERSION' overridden at queue time > empty (latest).
  REQUIRED_MODULE_VERSION: '${{ parameters.moduleVersion }}'
  reportsPath: '$(Build.ArtifactStagingDirectory)/reports'
  # ITSM connector (v0.7.70 Phase D). When raiseItsmTicket=true the Raise ITSM
  # task below references $(ITSM_SN_INSTANCE_URL), $(ITSM_SN_CLIENT_ID),
  # $(ITSM_SN_CLIENT_SECRET). The simplest binding is an ADO variable group
  # named 'AzureLocal-ITSM-Secrets'. ADO does not allow mixing mapping-form
  # variables with '- group:' entries in the same block, so to enable the
  # group reference convert this entire 'variables:' block to list form:
  #   variables:
  #     - name: GENERATED_AGAINST_MODULE_VERSION
  #       value: '0.7.70'
  #     - name: REQUIRED_MODULE_VERSION
  #       value: '${{ parameters.moduleVersion }}'
  #     - name: reportsPath
  #       value: '$(Build.ArtifactStagingDirectory)/reports'
  #     - group: AzureLocal-ITSM-Secrets
  # When raiseItsmTicket=false the Raise ITSM task is skipped and the secrets
  # are not consulted, so the conversion is only required for opt-in users.

stages:
- stage: FleetHealth
  displayName: 'Collect Fleet Health Status'
  jobs:
  - job: CollectHealth
    displayName: 'Collect and Report Fleet Health'
    pool:
      vmImage: 'windows-latest'

    steps:
    - checkout: self
      displayName: 'Checkout repository'

    - task: PowerShell@2
      displayName: 'Install AzLocal.UpdateManagement from PSGallery'
      env:
        REQUIRED_MODULE_VERSION: $(REQUIRED_MODULE_VERSION)
        GENERATED_AGAINST_MODULE_VERSION: $(GENERATED_AGAINST_MODULE_VERSION)
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = 'Stop'
          $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
          if ($env:REQUIRED_MODULE_VERSION) {
              $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
              Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
          } else {
              Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
          }
          Install-Module @installArgs
          Import-Module AzLocal.UpdateManagement -Force
          $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
          $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
          $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
          Write-Host ""
          Write-Host "Module version summary"
          Write-Host "  Installed on agent        : $installed"
          Write-Host "  YAML generated against    : $generated"
          Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
          Write-Host ""
          # Drift signal 0 (v0.7.66): the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
          if ($installed -lt $generated) {
              Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$installed is OLDER than the version this pipeline YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzureLocalPipelineExample -Platform AzureDevOps -Update'."
          }
          if ($installed -gt $generated) {
              Write-Host "##vso[task.logissue type=warning]Pipeline YAML was generated against AzLocal.UpdateManagement v$generated but the agent installed v$installed. Refresh via 'Copy-AzureLocalPipelineExample -Platform AzureDevOps -Update'."
          }
          if ($latest -and ($latest -gt $installed)) {
              Write-Host "##vso[task.logissue type=warning]AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed."
          }

    - task: AzureCLI@2
      displayName: 'Collect Fleet Health Failures'
      inputs:
        # Replace with your service connection name
        azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Stop'
          az extension add --name resource-graph --yes
          Import-Module AzLocal.UpdateManagement -Force

          $outputDir = "$(reportsPath)"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $scope    = "${{ parameters.scope }}"
          $ring     = "${{ parameters.updateRing }}"
          $severity = "${{ parameters.severity }}"

          Write-Host "========================================"
          Write-Host "Fleet Health Status Collection"
          Write-Host "========================================"
          Write-Host "Scope     : $scope"
          Write-Host "Severity  : $severity"
          if ($scope -eq 'by-update-ring' -and $ring) { Write-Host "UpdateRing: $ring" }
          Write-Host ""

          $argSplat = @{ Severity = $severity }
          if ($scope -eq 'by-update-ring' -and $ring) { $argSplat.UpdateRingTag = $ring }

          # Pull DETAIL view once. Both the JUnit emitter below and the markdown
          # "Detailed Results" table consume this same in-memory collection.
          $detailCsv  = Join-Path $outputDir 'fleet-health-detail.csv'
          $detailJson = Join-Path $outputDir 'fleet-health-detail.json'
          $detail     = Get-AzureLocalFleetHealthFailures -View Detail @argSplat -ExportPath $detailCsv -PassThru
          if (-not $detail) { $detail = @() }
          $detail | ConvertTo-Json -Depth 6 | Out-File -FilePath $detailJson -Encoding utf8

          # SUMMARY view (grouped by FailureReason, Severity) - aggregated in-process.
          # v0.7.70: AffectedClusters uses '; ' separator (matches cmdlet); adds positionally-paired
          # AffectedClusterPortalUrls so the markdown task below can zip them into hyperlinks.
          # Severity sorts FIRST (Critical before Warning) regardless of cluster count.
          $summary = @()
          if ($detail.Count -gt 0) {
              $summary = @(
                  $detail | Group-Object -Property FailureReason, Severity | ForEach-Object {
                      $first       = $_.Group | Select-Object -First 1
                      $clusterList = @($_.Group | Select-Object -ExpandProperty ClusterName -Unique | Sort-Object)
                      $clusterPortalUrls = @(
                          foreach ($cn in $clusterList) {
                              $portalRow = $_.Group | Where-Object { $_.ClusterName -eq $cn } | Select-Object -First 1
                              if ($portalRow -and $portalRow.ClusterPortalUrl) { $portalRow.ClusterPortalUrl } else { '' }
                          }
                      )
                      $latest      = ($_.Group | Measure-Object -Property LastOccurrence -Maximum).Maximum
                      [PSCustomObject]@{
                          FailureReason             = $first.FailureReason
                          Severity                  = $first.Severity
                          ClusterCount              = $clusterList.Count
                          FailureCount              = $_.Group.Count
                          AffectedClusters          = ($clusterList -join '; ')
                          AffectedClusterPortalUrls = ($clusterPortalUrls -join '; ')
                          LatestOccurrence          = $latest
                          Description               = $first.Description
                          Remediation               = $first.Remediation
                      }
                  } | Sort-Object @{Expression={ if($_.Severity -eq 'Critical'){1}elseif($_.Severity -eq 'Warning'){2}else{3} };Descending=$false},
                                  @{Expression={$_.ClusterCount};Descending=$true},
                                  @{Expression={$_.FailureCount};Descending=$true}
              )
          }
          $summaryCsv  = Join-Path $outputDir 'fleet-health-summary.csv'
          $summaryJson = Join-Path $outputDir 'fleet-health-summary.json'
          $summary | Export-Csv -Path $summaryCsv -NoTypeInformation -Force
          $summary | ConvertTo-Json -Depth 6 | Out-File -FilePath $summaryJson -Encoding utf8

          # ------------------------------------------------------------------
          # Emit JUnit XML pivoted by Severity -> FailureReason -> Cluster.
          # ------------------------------------------------------------------
          $xmlPath = Join-Path $outputDir 'fleet-health-status.xml'
          $criticalDetail = @($detail | Where-Object { $_.Severity -eq 'Critical' })
          $warningDetail  = @($detail | Where-Object { $_.Severity -eq 'Warning'  })
          $totalClusters  = @($detail | Select-Object -ExpandProperty ClusterName -Unique).Count
          $totalFailures  = $detail.Count
          $criticalCount  = $criticalDetail.Count
          $warningCount   = $warningDetail.Count

          function Convert-XmlEscape([string]$s) {
              if ($null -eq $s) { return '' }
              ($s.Replace('&','&amp;').Replace('<','&lt;').Replace('>','&gt;').Replace('"','&quot;').Replace("'",'&apos;'))
          }

          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
          [void]$sb.AppendFormat('<testsuites name="AzureLocalFleetHealthStatus" tests="{0}" failures="{1}">' + "`n", $totalFailures, $totalFailures)
          foreach ($severityLabel in @('Critical','Warning')) {
              $rows = if ($severityLabel -eq 'Critical') { $criticalDetail } else { $warningDetail }
              if (-not $rows -or $rows.Count -eq 0) { continue }
              $suiteName = "$severityLabel Health Failures"
              [void]$sb.AppendFormat('  <testsuite name="{0}" tests="{1}" failures="{1}">' + "`n", (Convert-XmlEscape $suiteName), $rows.Count)
              foreach ($r in $rows) {
                  $caseName = "{0} :: {1}" -f $r.ClusterName, $r.FailureReason
                  [void]$sb.AppendFormat('    <testcase classname="{0}" name="{1}">' + "`n",
                      (Convert-XmlEscape $r.ClusterName),
                      (Convert-XmlEscape $caseName))
                  # v0.7.70: per-testcase <properties> for the ITSM connector.
                  # The dedupe key is SHA256(ClusterResourceId | UpdateName | Category).
                  # Step.7 is not about updates - so we stuff FailureReason into the
                  # UpdateName slot. That gives one ticket per (cluster, failing health
                  # check) pair, which is the intended granularity for fleet-health.
                  $clusterResId = if ($r.PSObject.Properties.Match('ClusterResourceId').Count -gt 0) { [string]$r.ClusterResourceId } else { '' }
                  $clusterPortalUrl = if ($r.PSObject.Properties.Match('ClusterPortalUrl').Count -gt 0) { [string]$r.ClusterPortalUrl } else { '' }
                  $targetResName    = if ($r.PSObject.Properties.Match('TargetResourceName').Count -gt 0) { [string]$r.TargetResourceName } else { '' }
                  $targetResType    = if ($r.PSObject.Properties.Match('TargetResourceType').Count -gt 0) { [string]$r.TargetResourceType } else { '' }
                  [void]$sb.AppendLine('      <properties>')
                  [void]$sb.AppendFormat('        <property name="ClusterName" value="{0}"/>' + "`n",      (Convert-XmlEscape $r.ClusterName))
                  [void]$sb.AppendFormat('        <property name="ClusterResourceId" value="{0}"/>' + "`n", (Convert-XmlEscape $clusterResId))
                  [void]$sb.AppendFormat('        <property name="UpdateName" value="{0}"/>' + "`n",        (Convert-XmlEscape $r.FailureReason))
                  [void]$sb.AppendFormat('        <property name="Status" value="{0}"/>' + "`n",            (Convert-XmlEscape $r.Severity))
                  [void]$sb.AppendFormat('        <property name="FailureReason" value="{0}"/>' + "`n",     (Convert-XmlEscape $r.FailureReason))
                  [void]$sb.AppendFormat('        <property name="Severity" value="{0}"/>' + "`n",          (Convert-XmlEscape $r.Severity))
                  [void]$sb.AppendFormat('        <property name="ClusterPortalUrl" value="{0}"/>' + "`n",  (Convert-XmlEscape $clusterPortalUrl))
                  [void]$sb.AppendFormat('        <property name="TargetResourceName" value="{0}"/>' + "`n", (Convert-XmlEscape $targetResName))
                  [void]$sb.AppendFormat('        <property name="TargetResourceType" value="{0}"/>' + "`n", (Convert-XmlEscape $targetResType))
                  [void]$sb.AppendLine('      </properties>')
                  $msg  = "{0}: {1} (last occurred {2:yyyy-MM-ddTHH:mm:ssZ})" -f $r.Severity, $r.FailureReason, $r.LastOccurrence
                  # v0.7.70: failure body adds TargetResourceName, TargetResourceType, and ClusterPortalUrl
                  # so reviewers reading the JUnit XML can click straight to the cluster blade in the
                  # Azure portal and see which specific resource failed.
                  $bodyLines = @(
                      $r.Description,
                      $r.Remediation,
                      "ResourceGroup: $($r.ResourceGroup)",
                      "SubscriptionId: $($r.SubscriptionId)"
                  )
                  if ($r.PSObject.Properties.Match('TargetResourceName').Count -gt 0 -and $r.TargetResourceName) {
                      $bodyLines += "TargetResourceName: $($r.TargetResourceName)"
                  }
                  if ($r.PSObject.Properties.Match('TargetResourceType').Count -gt 0 -and $r.TargetResourceType) {
                      $bodyLines += "TargetResourceType: $($r.TargetResourceType)"
                  }
                  if ($r.PSObject.Properties.Match('ClusterPortalUrl').Count -gt 0 -and $r.ClusterPortalUrl) {
                      $bodyLines += "ClusterPortalUrl: $($r.ClusterPortalUrl)"
                  }
                  $body = $bodyLines -join "`n"
                  [void]$sb.AppendFormat('      <failure type="{0}" message="{1}">{2}</failure>' + "`n",
                      (Convert-XmlEscape $r.Severity),
                      (Convert-XmlEscape $msg),
                      (Convert-XmlEscape $body))
                  [void]$sb.AppendLine('    </testcase>')
              }
              [void]$sb.AppendLine('  </testsuite>')
          }
          if ($totalFailures -eq 0) {
              [void]$sb.AppendLine('  <testsuite name="Fleet Health" tests="1" failures="0">')
              [void]$sb.AppendLine('    <testcase classname="Fleet Health" name="No Critical or Warning health-check failures across the fleet" />')
              [void]$sb.AppendLine('  </testsuite>')
          }
          [void]$sb.AppendLine('</testsuites>')
          $sb.ToString() | Out-File -FilePath $xmlPath -Encoding utf8

          # ------------------------------------------------------------------
          # v0.7.70: Fleet Health Overview (one row per cluster, ARG-first projection
          # of cluster + updateSummaries for fleet-scale performance). Separate cmdlet from
          # the failures view above so a fleet with zero failing checks still gets
          # an overview-level rollup (last-checked age, current version, SBE
          # version, Azure connection, node count).
          # ------------------------------------------------------------------
          $overviewArgs = @{}
          if ($scope -eq 'by-update-ring' -and $ring) { $overviewArgs.UpdateRingTag = $ring }
          $overviewCsv  = Join-Path $outputDir 'fleet-health-overview.csv'
          $overviewJson = Join-Path $outputDir 'fleet-health-overview.json'
          $overview     = Get-AzLocalFleetHealthOverview @overviewArgs -ExportPath $overviewCsv -PassThru
          if (-not $overview) { $overview = @() }
          $overview | ConvertTo-Json -Depth 6 | Out-File -FilePath $overviewJson -Encoding utf8

          # Persist counts for the summary task below.
          "##vso[task.setvariable variable=totalClusters;isOutput=true]$totalClusters"   | Write-Host
          "##vso[task.setvariable variable=totalFailures;isOutput=true]$totalFailures"   | Write-Host
          "##vso[task.setvariable variable=criticalCount;isOutput=true]$criticalCount"   | Write-Host
          "##vso[task.setvariable variable=warningCount;isOutput=true]$warningCount"     | Write-Host
          "##vso[task.setvariable variable=distinctReasons;isOutput=true]$($summary.Count)" | Write-Host
          "##vso[task.setvariable variable=overviewRows;isOutput=true]$($overview.Count)"   | Write-Host

          Write-Host ""
          Write-Host "Fleet Health Collection complete:"
          Write-Host "  Affected clusters       : $totalClusters"
          Write-Host "  Total failing checks    : $totalFailures (Critical=$criticalCount, Warning=$warningCount)"
          Write-Host "  Distinct failure reasons: $($summary.Count)"
          Write-Host "  Overview rows           : $($overview.Count)"
      name: collect

    # v0.7.66: compute a UTC timestamp variable so every downloadable artifact name is unique per run.
    - pwsh: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        Write-Host "##vso[task.setvariable variable=artifactStamp;isOutput=true]$stamp"
        Write-Host "Artifact timestamp: $stamp"
      displayName: 'Compute Artifact Timestamp'
      condition: always()
      name: stamp

    # Publish artifacts first (lightweight), then summary, then JUnit. Summary
    # is uploaded via ##vso[task.uploadsummary] in the next step, which makes it
    # the first thing visible on the run extensions tab.
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Fleet Health Reports'
      condition: always()
      inputs:
        PathtoPublish: '$(reportsPath)'
        ArtifactName: 'azlocal-fleet-health-status-report_$(stamp.artifactStamp)'
        publishLocation: 'Container'

    # Create the markdown summary FIRST (before PublishTestResults below) so the
    # uploaded summary appears at the top of the pipeline run extensions view.
    - pwsh: |
        $total    = "$(collect.totalClusters)"
        $failures = "$(collect.totalFailures)"
        $crit     = "$(collect.criticalCount)"
        $warn     = "$(collect.warningCount)"
        $reasons  = "$(collect.distinctReasons)"
        $ovRows   = "$(collect.overviewRows)"

        Write-Host "##vso[task.uploadsummary]Fleet Health: $total clusters affected, $failures failing check(s) ($crit Critical / $warn Warning) across $reasons reason(s); overview rows = $ovRows"

        $summaryPath  = Join-Path '$(reportsPath)' 'fleet-health-summary.csv'
        $detailPath   = Join-Path '$(reportsPath)' 'fleet-health-detail.csv'
        $overviewPath = Join-Path '$(reportsPath)' 'fleet-health-overview.csv'
        $summaryRows  = if (Test-Path $summaryPath)  { @(Import-Csv -Path $summaryPath)  } else { @() }
        $detailRows   = if (Test-Path $detailPath)   { @(Import-Csv -Path $detailPath)   } else { @() }
        $overviewRows = if (Test-Path $overviewPath) { @(Import-Csv -Path $overviewPath) } else { @() }

        $md = @"
        ## Fleet Health Status Summary

        | Metric | Count |
        |--------|-------|
        | **Affected Clusters** | $total |
        | **Total Failing Checks** | $failures |
        | **Critical** | $crit |
        | **Warning** | $warn |
        | **Distinct Failure Reasons** | $reasons |

        ### Health Check Failures By Reason (most widespread first)
        "@

        if ($summaryRows.Count -eq 0) {
            $md += "`n`n*No Critical or Warning health-check failures across the fleet.*`n"
        } else {
            $md += "`n`n| Severity | Failure Reason | Cluster Count | Failure Count | Affected Clusters | Latest |`n"
            $md += "|----------|----------------|---------------|---------------|--------------------|--------|`n"
            foreach ($r in ($summaryRows | Select-Object -First 25)) {
                $sevTag = if ($r.Severity -eq 'Critical') { '[Critical]' } else { '[Warning]' }
                # v0.7.70: zip AffectedClusters with AffectedClusterPortalUrls to render markdown
                # hyperlinks. Cap at first 10 names then '... (+N more)' so widespread failures stay
                # readable; full list is in the CSV artifact.
                $names = if ($r.AffectedClusters) { @($r.AffectedClusters -split '; ') } else { @() }
                $urls  = if ($r.AffectedClusterPortalUrls) { @($r.AffectedClusterPortalUrls -split '; ') } else { @() }
                $linkedParts = for ($i = 0; $i -lt $names.Count; $i++) {
                    $n = $names[$i]
                    $u = if ($i -lt $urls.Count) { $urls[$i] } else { '' }
                    if ($u) { '[{0}]({1})' -f $n, $u } else { $n }
                }
                $clList = if ($linkedParts.Count -le 10) {
                    $linkedParts -join ', '
                } else {
                    (($linkedParts | Select-Object -First 10) -join ', ') + (' ... (+{0} more)' -f ($linkedParts.Count - 10))
                }
                $md += ('| {0} | {1} | {2} | {3} | {4} | {5} |' -f $sevTag, $r.FailureReason, $r.ClusterCount, $r.FailureCount, $clList, $r.LatestOccurrence) + "`n"
            }
            if ($summaryRows.Count -gt 25) {
                $md += "`n*Showing top 25 failure reasons of $($summaryRows.Count); see ``fleet-health-summary.csv`` artifact for the full list.*`n"
            }
        }

        $md += "`n### Detailed Results (per-cluster, per-failure)`n"

        if ($detailRows.Count -eq 0) {
            $md += "`n*No detail rows.*`n"
        } else {
            # v0.7.70: cluster name linkifies to ClusterPortalUrl; +3 columns (Failure Remediation,
            # Target Resource Name, Target Resource Type). Remediation auto-linkifies when value
            # starts 'https://' so docs links are one click away.
            $md += "`n| Cluster | Severity | Failure Reason | Failure Remediation | Target Resource Name | Target Resource Type | Last Occurrence | Resource Group |`n"
            $md += "|---------|----------|----------------|---------------------|----------------------|----------------------|------------------|----------------|`n"
            foreach ($r in ($detailRows | Select-Object -First 100)) {
                $sevTag      = if ($r.Severity -eq 'Critical') { '[Critical]' } else { '[Warning]' }
                $clusterCell = if ($r.PSObject.Properties.Match('ClusterPortalUrl').Count -gt 0 -and $r.ClusterPortalUrl) {
                    '[{0}]({1})' -f $r.ClusterName, $r.ClusterPortalUrl
                } else {
                    $r.ClusterName
                }
                $rem = if ($r.PSObject.Properties.Match('Remediation').Count -gt 0) { [string]$r.Remediation } else { '' }
                $remCell = if ($rem -and $rem.StartsWith('https://')) { '[link]({0})' -f $rem } else { $rem }
                $tName = if ($r.PSObject.Properties.Match('TargetResourceName').Count -gt 0) { [string]$r.TargetResourceName } else { '' }
                $tType = if ($r.PSObject.Properties.Match('TargetResourceType').Count -gt 0) { [string]$r.TargetResourceType } else { '' }
                $md += ('| {0} | {1} | {2} | {3} | {4} | {5} | {6} | {7} |' -f $clusterCell, $sevTag, $r.FailureReason, $remCell, $tName, $tType, $r.LastOccurrence, $r.ResourceGroup) + "`n"
            }
            if ($detailRows.Count -gt 100) {
                $md += "`n*Showing first 100 rows of $($detailRows.Count); see ``fleet-health-detail.csv`` artifact for the full list.*`n"
            }
        }

        # v0.7.70: NEW section - Fleet Health Overview (fleet rollup, one row per cluster).
        # Sourced from Get-AzLocalFleetHealthOverview. HealthResultsAgeDays surfaces clusters whose
        # 24-hour health check has not run in a while (negative = no LastChecked at all).
        $md += "`n### Fleet Health Overview (fleet rollup)`n"
        if ($overviewRows.Count -eq 0) {
            $md += "`n*No clusters returned from Get-AzLocalFleetHealthOverview.*`n"
        } else {
            $md += "`n| Cluster | Health | Update Status | Current Version | SBE Version | Azure Connection | Last Checked | Age (days) | Node Count |`n"
            $md += "|---------|--------|---------------|------------------|--------------|------------------|---------------|------------|------------|`n"
            foreach ($o in ($overviewRows | Select-Object -First 100)) {
                $clusterCell = if ($o.ClusterPortalUrl) {
                    '[{0}]({1})' -f $o.ClusterName, $o.ClusterPortalUrl
                } else {
                    $o.ClusterName
                }
                $healthTag = switch ($o.HealthStatus) {
                    'Healthy'              { '[OK]' }
                    'Critical'             { '[Critical]' }
                    'Warning'              { '[Warning]' }
                    'In progress'          { '[In progress]' }
                    'Health check failed'  { '[Failed]' }
                    default                { '[' + $o.HealthStatus + ']' }
                }
                $md += ('| {0} | {1} | {2} | {3} | {4} | {5} | {6} | {7} | {8} |' -f $clusterCell, $healthTag, $o.UpdateStatus, $o.CurrentVersion, $o.SbeVersion, $o.AzureConnection, $o.LastChecked, $o.HealthResultsAgeDays, $o.NodeCount) + "`n"
            }
            if ($overviewRows.Count -gt 100) {
                $md += "`n*Showing first 100 clusters of $($overviewRows.Count); see ``fleet-health-overview.csv`` artifact for the full list.*`n"
            }
        }

        $md += @"

        ### Reports Available in Artifacts
        - ``fleet-health-detail.csv`` - one row per (cluster, failing health check)
        - ``fleet-health-summary.csv`` - one row per (FailureReason, Severity); ordered Critical-first, then by ClusterCount desc
        - ``fleet-health-overview.csv`` - one row per cluster (ARG-first fleet health summary)
        - ``fleet-health-detail.json`` / ``fleet-health-summary.json`` / ``fleet-health-overview.json`` - machine-readable
        - ``fleet-health-status.xml`` - JUnit XML (see Tests tab)
        "@

        Write-Host $md
      displayName: 'Display Fleet Health Summary'
      condition: always()

    # Publish JUnit test results LAST so the Test Results tab is populated but the
    # markdown summary above is the first thing visible on the run extensions view.
    - task: PublishTestResults@2
      displayName: 'Publish Fleet Health as Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(reportsPath)/fleet-health-status.xml'
        testRunTitle: 'Fleet Health Status - $(Build.BuildNumber)'
        mergeTestResults: false
        failTaskOnFailedTests: false  # Don't fail pipeline on health failures

    # ----------------------------------------------------------------------
    # ITSM Connector (v0.7.70 Phase D - ServiceNow auto-raise on fleet-health failures)
    #
    # Fully opt-in (gated on parameters.raiseItsmTicket == true). Runs AFTER
    # PublishTestResults so the fleet-health-status surfaces its own results
    # first; ITSM is strictly additive - failures here never affect the
    # pipeline exit code.
    #
    # Reads the same fleet-health-status.xml that powers the run summary.
    # The JUnit emitter writes per-testcase <properties> (ClusterName /
    # ClusterResourceId / UpdateName=FailureReason / Status=Severity /
    # FailureReason / Severity / ClusterPortalUrl / TargetResourceName /
    # TargetResourceType) so New-AzureLocalIncident can compute the SHA256
    # dedupe key (one ticket per cluster + failing check) and the Mustache
    # body template can deep-link straight into the cluster blade.
    # ----------------------------------------------------------------------
    - task: PowerShell@2
      displayName: 'Install powershell-yaml (ITSM config parser)'
      condition: and(succeeded(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
              Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber
          }

    - task: AzureCLI@2
      displayName: 'Raise ITSM tickets'
      name: itsm
      condition: and(succeeded(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      env:
        # BEGIN-AZLOCAL-CUSTOMIZE:itsm-secrets
        # Bind your ITSM connector secrets from the variable group above.
        # Defaults assume the ServiceNow OAuth client_credentials naming used
        # by azurelocal-itsm.yml (env://ITSM_SN_*). If your secret names differ,
        # update them here - this block is preserved by
        # Update-AzureLocalPipelineExample across module upgrades.
        ITSM_SN_INSTANCE_URL: $(ITSM_SN_INSTANCE_URL)
        ITSM_SN_CLIENT_ID: $(ITSM_SN_CLIENT_ID)
        ITSM_SN_CLIENT_SECRET: $(ITSM_SN_CLIENT_SECRET)
        # END-AZLOCAL-CUSTOMIZE:itsm-secrets
      inputs:
        azureSubscription: 'AzureLocal-ServiceConnection'  # Update with your service connection name
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          Import-Module AzLocal.UpdateManagement -Force

          $configPath = "${{ parameters.itsmConfigPath }}"
          $dryRun     = [System.Convert]::ToBoolean("${{ parameters.itsmDryRun }}")
          $force      = [System.Convert]::ToBoolean("${{ parameters.itsmForceCreate }}")

          if (-not (Test-Path $configPath)) {
              Write-Host "##vso[task.logissue type=warning]ITSM config not found at '$configPath' - skipping ticket creation."
              exit 0
          }

          $cfg = Get-AzureLocalItsmConfig -Path $configPath

          $junitInput = "$(reportsPath)/fleet-health-status.xml"
          if (-not (Test-Path $junitInput)) {
              Write-Host "##vso[task.logissue type=warning]No fleet-health-status.xml found at '$junitInput' - skipping ticket creation."
              exit 0
          }

          $params = @{
              InputArtifactPath = $junitInput
              Config            = $cfg
              RunMetadata       = @{
                  Platform = 'azure-devops'
                  RunId    = $env:BUILD_BUILDID
                  RunUrl   = "$($env:SYSTEM_COLLECTIONURI)$($env:SYSTEM_TEAMPROJECT)/_build/results?buildId=$($env:BUILD_BUILDID)"
                  Branch   = $env:BUILD_SOURCEBRANCH
              }
              DryRun            = $dryRun
              ForceCreate       = $force
              ExportPath        = "$(reportsPath)/itsm-results.csv"
              ExportJUnitPath   = "$(reportsPath)/itsm-results.xml"
          }

          $results = New-AzureLocalIncident @params
          $results | Format-Table ClusterName, Action, TicketId, Severity -AutoSize

    - task: PublishBuildArtifacts@1
      displayName: 'Publish ITSM Artefacts'
      condition: and(always(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      inputs:
        PathtoPublish: '$(reportsPath)'
        ArtifactName: 'azlocal-fleet-health-status-itsm-results_$(stamp.artifactStamp)'
        publishLocation: 'Container'
      continueOnError: true

    - task: PublishTestResults@2
      displayName: 'Publish ITSM Test Results'
      condition: and(always(), eq('${{ parameters.raiseItsmTicket }}', 'true'))
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(reportsPath)/itsm-results.xml'
        testRunTitle: 'ITSM Tickets (Step.7) - $(Build.BuildNumber)'
        failTaskOnFailedTests: false
