# Apply Updates to Azure Local Clusters
# This workflow applies updates to clusters filtered by UpdateRing tag value
#
# AUTHENTICATION OPTIONS:
# This workflow supports two authentication methods:
# 1. OpenID Connect (OIDC) - RECOMMENDED - No secrets, uses federated credentials
# 2. Client Secret - LEGACY - Requires AZURE_CLIENT_SECRET (see commented section)
#
# For OIDC setup, see: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect

# Workflow name carries the same Step.N - prefix as the filename so the GitHub
# Actions sidebar (which sorts workflows alphabetically by this `name:` field)
# lists the eight pipelines in execution order.
name: Step.6 - Apply Updates

on:
  # BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
  # PREFERRED PATTERN - drive automated update runs from a ring-aware
  # schedule file (apply-updates-schedule.yml at the repo root by default),
  # not from per-window crons.
  #
  # How it works:
  #   1. The resolver step in check-readiness reads apply-updates-schedule.yml,
  #      computes the current (cycleWeek, dayOfWeek) tuple in UTC, and returns
  #      the eligible UpdateRing tag value(s) for THIS firing.
  #   2. If no schedule row matches today, the resolver logs the reason and
  #      check-readiness sets ready_count=0 - apply-updates is skipped cleanly
  #      (exit 0, no errors).
  #   3. If the schedule file is MISSING and the trigger is `schedule:` (not
  #      workflow_dispatch), the resolver hard-fails with a remediation pointing
  #      at New-AzLocalApplyUpdatesScheduleConfig.
  #
  # Generate a STRAWMAN schedule file from your fleet via:
  #   New-AzLocalApplyUpdatesScheduleConfig -OutputPath .\.github\apply-updates-schedule.yml
  # Every row is commented out by default - review and uncomment to activate.
  #
  # Recommended cron: once per day at a low-traffic time (the resolver is
  # day-grain; firing more often is wasteful but harmless thanks to readiness
  # idempotency). Example - 06:00 UTC every day:
  #   schedule:
  #     - cron: '0 6 * * *'
  #
  # The legacy per-UpdateWindow cron pattern still works (one cron per window),
  # but ring resolution then defaults to the workflow_dispatch input default,
  # which is rarely what schedule-triggered runs actually want.
  #
  # Content between BEGIN/END markers is preserved by
  # Update-AzLocalPipelineExample across module upgrades.
  # END-AZLOCAL-CUSTOMIZE:schedule-triggers

  workflow_dispatch:
    inputs:
      update_ring:
        # accepts a single ring (Wave1), a semicolon-delimited list (Prod;Ring2),
        # or '***' (three stars - deliberate, not a typo) to match every cluster that HAS the UpdateRing tag set.
        description: "UpdateRing tag value (e.g. 'Wave1', 'Prod;Ring2', or '***' for ALL clusters)."
        required: true
        default: 'Wave1'
      update_name:
        description: 'Specific update version to apply (leave empty for latest ready update)'
        required: false
        default: ''
      dry_run:
        description: 'Preview which clusters would be updated (WhatIf mode)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      # --- ITSM Connector (ServiceNow) ---
      # Set raise_itsm_ticket=true to open ServiceNow incidents for clusters whose
      # Status matches an entry in the trigger matrix (default config:
      # ./.itsm/azurelocal-itsm.yml). Requires the secrets listed in the env: block
      # of the 'Raise ITSM tickets' step below. Leave false to keep the existing
      # update workflow behaviour unchanged.
      raise_itsm_ticket:
        description: 'Open ITSM tickets (ServiceNow) for clusters needing manual action'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      itsm_config_path:
        description: 'Path to ITSM matrix config (YAML or JSON)'
        required: false
        default: './.itsm/azurelocal-itsm.yml'
      itsm_dry_run:
        description: 'ITSM: build payloads + run read-only dedupe but do NOT create tickets'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      itsm_force_create:
        description: 'ITSM: bypass dedupe and always create new tickets (use with caution)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      module_version:
        description: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
        required: false
        default: ''

env:
  # Module version this workflow YAML was generated against. The install step compares
  # this to the version actually installed and to the latest on PSGallery, and emits a
  # ::notice annotation if the YAML appears stale - prompting you to refresh via
  # Copy-AzLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.84'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): manual workflow_dispatch input >
  # repository variable 'REQUIRED_MODULE_VERSION' > empty (latest).
  REQUIRED_MODULE_VERSION: ${{ github.event.inputs.module_version || vars.REQUIRED_MODULE_VERSION || '' }}
  # Path to the ring-aware apply-updates-schedule.yml (relative to repo
  # root). The resolver step in check-readiness reads this file when the trigger
  # is `schedule:`. Override via repository variable APPLY_UPDATES_SCHEDULE_PATH
  # if you keep the schedule outside `.github/`.
  APPLY_UPDATES_SCHEDULE_PATH: ${{ vars.APPLY_UPDATES_SCHEDULE_PATH || './.github/apply-updates-schedule.yml' }}

# prevent overlapping apply-updates runs from racing on the same
# fleet. cancel-in-progress=false means a newly-triggered run queues behind an
# in-flight one instead of cancelling it (cancellation mid-apply could leave
# a cluster in a half-updated state).
concurrency:
  group: apply-updates-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Optional: Add a readiness check job first
  check-readiness:
    name: Check Update Readiness
    runs-on: windows-latest
    # Required for OIDC authentication and dorny/test-reporter (Check Run publishing)
    permissions:
      id-token: write
      contents: read
      checks: write
    outputs:
      ready_count: ${{ steps.readiness.outputs.READY_COUNT }}
      total_count: ${{ steps.readiness.outputs.TOTAL_COUNT }}
      # surface the timestamped readiness-artifact name so the downstream
      # apply-updates job can download it (cross-job step outputs are not visible -
      # everything passed to the next job has to go through the job 'outputs' map).
      readiness_artifact: azlocal-apply-updates-readiness-report_${{ steps.artifact-stamp.outputs.timestamp }}
      # the ring(s) the schedule resolver picked for this firing.
      # Empty when the trigger was workflow_dispatch (downstream falls back to
      # the manual `update_ring` input). When the trigger was `schedule:`, this
      # is a ';'-joined UpdateRing value ready for -UpdateRingValue.
      resolved_update_ring: ${{ steps.resolve-ring.outputs.RESOLVED_UPDATE_RING }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    # OPTION 1: OpenID Connect (OIDC) - RECOMMENDED
    # No client secret required - uses federated credentials
    - name: Azure CLI Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        # AZURE_SUBSCRIPTION_ID is a repository *Variable* (vars.*), not a Secret. It
        # is consumed ONLY here: azure/login@v3 runs `az account set --subscription
        # <id>` after the OIDC token exchange so the runner has a default
        # `az account` context. It is NOT used to scope Azure Resource Graph queries
        # (those run fleet-wide across every subscription the federated identity can
        # read) and is NOT interpolated into Azure portal deep-link URLs (those use
        # the per-row `subscriptionId` returned by ARG).
        # Set it via: gh variable set AZURE_SUBSCRIPTION_ID --body <subId>
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    # OPTION 2: Client Secret - LEGACY (uncomment if OIDC not available)
    # - name: Azure CLI Login (Client Secret)
    #   uses: azure/login@v3
    #   with:
    #     creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'
    
    - name: Install Azure CLI Resource Graph Extension
      shell: pwsh
      run: |
        az extension add --name resource-graph --yes
    
    - name: Install AzLocal.UpdateManagement from PSGallery
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
        if ($env:REQUIRED_MODULE_VERSION) {
            $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
            Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
        } else {
            Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
        }
        Install-Module @installArgs
        Import-Module AzLocal.UpdateManagement -Force
        # Get-Module can return multiple entries when nested modules are loaded - pick the highest version.
        $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
        $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
        Write-Host ""
        Write-Host "Module version summary"
        Write-Host "  Installed on runner       : $installed"
        Write-Host "  YAML generated against    : $generated"
        Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
        Write-Host ""
        Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
        # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
        if ($installed -lt $generated) {
            $msg = "AzLocal.UpdateManagement v$installed is OLDER than the version this workflow YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update'."
            Write-Host "::warning title=AzLocal.UpdateManagement is older than workflow YAML expects::$msg"
        }
        # Drift signal 1: the YAML in this repo is older than the module that was installed.
        if ($installed -gt $generated) {
            $msg = "Workflow YAML was generated against AzLocal.UpdateManagement v$generated but the runner installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
            Write-Host "::notice title=Workflow YAML may be stale::$msg"
        }
        # Drift signal 2: the user pinned (or PSGallery shipped a release mid-run) and the install is behind the latest.
        if ($latest -and ($latest -gt $installed)) {
            $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
            Write-Host "::notice title=Newer AzLocal.UpdateManagement version available on PSGallery::$msg"
        }
    
    # Resolve the UpdateRing for THIS firing.
    #   - workflow_dispatch  -> use the operator's manual input verbatim (back-compat).
    #   - schedule (cron)    -> read apply-updates-schedule.yml and run the resolver.
    # The resolved value is exported as both an env var (for later steps in this
    # job) and a step output (for cross-job consumption by apply-updates).
    - name: Resolve UpdateRing from schedule
      id: resolve-ring
      shell: pwsh
      env:
        INPUT_UPDATE_RING: ${{ github.event.inputs.update_ring }}
        TRIGGER_EVENT: ${{ github.event_name }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force
        $resolved = ''
        if ($env:TRIGGER_EVENT -eq 'workflow_dispatch') {
            $resolved = $env:INPUT_UPDATE_RING
            Write-Host "Trigger='workflow_dispatch' - using manual input UpdateRing='$resolved' (schedule file ignored)."
        }
        else {
            $schedulePath = $env:APPLY_UPDATES_SCHEDULE_PATH
            if (-not $schedulePath) { $schedulePath = './.github/apply-updates-schedule.yml' }
            Write-Host "Trigger='$($env:TRIGGER_EVENT)' - resolving UpdateRing from schedule file '$schedulePath' (UTC now)."
            if (-not (Test-Path -LiteralPath $schedulePath)) {
                throw "apply-updates-schedule.yml not found at '$schedulePath'. The apply-updates pipeline was triggered by a schedule event but no schedule file is present. Generate a STRAWMAN from your fleet via: New-AzLocalApplyUpdatesScheduleConfig -OutputPath '$schedulePath' (then review and UNCOMMENT at least one row before re-running). Set repository variable APPLY_UPDATES_SCHEDULE_PATH to point elsewhere if you keep the schedule outside .github/."
            }
            $cfg = Get-AzLocalApplyUpdatesScheduleConfig -Path $schedulePath
            $decision = Resolve-AzLocalCurrentUpdateRing -Schedule $cfg
            Write-Host "Resolver decision: $($decision.Reason)"
            if ($decision.Rings -and $decision.Rings.Count -gt 0) {
                $resolved = $decision.UpdateRingValue
                Write-Host "Resolved UpdateRing='$resolved' (cycleWeek=$($decision.CycleWeek), dayOfWeek=$($decision.DayOfWeekName))."
            }
            else {
                Write-Host "::notice title=No UpdateRing scheduled for today::$($decision.Reason)"
                Write-Host "Setting resolved UpdateRing to empty - check-readiness will report ready_count=0 and apply-updates will be skipped cleanly."
                $resolved = ''
            }
        }
        # Bridge: env var for later steps in this job + step output for cross-job consumption.
        "RESOLVED_UPDATE_RING=$resolved" | Out-File -FilePath $env:GITHUB_ENV    -Encoding utf8 -Append
        "RESOLVED_UPDATE_RING=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Check Cluster Readiness
      shell: pwsh
      id: readiness
      env:
        INPUT_UPDATE_RING: ${{ env.RESOLVED_UPDATE_RING }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force
        
        $updateRing = $env:INPUT_UPDATE_RING
        
        # empty UpdateRing means the schedule resolver found no row
        # matching the current UTC day. Report zero clusters and exit 0 - the
        # downstream apply-updates job is gated on ready_count > 0 and will
        # skip cleanly.
        if ([string]::IsNullOrWhiteSpace($updateRing)) {
            Write-Host "No UpdateRing scheduled for this firing - skipping readiness check."
            New-Item -ItemType Directory -Path "./artifacts" -Force | Out-Null
            echo "READY_COUNT=0" >> $env:GITHUB_OUTPUT
            echo "TOTAL_COUNT=0" >> $env:GITHUB_OUTPUT
            exit 0
        }
        
        Write-Host "Checking readiness for clusters with UpdateRing = '$updateRing'"
        
        # Create output directory
        $outputDir = "./artifacts"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        $csvPath = Join-Path $outputDir "readiness-report.csv"
        
        # Run readiness check
        $results = Get-AzLocalClusterUpdateReadiness `
            -ScopeByUpdateRingTag `
            -UpdateRingValue $updateRing `
            -ExportPath $csvPath `
            -PassThru
        
        $totalCount = $results.Count
        $readyCount = ($results | Where-Object { $_.ReadyForUpdate -eq $true }).Count
        
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Readiness Summary" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Total Clusters: $totalCount"
        Write-Host "Ready for Update: $readyCount"
        Write-Host "Not Ready: $($totalCount - $readyCount)"
        
        echo "READY_COUNT=$readyCount" >> $env:GITHUB_OUTPUT
        echo "TOTAL_COUNT=$totalCount" >> $env:GITHUB_OUTPUT
    
    - name: Compute Artifact Timestamp
      if: always()
      id: artifact-stamp
      shell: pwsh
      # every downloadable artifact gets a UTC timestamp suffix so multiple runs on
      # the same day produce distinct zip names.
      run: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        "timestamp=$stamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Artifact timestamp: $stamp"

    - name: Upload Readiness Report
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-apply-updates-readiness-report_${{ steps.artifact-stamp.outputs.timestamp }}
        path: ./artifacts/readiness-report.csv
        retention-days: 30

  # Main job to apply updates
  apply-updates:
    name: Apply Updates
    runs-on: windows-latest
    # Required for OIDC authentication and dorny/test-reporter (Check Run publishing)
    permissions:
      id-token: write
      contents: read
      checks: write
    needs: check-readiness
    # Only run if there are clusters ready for update
    if: ${{ needs.check-readiness.outputs.ready_count > 0 }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    # OPTION 1: OpenID Connect (OIDC) - RECOMMENDED
    - name: Azure CLI Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        # AZURE_SUBSCRIPTION_ID is a repository *Variable* (vars.*), not a Secret. It
        # is consumed ONLY here: azure/login@v3 runs `az account set --subscription
        # <id>` after the OIDC token exchange so the runner has a default
        # `az account` context. It is NOT used to scope Azure Resource Graph queries
        # (those run fleet-wide across every subscription the federated identity can
        # read) and is NOT interpolated into Azure portal deep-link URLs (those use
        # the per-row `subscriptionId` returned by ARG).
        # Set it via: gh variable set AZURE_SUBSCRIPTION_ID --body <subId>
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    # OPTION 2: Client Secret - LEGACY (uncomment if OIDC not available)
    # - name: Azure CLI Login (Client Secret)
    #   uses: azure/login@v3
    #   with:
    #     creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'
    
    - name: Install Azure CLI Resource Graph Extension
      shell: pwsh
      run: |
        az extension add --name resource-graph --yes
    
    - name: Install AzLocal.UpdateManagement from PSGallery
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
        if ($env:REQUIRED_MODULE_VERSION) {
            $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
            Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
        } else {
            Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
        }
        Install-Module @installArgs
        Import-Module AzLocal.UpdateManagement -Force
        $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        Write-Host "Installed AzLocal.UpdateManagement v$installed on apply-updates job runner."
        Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
    
    # Consume the readiness CSV produced by check-readiness instead of
    # re-discovering clusters by tag. Apply Updates now operates ONLY on the
    # clusters that the readiness gate marked ReadyForUpdate=True (gated by
    # ClusterState=ConnectedRecently, no [Critical] health failures, etc.).
    # Apply still re-validates each cluster (Step 1b connectivity, Step 3b
    # health, Step 3c schedule, Step 3b1 sideloaded) as defence in depth in
    # case state drifts between the two jobs.
    - name: Download Readiness Report
      uses: actions/download-artifact@v6
      with:
        # artifact name now carries a UTC timestamp - resolve via the
        # upstream job's outputs.readiness_artifact so re-runs on the same day
        # don't collide.
        name: ${{ needs.check-readiness.outputs.readiness_artifact }}
        path: ./artifacts
    
    - name: Apply Updates
      shell: pwsh
      id: apply-updates
      env:
        # resolved by check-readiness's resolve-ring step. For
        # workflow_dispatch this passes the operator's manual input through
        # verbatim; for schedule:cron firings it is the ring(s) the resolver
        # picked from apply-updates-schedule.yml.
        INPUT_UPDATE_RING: ${{ needs.check-readiness.outputs.resolved_update_ring }}
        INPUT_UPDATE_NAME: ${{ github.event.inputs.update_name }}
        INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force
        
        $updateRing = $env:INPUT_UPDATE_RING
        $updateName = $env:INPUT_UPDATE_NAME
        $dryRun = $env:INPUT_DRY_RUN -eq "true"
        
        # Create output directory
        $outputDir = "./artifacts"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
        $junitPath = Join-Path $outputDir "update-results.xml"
        
        # Read the readiness CSV from the check-readiness job and extract
        # the ARM resource IDs of clusters marked ReadyForUpdate=True. The
        # ClusterResourceId column was added to Get-AzLocalClusterUpdateReadiness
        # output in specifically to make this hand-off explicit and
        # exact (no second tag query, no drift between the two jobs' scopes).
        $readinessCsv = Join-Path $outputDir 'readiness-report.csv'
        if (-not (Test-Path $readinessCsv)) {
            throw "Readiness CSV not found at '$readinessCsv'. The check-readiness job did not upload a readiness-report artifact - cannot determine which clusters to apply."
        }
        $readinessRows = @(Import-Csv -Path $readinessCsv)
        if ($readinessRows.Count -gt 0 -and -not ($readinessRows[0].PSObject.Properties.Name -contains 'ClusterResourceId')) {
            throw "Readiness CSV at '$readinessCsv' is missing the 'ClusterResourceId' column. This column was added in AzLocal.UpdateManagement v0.7.62. Re-run check-readiness with v0.7.62+ or refresh this workflow YAML via Copy-AzLocalPipelineExample -Update."
        }
        # CSV booleans render as the strings 'True'/'False'.
        $readyResourceIds = @($readinessRows |
            Where-Object { $_.ReadyForUpdate -eq 'True' -and $_.ClusterResourceId } |
            ForEach-Object { $_.ClusterResourceId })
        Write-Host "Readiness CSV: $($readinessRows.Count) row(s), $($readyResourceIds.Count) marked ReadyForUpdate=True."
        if ($readyResourceIds.Count -eq 0) {
            Write-Host "::warning::Readiness CSV reports zero clusters with ReadyForUpdate=True - nothing to apply."
            echo "SUCCEEDED=0"            >> $env:GITHUB_OUTPUT
            echo "SKIPPED=0"              >> $env:GITHUB_OUTPUT
            echo "FAILED=0"               >> $env:GITHUB_OUTPUT
            echo "HEALTH_BLOCKED=0"       >> $env:GITHUB_OUTPUT
            echo "SCHEDULE_BLOCKED=0"     >> $env:GITHUB_OUTPUT
            echo "SIDELOADED_BLOCKED=0"   >> $env:GITHUB_OUTPUT
            exit 0
        }
        
        # Build parameters - use -ClusterResourceIds (the readiness gate's
        # decision) rather than -ScopeByUpdateRingTag (which would re-discover
        # the full ring and force apply to re-evaluate already-blocked clusters).
        $params = @{
            ClusterResourceIds = $readyResourceIds
            Force = $true
            LogFolderPath = $outputDir
            ExportResultsPath = $junitPath
        }
        
        if ($updateName -and $updateName -ne '') {
            $params['UpdateName'] = $updateName
            Write-Host "Applying specific update: $updateName"
        }
        
        if ($dryRun) {
            $params['WhatIf'] = $true
            Write-Host "DRY RUN MODE - No updates will be applied"
        }
        
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Applying Updates to UpdateRing: $updateRing" -ForegroundColor Cyan
        Write-Host "  Clusters (from readiness CSV): $($readyResourceIds.Count)" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        
        # Run updates
        $results = Start-AzLocalClusterUpdate @params -PassThru
        
        Write-Host ""
        Write-Host "Update operation complete"
        
        # Count results
        $succeeded = ($results | Where-Object { $_.Status -eq 'Started' -or $_.Status -eq 'Success' -or $_.Status -eq 'UpdateStarted' }).Count
        $skipped = ($results | Where-Object { $_.Status -in @('Skipped', 'NotReady', 'NoUpdatesAvailable', 'NoReadyUpdates', 'NotFound', 'UpdateNotFound') }).Count
        $failed = ($results | Where-Object { $_.Status -in @('Failed', 'Error') }).Count
        $healthBlocked = ($results | Where-Object { $_.Status -eq 'HealthCheckBlocked' }).Count
        $scheduleBlocked = ($results | Where-Object { $_.Status -eq 'ScheduleBlocked' }).Count
        $sideloadedBlocked = ($results | Where-Object { $_.Status -eq 'SideloadedBlocked' }).Count
        
        echo "SUCCEEDED=$succeeded" >> $env:GITHUB_OUTPUT
        echo "SKIPPED=$skipped" >> $env:GITHUB_OUTPUT
        echo "FAILED=$failed" >> $env:GITHUB_OUTPUT
        echo "HEALTH_BLOCKED=$healthBlocked" >> $env:GITHUB_OUTPUT
        echo "SCHEDULE_BLOCKED=$scheduleBlocked" >> $env:GITHUB_OUTPUT
        echo "SIDELOADED_BLOCKED=$sideloadedBlocked" >> $env:GITHUB_OUTPUT
    
    - name: Compute Artifact Timestamp
      if: always()
      id: artifact-stamp
      shell: pwsh
      # every downloadable artifact gets a UTC timestamp suffix so multiple runs on
      # the same day produce distinct zip names. Both update-logs and itsm-results use this stamp.
      run: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        "timestamp=$stamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Artifact timestamp: $stamp"

    - name: Upload Update Logs
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-apply-updates-logs_${{ steps.artifact-stamp.outputs.timestamp }}
        path: ./artifacts/*
        retention-days: 30
    
    - name: Publish JUnit Diagnostic Results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: '[JUnit Debug] Azure Local Update Results'
        path: ./artifacts/update-results.xml
        reporter: java-junit
        list-suites: failed
        list-tests: failed
      continue-on-error: true
    
    # ----------------------------------------------------------------------
    # ITSM Connector (ServiceNow)
    #
    # This block is fully opt-in (gated on inputs.raise_itsm_ticket == 'true').
    # It runs AFTER the update results are published so a) failing clusters are
    # already surfaced via test reporting, and b) the ITSM action is a strict
    # additive step that never affects the apply-updates exit status.
    #
    # Secrets are mapped explicitly into the step's `env:` block so the module
    # picks them up via env:// references in the config file. Do NOT pass them
    # on the PowerShell command line - that pollutes process listings and CI logs.
    # ----------------------------------------------------------------------
    - name: Install powershell-yaml (ITSM config parser)
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      shell: pwsh
      run: |
        if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
            Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber
        }

    - name: Raise ITSM tickets
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      shell: pwsh
      id: itsm
      env:
        # BEGIN-AZLOCAL-CUSTOMIZE:itsm-secrets
        # Bind your ITSM connector secrets here. Defaults below assume the
        # ServiceNow OAuth client_credentials grant naming used by
        # azurelocal-itsm.yml (env://ITSM_SN_*). If your secret names differ,
        # update them here - this block is preserved by
        # Update-AzLocalPipelineExample across module upgrades.
        ITSM_SN_INSTANCE_URL: ${{ secrets.ITSM_SN_INSTANCE_URL }}
        ITSM_SN_CLIENT_ID:    ${{ secrets.ITSM_SN_CLIENT_ID }}
        ITSM_SN_CLIENT_SECRET: ${{ secrets.ITSM_SN_CLIENT_SECRET }}
        # END-AZLOCAL-CUSTOMIZE:itsm-secrets
        INPUT_ITSM_CONFIG_PATH: ${{ github.event.inputs.itsm_config_path }}
        INPUT_ITSM_DRY_RUN:     ${{ github.event.inputs.itsm_dry_run }}
        INPUT_ITSM_FORCE_CREATE: ${{ github.event.inputs.itsm_force_create }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force

        $configPath = $env:INPUT_ITSM_CONFIG_PATH
        $dryRun     = $env:INPUT_ITSM_DRY_RUN -eq 'true'
        $force      = $env:INPUT_ITSM_FORCE_CREATE -eq 'true'

        if (-not (Test-Path $configPath)) {
            Write-Host "::warning::ITSM config not found at '$configPath' - skipping ticket creation."
            exit 0
        }

        $cfg = Get-AzLocalItsmConfig -Path $configPath

        $junitInput = './artifacts/update-results.xml'
        if (-not (Test-Path $junitInput)) {
            Write-Host "::warning::No update-results.xml found at '$junitInput' - skipping ticket creation."
            exit 0
        }

        $params = @{
            InputArtifactPath = $junitInput
            Config            = $cfg
            RunMetadata       = @{
                Platform = 'github'
                RunId    = $env:GITHUB_RUN_ID
                RunUrl   = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
                Branch   = $env:GITHUB_REF
            }
            DryRun            = $dryRun
            ForceCreate       = $force
            ExportPath        = './artifacts/itsm-results.csv'
            ExportJUnitPath   = './artifacts/itsm-results.xml'
        }

        $results = New-AzLocalIncident @params
        $results | Format-Table ClusterName, Action, TicketId, Severity -AutoSize

    - name: Upload ITSM Artefacts
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-apply-updates-itsm-results_${{ steps.artifact-stamp.outputs.timestamp }}
        path: ./artifacts/itsm-*.*
        retention-days: 30
      continue-on-error: true

    - name: Publish ITSM Test Results
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      uses: dorny/test-reporter@v3
      with:
        name: ITSM Tickets
        path: ./artifacts/itsm-results.xml
        reporter: java-junit
      continue-on-error: true

    - name: Summary
      shell: pwsh
      env:
        INPUT_UPDATE_RING: ${{ needs.check-readiness.outputs.resolved_update_ring }}
        INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        $updateRing = $env:INPUT_UPDATE_RING
        $dryRun = $env:INPUT_DRY_RUN -eq "true"
        $succeeded = "${{ steps.apply-updates.outputs.SUCCEEDED }}"
        $skipped = "${{ steps.apply-updates.outputs.SKIPPED }}"
        $failed = "${{ steps.apply-updates.outputs.FAILED }}"
        $healthBlocked = "${{ steps.apply-updates.outputs.HEALTH_BLOCKED }}"
        $scheduleBlocked = "${{ steps.apply-updates.outputs.SCHEDULE_BLOCKED }}"
        $sideloadedBlocked = "${{ steps.apply-updates.outputs.SIDELOADED_BLOCKED }}"
        $readyCount = "${{ needs.check-readiness.outputs.ready_count }}"
        $totalCount = "${{ needs.check-readiness.outputs.total_count }}"
        
        "## Update Application Summary" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "**Target UpdateRing:** $updateRing" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        
        if ($dryRun) {
            " **This was a dry run. No updates were applied.**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
        }
        
        "### Readiness" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "| Metric | Count |" >> $env:GITHUB_STEP_SUMMARY
        "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
        "| Total Clusters | $totalCount |" >> $env:GITHUB_STEP_SUMMARY
        "| Ready for Update | $readyCount |" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        
        "### Results" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "| Status | Count |" >> $env:GITHUB_STEP_SUMMARY
        "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
        "| Updates Started | $succeeded |" >> $env:GITHUB_STEP_SUMMARY
        "| Skipped | $skipped |" >> $env:GITHUB_STEP_SUMMARY
        "| Failed | $failed |" >> $env:GITHUB_STEP_SUMMARY
        "| Health Blocked | $healthBlocked |" >> $env:GITHUB_STEP_SUMMARY
        "| Schedule Blocked | $scheduleBlocked |" >> $env:GITHUB_STEP_SUMMARY
        "| Sideloaded Blocked | $sideloadedBlocked |" >> $env:GITHUB_STEP_SUMMARY
        
        # Actions Required section - summarize what needs manual attention
        $actionsNeeded = @()
        if ([int]$failed -gt 0) { $actionsNeeded += "- **$failed cluster(s) failed** - Review pipeline logs and cluster health in Azure Portal" }
        if ([int]$healthBlocked -gt 0) { $actionsNeeded += "- **$healthBlocked cluster(s) blocked by health checks** - Resolve critical health failures before retrying" }
        if ([int]$scheduleBlocked -gt 0) { $actionsNeeded += "- **$scheduleBlocked cluster(s) outside maintenance window** - Updates will proceed when the cluster's UpdateWindow schedule allows, or re-run during the maintenance window" }
        if ([int]$sideloadedBlocked -gt 0) { $actionsNeeded += "- **$sideloadedBlocked cluster(s) blocked by UpdateSideloaded=False** - Operator must stage the sideloaded payload and flip the tag to True (or run Reset-AzLocalSideloadedTag) before updates can proceed" }
        
        if ($actionsNeeded.Count -gt 0) {
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Actions Required" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            foreach ($action in $actionsNeeded) {
                $action >> $env:GITHUB_STEP_SUMMARY
            }
        }

  # Handle case when no clusters are ready
  no-clusters-ready:
    name: No Clusters Ready
    runs-on: windows-latest
    needs: check-readiness
    if: ${{ needs.check-readiness.outputs.ready_count == 0 }}
    
    steps:
    - name: Report No Ready Clusters
      shell: pwsh
      env:
        INPUT_UPDATE_RING: ${{ needs.check-readiness.outputs.resolved_update_ring }}
      run: |
        $updateRing = $env:INPUT_UPDATE_RING
        $totalCount = "${{ needs.check-readiness.outputs.total_count }}"
        
        "## No Clusters Ready for Update" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "**Target UpdateRing:** $updateRing" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        
        if ($totalCount -eq 0) {
            "No clusters found with UpdateRing tag value '$updateRing'" >> $env:GITHUB_STEP_SUMMARY
        } else {
            "Found $totalCount cluster(s) with UpdateRing='$updateRing', but none are ready for updates." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Possible reasons:" >> $env:GITHUB_STEP_SUMMARY
            "- Clusters may already be up to date" >> $env:GITHUB_STEP_SUMMARY
            "- Updates may be in progress" >> $env:GITHUB_STEP_SUMMARY
            "- Clusters may have health check failures" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Download the readiness report artifact for details." >> $env:GITHUB_STEP_SUMMARY
        }
        
        Write-Warning "No clusters ready for update in ring '$updateRing'"

