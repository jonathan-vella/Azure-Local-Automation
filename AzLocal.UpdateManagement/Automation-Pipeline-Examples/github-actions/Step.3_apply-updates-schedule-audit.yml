# Apply-Updates Schedule Coverage Audit
# This workflow runs the read-only Test-AzLocalApplyUpdatesScheduleCoverage advisor
# weekly to detect drift between the cron schedule(s) in your apply-updates pipeline
# YAML and the UpdateWindow tags that operators have placed on Azure Local clusters.
#
# WHY THIS PIPELINE EXISTS
# ------------------------
# Step.6_apply-updates.yml ships with NO default schedule (workflow_dispatch only) on purpose,
# so customers must consciously choose when updates fire. After you have configured
# UpdateWindow tags on your clusters and added cron entries to Step.6_apply-updates.yml, this
# pipeline is the safety net that catches:
#   - a new ring tagged with UpdateWindow that no cron in Step.6_apply-updates.yml will reach
#   - an UpdateWindow tag value that fails to parse (typo / wrong syntax)
#   - Step.6_apply-updates.yml cron entries that the advisor cannot reason about
#     (DayOfMonth restrictions, step values) so you can audit them manually
#
# REPORTS GENERATED
# -----------------
# - Markdown step summary: human-readable Audit + Matrix views at the top of the run
# - JUnit XML: one <testcase> per (UpdateRing, UpdateWindow) pair - uncovered pairs
#   become <failure>. dorny/test-reporter renders the tree in the run page.
# - CSV: schedule-coverage-audit.csv with the full Audit view
# - Markdown: schedule-coverage-recommend.md with the ready-to-paste cron block
#
# AUTHENTICATION
# --------------
# Uses OpenID Connect (OIDC) - recommended for secretless authentication
# See: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect

# Workflow name carries the same Step.N - prefix as the filename so the GitHub
# Actions sidebar (which sorts workflows alphabetically by this `name:` field)
# lists the eight pipelines in execution order.
name: Step.3 - Apply-Updates Schedule Coverage Audit

on:
  # BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
  # Edits inside this block are preserved across Update-AzLocalPipelineExample
  # module upgrades. Add or modify `schedule:` cron blocks below.
  # Weekly on Monday at 05:00 UTC - well before any common Saturday/Sunday or weekday
  # evening update window so a coverage drift report lands in the inbox before the
  # next scheduled apply-updates run.
  schedule:
    - cron: '0 5 * * 1'   # Mondays at 05:00 UTC
  # END-AZLOCAL-CUSTOMIZE:schedule-triggers

  workflow_dispatch:
    inputs:
      pipeline_path:
        description: 'Path (file or folder) to Step.6_apply-updates.yml to audit, repo-relative. Leave empty to audit ONLY the schedule_path (schedule file). Default `.github/workflows` matches the standard GitHub Actions consumer layout where you paste the bundled `Step.6_apply-updates.yml` sample.'
        required: false
        default: '.github/workflows'
      schedule_path:
        description: 'Path to apply-updates-schedule.yml. When set, the audit also reports RingMissingFromSchedule (fleet ring with no schedule row) and RingOrphanedInSchedule (schedule ring no cluster carries). Leave empty to skip the schedule-file two-way diff.'
        required: false
        default: '.github/apply-updates-schedule.yml'
      lead_time_minutes:
        description: 'Minutes before UpdateWindow opens that the pipeline should fire (0-60). Default 5.'
        required: false
        default: '5'
      include_untagged:
        description: 'Surface clusters with no UpdateWindow tag as their own row.'
        required: false
        default: 'true'
        type: choice
        options:
          - 'false'
          - 'true'
      module_version:
        description: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
        required: false
        default: ''
      debug:
        description: 'Enable verbose/debug PowerShell streams for self-service triage. Surfaces $VerbosePreference=Continue, $DebugPreference=Continue, plus a one-shot environment snapshot before the audit runs.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  # Module version this workflow YAML was generated against. The install step compares
  # this to the version actually installed and to the latest on PSGallery, and emits a
  # ::notice annotation if the YAML appears stale - prompting you to refresh via
  # Copy-AzLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.83'
  REQUIRED_MODULE_VERSION: ${{ github.event.inputs.module_version || vars.REQUIRED_MODULE_VERSION || '' }}

jobs:
  audit:
    name: Audit Apply-Updates Schedule Coverage
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      checks: write   # Required for test reporter

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Azure CLI Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        # AZURE_SUBSCRIPTION_ID is a repository *Variable* (vars.*), not a Secret. It
        # is consumed ONLY here: azure/login@v3 runs `az account set --subscription
        # <id>` after the OIDC token exchange so the runner has a default
        # `az account` context. It is NOT used to scope Azure Resource Graph queries
        # (those run fleet-wide across every subscription the federated identity can
        # read) and is NOT interpolated into Azure portal deep-link URLs (those use
        # the per-row `subscriptionId` returned by ARG).
        # Set it via: gh variable set AZURE_SUBSCRIPTION_ID --body <subId>
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Install Azure CLI Resource Graph Extension
      shell: pwsh
      run: |
        az extension add --name resource-graph --yes

    - name: Install AzLocal.UpdateManagement from PSGallery
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
        if ($env:REQUIRED_MODULE_VERSION) {
            $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
            Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
        } else {
            Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
        }
        Install-Module @installArgs
        Import-Module AzLocal.UpdateManagement -Force
        $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
        $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
        Write-Host ""
        Write-Host "Module version summary"
        Write-Host "  Installed on runner       : $installed"
        Write-Host "  YAML generated against    : $generated"
        Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
        # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
        if ($installed -lt $generated) {
            $msg = "AzLocal.UpdateManagement v$installed is OLDER than the version this workflow YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update'."
            Write-Host "::warning title=AzLocal.UpdateManagement is older than workflow YAML expects::$msg"
        }
        if ($installed -gt $generated) {
            $msg = "Workflow YAML was generated against AzLocal.UpdateManagement v$generated but the runner installed v$installed. Refresh via 'Copy-AzLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update'."
            Write-Host "::notice title=Workflow YAML may be stale::$msg"
        }
        if ($latest -and ($latest -gt $installed)) {
            $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed."
            Write-Host "::notice title=Newer AzLocal.UpdateManagement version available on PSGallery::$msg"
        }

    - name: Run Schedule Coverage Audit
      shell: pwsh
      id: audit
      env:
        INPUT_PIPELINE_PATH:     ${{ github.event.inputs.pipeline_path || '.github/workflows' }}
        INPUT_SCHEDULE_PATH:     ${{ github.event.inputs.schedule_path || '.github/apply-updates-schedule.yml' }}
        INPUT_LEAD_TIME_MINUTES: ${{ github.event.inputs.lead_time_minutes || '5' }}
        INPUT_INCLUDE_UNTAGGED:  ${{ github.event.inputs.include_untagged || 'false' }}
        INPUT_DEBUG:             ${{ github.event.inputs.debug || 'false' }}
      run: |
        $ErrorActionPreference = 'Stop'
        Import-Module AzLocal.UpdateManagement -Force

        # Debug toggle: flips Verbose/Debug preferences and emits a
        # one-shot environment snapshot so operators can self-triage without
        # needing a code change. Default OFF to keep normal runs concise.
        if ($env:INPUT_DEBUG -eq 'true') {
            $VerbosePreference = 'Continue'
            $DebugPreference   = 'Continue'
            Write-Host "::group::Debug environment"
            Write-Host "PSVersion                : $($PSVersionTable.PSVersion)"
            Write-Host "PSEdition                : $($PSVersionTable.PSEdition)"
            Write-Host "OS                       : $($PSVersionTable.OS)"
            $mod = Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1
            Write-Host "AzLocal.UpdateManagement : v$($mod.Version) (path: $($mod.Path))"
            Write-Host "VerbosePreference        : $VerbosePreference"
            Write-Host "DebugPreference          : $DebugPreference"
            Write-Host "::endgroup::"
        }

        $outputDir = "./reports"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        $pipelinePath = $env:INPUT_PIPELINE_PATH
        $schedulePath = $env:INPUT_SCHEDULE_PATH
        $leadTime     = [int]$env:INPUT_LEAD_TIME_MINUTES
        $includeUnt   = ($env:INPUT_INCLUDE_UNTAGGED -eq 'true')

        # pipeline_path is OPTIONAL when schedule_path is set. The audit
        # cmdlet requires at least one of -PipelineYamlPath / -SchedulePath; if
        # both are blank, fall through to the original pipeline-yaml-only check
        # to keep the original error message.
        $havePipeline = -not [string]::IsNullOrWhiteSpace($pipelinePath)
        $haveSchedule = -not [string]::IsNullOrWhiteSpace($schedulePath) -and (Test-Path -LiteralPath $schedulePath)
        if ($haveSchedule -and -not $havePipeline) {
            Write-Host "PipelineYamlPath is empty - auditing schedule file only ('$schedulePath')"
            $pipelinePath = $null
            $havePipeline = $false
        }
        elseif ($havePipeline -and -not (Test-Path -LiteralPath $pipelinePath)) {
            $candidates = @('.github/workflows', '.azure-pipelines', 'pipelines', '.') | Where-Object { Test-Path -LiteralPath $_ }
            $hint = if ($candidates) { "Common locations that DO exist in this repo: $($candidates -join ', '). Re-run via 'Run workflow' on the Actions tab and set the 'pipeline_path' input." } else { "No common pipeline folders (.github/workflows, .azure-pipelines, pipelines, repo root) were found in this repo - commit your Step.6_apply-updates.yml first, or set 'pipeline_path' to wherever you keep it." }
            throw "PipelineYamlPath '$pipelinePath' does not exist on the runner. $hint"
        }

        Write-Host "========================================"
        Write-Host "Apply-Updates Schedule Coverage Audit"
        Write-Host "========================================"
        Write-Host "PipelineYamlPath : $(if ($pipelinePath) { $pipelinePath } else { '(skipped - pipeline_path empty)' })"
        Write-Host "SchedulePath     : $(if ($haveSchedule) { $schedulePath } else { '(skipped - schedule_path empty or file missing)' })"
        Write-Host "LeadTimeMinutes  : $leadTime"
        Write-Host "IncludeUntagged  : $includeUnt"
        Write-Host ""

        $auditCsv  = Join-Path $outputDir 'schedule-coverage-audit.csv'
        $recoMd    = Join-Path $outputDir 'schedule-coverage-recommend.md'
        $matrixCsv = Join-Path $outputDir 'schedule-coverage-matrix.csv'

        # v0.7.74: pin -Platform GitHubActions so the Recommend snippet ONLY
        # emits the GitHub Actions cron block (not the ADO `schedules:` block,
        # which would be irrelevant noise in a GitHub Actions Step Summary).
        # The cmdlet's default is 'Both' (intentional for ad-hoc operator use),
        # so the pipeline yml has to specify which platform it's running on.
        $auditArgs = @{
            View             = 'Audit'
            LeadTimeMinutes  = $leadTime
            ExportPath       = $auditCsv
            Platform         = 'GitHubActions'
            PassThru         = $true
        }
        if ($havePipeline) { $auditArgs.PipelineYamlPath = $pipelinePath }
        if ($haveSchedule) { $auditArgs.SchedulePath     = $schedulePath }
        if ($includeUnt)   { $auditArgs.IncludeUntagged  = $true }
        $audit = Test-AzLocalApplyUpdatesScheduleCoverage @auditArgs
        if (-not $audit) { $audit = @() }

        # Matrix view (CSV only).
        Test-AzLocalApplyUpdatesScheduleCoverage -View Matrix -LeadTimeMinutes $leadTime -ExportPath $matrixCsv | Out-Null

        # Recommend view (markdown snippet) - GitHub Actions only.
        Test-AzLocalApplyUpdatesScheduleCoverage -View Recommend -LeadTimeMinutes $leadTime -Platform GitHubActions -ExportPath $recoMd | Out-Null

        $covered     = @($audit | Where-Object Status -eq 'Covered')
        $uncovered   = @($audit | Where-Object Status -eq 'Uncovered')
        $partial     = @($audit | Where-Object Status -eq 'PartiallyCovered')
        $malformed   = @($audit | Where-Object Status -eq 'MalformedTag')
        $unparseable = @($audit | Where-Object Status -eq 'UnparseableCron')
        # schedule-file two-way diff buckets.
        $ringMissing = @($audit | Where-Object Status -eq 'RingMissingFromSchedule')
        $ringOrphan  = @($audit | Where-Object Status -eq 'RingOrphanedInSchedule')

        # ------------------------------------------------------------------
        # JUnit XML: two <testsuite> elements so the test reporter
        # tree separates schedule-file gap rows (Schedule section) from cron
        # coverage rows (Cron section). Schedule gaps have higher blast
        # radius (apply-updates NEVER fires for those rings), so the suite
        # comes FIRST. Uncovered, PartiallyCovered, MalformedTag,
        # UnparseableCron, RingMissingFromSchedule, RingOrphanedInSchedule
        # all become <failure>; Covered passes.
        # ------------------------------------------------------------------
        function Convert-XmlEscape([string]$s) {
            if ($null -eq $s) { return '' }
            ($s.Replace('&','&amp;').Replace('<','&lt;').Replace('>','&gt;').Replace('"','&quot;').Replace("'",'&apos;'))
        }
        function Write-Suite {
            param(
                [System.Text.StringBuilder]$Sb,
                [string]$SuiteName,
                [object[]]$Rows,
                [string]$EmptyPlaceholderName
            )
            $failures = @($Rows | Where-Object { $_.Status -ne 'Covered' }).Count
            [void]$Sb.AppendLine(("  <testsuite name=`"{0}`" tests=`"{1}`" failures=`"{2}`">" -f (Convert-XmlEscape $SuiteName), $Rows.Count, $failures))
            foreach ($row in $Rows) {
                $tcName = ("{0} / {1}" -f $row.UpdateRing, ($(if ($row.UpdateWindow) { $row.UpdateWindow } else { '(no window)' })))
                [void]$Sb.AppendLine(("    <testcase classname=`"ScheduleCoverage`" name=`"{0}`">" -f (Convert-XmlEscape $tcName)))
                if ($row.Status -ne 'Covered') {
                    $issue = Convert-XmlEscape $row.Issue
                    $reco  = Convert-XmlEscape $row.Recommendation
                    [void]$Sb.AppendLine(("      <failure type=`"{0}`" message=`"{1}`">Recommendation: {2}{3}Cluster count: {4}</failure>" -f $row.Status, $issue, $reco, [Environment]::NewLine, $row.ClusterCount))
                }
                [void]$Sb.AppendLine('    </testcase>')
            }
            if ($Rows.Count -eq 0 -and $EmptyPlaceholderName) {
                [void]$Sb.AppendLine(("    <testcase classname=`"ScheduleCoverage`" name=`"{0}`" />" -f (Convert-XmlEscape $EmptyPlaceholderName)))
            }
            [void]$Sb.AppendLine('  </testsuite>')
        }

        $scheduleRows = @($audit | Where-Object { $_.Section -eq 'Schedule' })
        $cronRows     = @($audit | Where-Object { $_.Section -ne 'Schedule' })

        $xmlPath = Join-Path $outputDir 'schedule-coverage-audit.xml'
        $sb = New-Object System.Text.StringBuilder
        [void]$sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
        [void]$sb.AppendLine('<testsuites>')
        # only emit the Schedule suite when -SchedulePath was actually
        # supplied (i.e. there is at least one Schedule row OR the operator
        # provided a schedule file). Otherwise the suite would render as
        # "no tests found" with no actionable signal.
        if ($haveSchedule -or $scheduleRows.Count -gt 0) {
            Write-Suite -Sb $sb `
                -SuiteName 'Apply-Updates Schedule Coverage - Schedule (ring diff)' `
                -Rows $scheduleRows `
                -EmptyPlaceholderName 'Schedule and fleet ring sets match - no gaps.'
        }
        if ($cronRows.Count -gt 0 -or -not $haveSchedule) {
            Write-Suite -Sb $sb `
                -SuiteName 'Apply-Updates Schedule Coverage - Cron coverage' `
                -Rows $cronRows `
                -EmptyPlaceholderName 'No tagged clusters found - nothing to audit'
        }
        [void]$sb.AppendLine('</testsuites>')
        [System.IO.File]::WriteAllText($xmlPath, $sb.ToString(), [System.Text.UTF8Encoding]::new($false))

        # Step outputs for the summary step.
        "TOTAL_ROWS=$($audit.Count)"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "COVERED=$($covered.Count)"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "UNCOVERED=$($uncovered.Count)"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "PARTIAL=$($partial.Count)"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "MALFORMED=$($malformed.Count)"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "UNPARSEABLE=$($unparseable.Count)"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "RING_MISSING=$($ringMissing.Count)"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "RING_ORPHAN=$($ringOrphan.Count)"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

        Write-Host ""
        Write-Host "Audit complete:"
        Write-Host "  Covered                  : $($covered.Count)"
        Write-Host "  Uncovered                : $($uncovered.Count)"
        Write-Host "  PartiallyCovered         : $($partial.Count)"
        Write-Host "  MalformedTag             : $($malformed.Count)"
        Write-Host "  UnparseableCron          : $($unparseable.Count)"
        Write-Host "  RingMissingFromSchedule  : $($ringMissing.Count)"
        Write-Host "  RingOrphanedInSchedule   : $($ringOrphan.Count)"

    - name: Compute Artifact Timestamp
      if: always()
      id: artifact-stamp
      shell: pwsh
      # every downloadable artifact gets a UTC timestamp suffix so multiple runs on
      # the same day produce distinct zip names. UTC keeps Azure DevOps + GitHub Actions in sync.
      run: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        "timestamp=$stamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Artifact timestamp: $stamp"

    - name: Upload Schedule Coverage Reports
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-apply-updates-schedule-audit-report_${{ steps.artifact-stamp.outputs.timestamp }}
        path: ./reports/
        retention-days: 90

    - name: Create Schedule Coverage Summary
      if: always()
      shell: pwsh
      run: |
        $total       = "${{ steps.audit.outputs.TOTAL_ROWS }}"
        $covered     = "${{ steps.audit.outputs.COVERED }}"
        $uncovered   = "${{ steps.audit.outputs.UNCOVERED }}"
        $partial     = "${{ steps.audit.outputs.PARTIAL }}"
        $malformed   = "${{ steps.audit.outputs.MALFORMED }}"
        $unparseable = "${{ steps.audit.outputs.UNPARSEABLE }}"
        $ringMissing = "${{ steps.audit.outputs.RING_MISSING }}"
        $ringOrphan  = "${{ steps.audit.outputs.RING_ORPHAN }}"

        $rows = @()
        if (Test-Path './reports/schedule-coverage-audit.csv') {
            $rows = @(Import-Csv -Path './reports/schedule-coverage-audit.csv')
        }
        $reco = ''
        if (Test-Path './reports/schedule-coverage-recommend.md') {
            $reco = Get-Content -Path './reports/schedule-coverage-recommend.md' -Raw
        }

        # when there is at least one issue row, surface the action-required
        # markdown at the TOP of the summary so operators can act without scrolling past the
        # detail table. The Recommend output now ships its own '## Action required - ...'
        # headings (one per kind of fix), numbered '(1 of N)' when more than one applies,
        # so we inline it as-is rather than wrapping it in our own code fence.
        $hasIssues = (([int]$uncovered) + ([int]$partial) + ([int]$malformed) + ([int]$unparseable) + ([int]$ringMissing) + ([int]$ringOrphan)) -gt 0

        $md = @"
        ## Apply-Updates Schedule Coverage Audit

        | Metric | Count |
        |--------|-------|
        | **(Ring, Window) pairs audited** | $total |
        | **Covered** | $covered |
        | **Uncovered** | $uncovered |
        | **PartiallyCovered** | $partial |
        | **MalformedTag** | $malformed |
        | **UnparseableCron** | $unparseable |
        | **RingMissingFromSchedule** | $ringMissing |
        | **RingOrphanedInSchedule** | $ringOrphan |

        "@

        if ($hasIssues -and $reco) {
            $md += "`n" + $reco + "`n"
        }

        # split Audit Detail into two sub-tables. Schedule rows
        # (RingMissingFromSchedule / RingOrphanedInSchedule) come FIRST -
        # higher blast radius because a missing-from-schedule ring means
        # apply-updates NEVER fires for those clusters. The Schedule
        # sub-table is suppressed when -SchedulePath was not supplied.
        $scheduleRowsMd = @($rows | Where-Object { $_.Section -eq 'Schedule' })
        $cronRowsMd     = @($rows | Where-Object { $_.Section -ne 'Schedule' })

        function Add-DetailTable {
            param([string]$Heading, [object[]]$DetailRows, [string]$EmptyText)
            $body = "`n$Heading`n"
            if ($DetailRows.Count -eq 0) {
                $body += "`n*$EmptyText*`n"
                return $body
            }
            $body += "`n| Status | UpdateRing | UpdateWindow | Clusters | Required Cron (UTC) | Recommendation |`n"
            $body += "|--------|------------|--------------|---------:|----------------------|----------------|`n"
            foreach ($r in ($DetailRows | Select-Object -First 100)) {
                $body += ('| {0} | {1} | {2} | {3} | {4} | {5} |' -f $r.Status, $r.UpdateRing, $r.UpdateWindow, $r.ClusterCount, $r.RequiredCronUTC, $r.Recommendation) + "`n"
            }
            if ($DetailRows.Count -gt 100) {
                $body += "`n*Showing first 100 of $($DetailRows.Count); see ``schedule-coverage-audit.csv`` artifact for the full list.*`n"
            }
            return $body
        }

        if ($haveSchedule) {
            $md += "`n### Audit Detail - Schedule (ring-file gap)`n"
            $md += "`n> **Higher blast radius.** A ``RingMissingFromSchedule`` row means apply-updates will NEVER fire on those clusters until you either add the ring to ``apply-updates-schedule.yml`` or retag them onto an existing scheduled ring.`n"
            $md += (Add-DetailTable -Heading '' -DetailRows $scheduleRowsMd -EmptyText 'Schedule and fleet ring sets match - no gaps.')
        }

        $md += (Add-DetailTable -Heading '### Audit Detail - Cron coverage (Uncovered / Partial / Malformed first)' -DetailRows $cronRowsMd -EmptyText 'No tagged clusters found - nothing to audit.')

        # When there are no issues, still print the recommendation block at the bottom for
        # operators who want the canonical cron list as a reference. When there are issues
        # we already printed it at the top so skip the duplicate.
        if (-not $hasIssues -and $reco) {
            $md += "`n### Reference - Recommended schedule (copy into Step.6_apply-updates.yml)`n"
            $md += "`n" + $reco + "`n"
        }

        $md += @"

        ### Reports Available
        - ``schedule-coverage-audit.csv`` - one row per (UpdateRing, UpdateWindow) pair
        - ``schedule-coverage-matrix.csv`` - full inventory + required cron per row
        - ``schedule-coverage-recommend.md`` - ready-to-paste cron block (GH + ADO)
        - ``schedule-coverage-audit.xml`` - JUnit XML for CI/CD visualisation

        *Generated at $(Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")*
        "@

        $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

    - name: Publish Test Results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Apply-Updates Schedule Coverage
        path: ./reports/schedule-coverage-audit.xml
        reporter: java-junit
        fail-on-error: false
        list-suites: failed
        list-tests: failed

