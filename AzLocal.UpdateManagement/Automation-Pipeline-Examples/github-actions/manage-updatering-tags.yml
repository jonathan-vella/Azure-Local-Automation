# Manage UpdateRing Tags
# This workflow creates or updates UpdateRing tags on Azure Local clusters from a CSV file
#
# AUTHENTICATION OPTIONS:
# This workflow supports two authentication methods:
# 1. OpenID Connect (OIDC) - RECOMMENDED - No secrets, uses federated credentials
# 2. Client Secret - LEGACY - Requires AZURE_CLIENT_SECRET (see commented section)
#
# For OIDC setup, see: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
#
# WORKFLOW:
#   1. Run the "Inventory Azure Local Clusters" workflow first
#   2. Download the CSV artifact from that workflow run
#   3. Edit the CSV in Excel - populate the 'UpdateRing' column with values (e.g., Wave1, Wave2, Production)
#   4. Commit the edited CSV to your repository (e.g., to a 'config/' folder)
#   5. Run this workflow and specify the path to your committed CSV file
#
# NOTE: GitHub Actions does not support file uploads as workflow inputs.
#       The edited CSV must be committed to the repository first.

name: Manage UpdateRing Tags

on:
  workflow_dispatch:
    inputs:
      csv_file_path:
        description: 'Path to edited CSV file in repository (e.g., config/ClusterInventory_Updated.csv)'
        required: true
        default: 'config/ClusterUpdateRings.csv'
      force_overwrite:
        description: 'Force overwrite existing UpdateRing tags'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: 'Preview changes without applying (WhatIf mode)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      module_version:
        description: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
        required: false
        default: ''

env:
  # Module version this workflow YAML was generated against. The install step compares
  # this to the version actually installed and to the latest on PSGallery, and emits a
  # ::notice annotation if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.65'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): manual workflow_dispatch input >
  # repository variable 'REQUIRED_MODULE_VERSION' > empty (latest).
  REQUIRED_MODULE_VERSION: ${{ github.event.inputs.module_version || vars.REQUIRED_MODULE_VERSION || '' }}

jobs:
  manage-tags:
    name: Manage UpdateRing Tags
    runs-on: windows-latest
    # Required for OIDC authentication
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    # OPTION 1: OpenID Connect (OIDC) - RECOMMENDED
    # No client secret required - uses federated credentials
    - name: Azure CLI Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    
    # OPTION 2: Client Secret - LEGACY (uncomment if OIDC not available)
    # - name: Azure CLI Login (Client Secret)
    #   uses: azure/login@v3
    #   with:
    #     creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
    
    - name: Validate CSV File Exists
      shell: pwsh
      env:
        INPUT_CSV_FILE_PATH: ${{ github.event.inputs.csv_file_path }}
      run: |
        $csvPath = $env:INPUT_CSV_FILE_PATH
        
        if (-not (Test-Path $csvPath)) {
            Write-Host "ERROR: CSV file not found at path: $csvPath" -ForegroundColor Red
            Write-Host ""
            Write-Host "===========================================================================" -ForegroundColor Yellow
            Write-Host " UpdateRing tagging is a TWO-STAGE workflow. You must run the inventory" -ForegroundColor Yellow
            Write-Host " workflow first, edit the CSV, commit it, then re-run THIS workflow." -ForegroundColor Yellow
            Write-Host "===========================================================================" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "STEP 1 - Generate the cluster inventory (one-off, then on demand)" -ForegroundColor Cyan
            Write-Host "  a. Go to the 'Actions' tab in this repository."
            Write-Host "  b. Open the workflow named 'Inventory Azure Local Clusters'"
            Write-Host "     (file: .github/workflows/inventory-clusters.yml)."
            Write-Host "  c. Click 'Run workflow' and wait for the run to finish successfully."
            Write-Host "  d. On the completed run page, scroll to the 'Artifacts' section and"
            Write-Host "     download the artifact named 'cluster-inventory'."
            Write-Host "  e. Unzip it locally. You will get 'ClusterUpdateRings.csv' (the one"
            Write-Host "     to edit), a timestamped audit copy, a .json copy, and a"
            Write-Host "     'README_Instructions.txt' file that mirrors these instructions."
            Write-Host ""
            Write-Host "STEP 2 - Edit the CSV in Excel" -ForegroundColor Cyan
            Write-Host "  a. Open 'ClusterUpdateRings.csv' in Excel."
            Write-Host "  b. For each cluster row, fill in the 'UpdateRing' column with the wave"
            Write-Host "     name you want that cluster to belong to. Examples:"
            Write-Host "       Canary, Pilot, Production"
            Write-Host "       (or your own scheme, e.g. Wave1, Wave2, Wave3 / Dev, Test, Prod)."
            Write-Host "  c. Leave the 'UpdateRing' column EMPTY for any cluster you do not want"
            Write-Host "     this run to tag - those rows will be skipped."
            Write-Host "  d. Save as CSV (UTF-8). Do not change other columns or column order."
            Write-Host "  e. Do NOT rename the file - keep it as 'ClusterUpdateRings.csv' so"
            Write-Host "     the default 'csv_file_path' below picks it up."
            Write-Host ""
            Write-Host "STEP 3 - Commit the edited CSV to this repository" -ForegroundColor Cyan
            Write-Host "  a. Copy the edited CSV into a stable location in this repo, for example:"
            Write-Host "       config/ClusterUpdateRings.csv"
            Write-Host "  b. Commit and push it (PR review optional but recommended)."
            Write-Host "  c. The path you commit it to is what you will pass as 'csv_file_path'"
            Write-Host "     on the next run of this workflow."
            Write-Host ""
            Write-Host "STEP 4 - Re-run THIS workflow ('Manage UpdateRing Tags')" -ForegroundColor Cyan
            Write-Host "  a. Click 'Run workflow' on this workflow."
            Write-Host "  b. Set 'csv_file_path' to the path you committed in step 3"
            Write-Host "     (default is 'config/ClusterUpdateRings.csv')."
            Write-Host "  c. RECOMMENDED FIRST RUN: leave 'dry_run' = true to preview which tags"
            Write-Host "     would be set/changed, without modifying any Azure resources."
            Write-Host "  d. Once the preview looks correct, re-run with 'dry_run' = false to"
            Write-Host "     apply the tags. Use 'force' = true only if you need to overwrite"
            Write-Host "     existing UpdateRing values already set on a cluster."
            Write-Host ""
            Write-Host "Documentation:" -ForegroundColor Yellow
            Write-Host "  AzLocal.UpdateManagement/README.md - 'Update Rings' section"
            Write-Host "  AzLocal.UpdateManagement/Automation-Pipeline-Examples/README.md"
            Write-Host ""
            Write-Host "The path you supplied ('$csvPath') does not exist in the checked-out" -ForegroundColor Red
            Write-Host "branch of this repository. Did you forget to commit the CSV, point at" -ForegroundColor Red
            Write-Host "the wrong branch on 'Run workflow', or mistype the path?" -ForegroundColor Red
            exit 1
        }
        
        Write-Host "Found CSV file: $csvPath"
        echo "CSV_PATH=$csvPath" >> $env:GITHUB_OUTPUT
      id: csv-path
    
    - name: Validate CSV File
      shell: pwsh
      run: |
        $csvPath = "${{ steps.csv-path.outputs.CSV_PATH }}"
        $data = Import-Csv $csvPath
        
        Write-Host "CSV File: $csvPath"
        Write-Host "Total Rows: $($data.Count)"
        
        # Check required columns
        $requiredColumns = @('ResourceId', 'UpdateRing')
        $columns = $data[0].PSObject.Properties.Name
        
        foreach ($col in $requiredColumns) {
            if ($col -notin $columns) {
                Write-Error "Required column '$col' not found in CSV"
                exit 1
            }
        }
        
        # Count rows with UpdateRing values
        $rowsWithValues = ($data | Where-Object { $_.UpdateRing -and $_.UpdateRing.Trim() -ne '' }).Count
        Write-Host "Rows with UpdateRing values: $rowsWithValues"
        
        if ($rowsWithValues -eq 0) {
            Write-Warning "No rows have UpdateRing values set. Please edit the CSV and set UpdateRing values before running this pipeline."
            exit 1
        }
    
    - name: Install AzLocal.UpdateManagement from PSGallery
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
        if ($env:REQUIRED_MODULE_VERSION) {
            $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
            Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
        } else {
            Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
        }
        Install-Module @installArgs
        Import-Module AzLocal.UpdateManagement -Force
        $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
        $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
        Write-Host ""
        Write-Host "Module version summary"
        Write-Host "  Installed on runner       : $installed"
        Write-Host "  YAML generated against    : $generated"
        Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
        Write-Host ""
        Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
        if ($installed -gt $generated) {
            $msg = "Workflow YAML was generated against AzLocal.UpdateManagement v$generated but the runner installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
            Write-Host "::notice title=Workflow YAML may be stale::$msg"
        }
        if ($latest -and ($latest -gt $installed)) {
            $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
            Write-Host "::notice title=Newer AzLocal.UpdateManagement version available on PSGallery::$msg"
        }
    
    - name: Apply UpdateRing Tags
      shell: pwsh
      env:
        INPUT_FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite }}
        INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        $ErrorActionPreference = 'Stop'
        Import-Module AzLocal.UpdateManagement -Force
        
        $csvPath = "${{ steps.csv-path.outputs.CSV_PATH }}"
        $forceOverwrite = $env:INPUT_FORCE_OVERWRITE -eq "true"
        $dryRun = $env:INPUT_DRY_RUN -eq "true"
        
        # Create output directory for logs
        $outputDir = "./artifacts"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        # Build parameters
        $params = @{
            InputCsvPath = $csvPath
            LogFolderPath = $outputDir
        }
        
        if ($forceOverwrite) {
            $params['Force'] = $true
            Write-Host "Force mode enabled - will overwrite existing tags"
        }
        
        if ($dryRun) {
            $params['WhatIf'] = $true
            Write-Host "DRY RUN MODE - No changes will be applied"
        }
        
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Applying UpdateRing Tags" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        
        # Run tag management
        Set-AzureLocalClusterUpdateRingTag @params
        
        Write-Host ""
        Write-Host "Tag management complete"
      id: apply-tags
    
    - name: Upload Log Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: updatering-tag-logs
        path: ./artifacts/*
        retention-days: 30
    
    - name: Summary
      shell: pwsh
      env:
        INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        INPUT_FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite }}
      run: |
        Write-Host "## UpdateRing Tag Management Summary" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "" >> $env:GITHUB_STEP_SUMMARY
        
        $dryRun = $env:INPUT_DRY_RUN -eq "true"
        $forceOverwrite = $env:INPUT_FORCE_OVERWRITE -eq "true"
        
        Write-Host "| Setting | Value |" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "|---------|-------|" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "| Dry Run | $dryRun |" >> $env:GITHUB_STEP_SUMMARY
        Write-Host "| Force Overwrite | $forceOverwrite |" >> $env:GITHUB_STEP_SUMMARY
        
        if ($dryRun) {
            Write-Host "" >> $env:GITHUB_STEP_SUMMARY
            Write-Host "**This was a dry run. No changes were applied.**" >> $env:GITHUB_STEP_SUMMARY
        }
