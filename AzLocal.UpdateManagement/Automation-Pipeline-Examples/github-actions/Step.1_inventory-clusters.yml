# Inventory Azure Local Clusters
# This workflow queries all Azure Local clusters and exports inventory with UpdateRing tag status
#
# OUTPUT COLUMNS:
#   ClusterName, ResourceGroup, SubscriptionId, SubscriptionName,
#   UpdateRing, HasUpdateRingTag, UpdateWindow, UpdateExclusions,
#   UpdateSideloaded, UpdateVersionInProgress, ResourceId
#
#   - UpdateSideloaded (operator-set): True/False/1/0 - sideloaded-payload gate
#   - UpdateVersionInProgress (module-managed; do not edit): staged update name
#   See main module README, section "Sideloaded Payload Workflow".
#
# AUTHENTICATION OPTIONS:
# This workflow supports two authentication methods:
# 1. OpenID Connect (OIDC) - RECOMMENDED - No secrets, uses federated credentials
# 2. Client Secret - LEGACY - Requires AZURE_CLIENT_SECRET (see commented section)
#
# For OIDC setup, see: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect

# Workflow name carries the same Step.N - prefix as the filename so the GitHub
# Actions sidebar (which sorts workflows alphabetically by this `name:` field)
# lists the eight pipelines in execution order.
name: Step.1 - Inventory Azure Local Clusters

on:
  workflow_dispatch:
    inputs:
      subscription_filter:
        description: 'Subscription ID to filter (leave empty for all subscriptions)'
        required: false
        default: ''
      module_version:
        description: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
        required: false
        default: ''
  schedule:
    # Run weekly on Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'

env:
  # Module version this workflow YAML was generated against. The install step compares
  # this to the version actually installed and to the latest on PSGallery, and emits a
  # ::notice annotation if the YAML appears stale - prompting you to refresh via
  # Copy-AzLocalPipelineExample. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.86'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): manual workflow_dispatch input >
  # repository variable 'REQUIRED_MODULE_VERSION' > empty (latest).
  REQUIRED_MODULE_VERSION: ${{ github.event.inputs.module_version || vars.REQUIRED_MODULE_VERSION || '' }}

jobs:
  inventory-clusters:
    name: Inventory Azure Local Clusters
    runs-on: windows-latest
    # Required for OIDC authentication
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    # OPTION 1: OpenID Connect (OIDC) - RECOMMENDED
    # No client secret required - uses federated credentials
    - name: Azure CLI Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        # AZURE_SUBSCRIPTION_ID is a repository *Variable* (vars.*), not a Secret. It
        # is consumed ONLY here: azure/login@v3 runs `az account set --subscription
        # <id>` after the OIDC token exchange so the runner has a default
        # `az account` context. It is NOT used to scope Azure Resource Graph queries
        # (those run fleet-wide across every subscription the federated identity can
        # read) and is NOT interpolated into Azure portal deep-link URLs (those use
        # the per-row `subscriptionId` returned by ARG).
        # Set it via: gh variable set AZURE_SUBSCRIPTION_ID --body <subId>
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    # OPTION 2: Client Secret - LEGACY (uncomment if OIDC not available)
    # - name: Azure CLI Login (Client Secret)
    #   uses: azure/login@v3
    #   with:
    #     creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'
    
    - name: Install Azure CLI Resource Graph Extension
      shell: pwsh
      run: |
        az extension add --name resource-graph --yes
    
    - name: Install AzLocal.UpdateManagement from PSGallery
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
        if ($env:REQUIRED_MODULE_VERSION) {
            $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
            Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
        } else {
            Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
        }
        Install-Module @installArgs
        Import-Module AzLocal.UpdateManagement -Force
        # Get-Module can return multiple entries when nested modules are loaded - pick the highest version.
        $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
        $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
        Write-Host ""
        Write-Host "Module version summary"
        Write-Host "  Installed on runner       : $installed"
        Write-Host "  YAML generated against    : $generated"
        Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
        Write-Host ""
        Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
        # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
        if ($installed -lt $generated) {
            $msg = "AzLocal.UpdateManagement v$installed is OLDER than the version this workflow YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update'."
            Write-Host "::warning title=AzLocal.UpdateManagement is older than workflow YAML expects::$msg"
        }
        # Drift signal 1: the YAML in this repo is older than the module that was installed.
        if ($installed -gt $generated) {
            $msg = "Workflow YAML was generated against AzLocal.UpdateManagement v$generated but the runner installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
            Write-Host "::notice title=Workflow YAML may be stale::$msg"
        }
        # Drift signal 2: the user pinned (or PSGallery shipped a release mid-run) and the install is behind the latest.
        if ($latest -and ($latest -gt $installed)) {
            $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
            Write-Host "::notice title=Newer AzLocal.UpdateManagement version available on PSGallery::$msg"
        }
    
    - name: Run Cluster Inventory
      shell: pwsh
      env:
        INPUT_SUBSCRIPTION_FILTER: ${{ github.event.inputs.subscription_filter }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force
        
        # Create output directory
        $outputDir = "./artifacts"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
        $csvPath = Join-Path $outputDir "ClusterInventory_$timestamp.csv"
        $jsonPath = Join-Path $outputDir "ClusterInventory_$timestamp.json"
        
        # Add subscription filter if provided
        $subFilter = $env:INPUT_SUBSCRIPTION_FILTER
        $subscriptionParam = @{}
        if ($subFilter -and $subFilter -ne '') {
            $subscriptionParam['SubscriptionId'] = $subFilter
            Write-Host "Filtering to subscription: $subFilter"
        } else {
            Write-Host "Querying all accessible subscriptions"
        }
        
        # Export to CSV (for Excel workflow)
        Get-AzLocalClusterInventory @subscriptionParam -ExportPath $csvPath
        
        # Export to JSON (for CI/CD integrations and dashboards)
        $inventory = Get-AzLocalClusterInventory @subscriptionParam -ExportPath $jsonPath -PassThru
        
        # Output summary
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Inventory Complete" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Total Clusters: $($inventory.Count)"
        Write-Host "CSV exported to: $csvPath"
        Write-Host "JSON exported to: $jsonPath"
        
        # ---- Canonical no-timestamp copy expected by the 'Manage UpdateRing Tags' workflow ----
        # The timestamped CSV is retained for audit / longitudinal comparison.
        $canonicalCsvPath = Join-Path $outputDir "ClusterUpdateRings.csv"
        Copy-Item -Path $csvPath -Destination $canonicalCsvPath -Force
        Write-Host "Canonical copy created: $canonicalCsvPath (edit this one)"
        
        # ---- README_Instructions.txt explaining what to do with the CSV ----
        $installedVersion = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        $generatedUtc = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")
        $readmePath = Join-Path $outputDir "README_Instructions.txt"
        $readme = @'
        ========================================================================
         Cluster Inventory - Next Steps
         AzLocal.UpdateManagement (UpdateRing tagging workflow)
        ========================================================================

        This ZIP contains the cluster inventory generated by the
        'Inventory Azure Local Clusters' workflow. Use it to assign each
        cluster to an update wave (UpdateRing tag), then commit the result
        back into your repository so the 'Manage UpdateRing Tags' workflow
        can apply the tags to Azure.

        ------------------------------------------------------------------------
        FILES IN THIS ARTIFACT
        ------------------------------------------------------------------------

          ClusterUpdateRings.csv
              <-- EDIT THIS FILE. Canonical name expected by the 'Manage
                  UpdateRing Tags' workflow's default csv_file_path input
                  ('config/ClusterUpdateRings.csv').

          ClusterInventory_<timestamp>.csv
              Audit / historical copy of this run's inventory. Do NOT edit -
              keep it so you can diff future inventory runs against this
              snapshot.

          ClusterInventory_<timestamp>.json
              Machine-readable copy for dashboards / custom integrations.

          README_Instructions.txt
              This file.

        ------------------------------------------------------------------------
        STEP 1 - Open ClusterUpdateRings.csv in Excel
        ------------------------------------------------------------------------

          - For each cluster row, fill in the 'UpdateRing' column with the
            wave name you want that cluster to belong to. Examples:
                Canary, Pilot, Production
                (or your own scheme, e.g. Wave1, Wave2, Wave3 / Dev, Test, Prod)
          - Leave the 'UpdateRing' column EMPTY for any cluster you do not
            want this run to tag - those rows will be skipped.
          - Save as CSV (UTF-8). Do not change other columns or column order.
          - Do NOT rename the file. Keep it as 'ClusterUpdateRings.csv' so
            the 'Manage UpdateRing Tags' workflow's default path picks it up.

        ------------------------------------------------------------------------
        STEP 2 - Commit ClusterUpdateRings.csv into your ops repository
        ------------------------------------------------------------------------

          - Recommended path:   config/ClusterUpdateRings.csv
          - Commit and push (PR review optional but recommended).
          - The repo path you commit it to is what you will pass as
            'csv_file_path' on the next run of the 'Manage UpdateRing Tags'
            workflow.

        ------------------------------------------------------------------------
        STEP 3 - Run the 'Manage UpdateRing Tags' workflow
        ------------------------------------------------------------------------

          - Open the Actions tab and trigger 'Manage UpdateRing Tags' via
            'Run workflow'.
          - Set 'csv_file_path' to the path you committed in STEP 2
            (default is 'config/ClusterUpdateRings.csv').
          - RECOMMENDED FIRST RUN: leave 'dry_run' = true. The workflow
            will preview which tags would be set/changed without modifying
            any Azure resources.
          - Once the preview looks correct, re-run with 'dry_run' = false
            to apply the tags. Use 'force' = true only if you need to
            overwrite existing UpdateRing values already set on a cluster.

        ------------------------------------------------------------------------
        DOCUMENTATION
        ------------------------------------------------------------------------

          Pipeline examples README (online):
            https://github.com/NeilBird/Azure-Local/blob/main/AzLocal.UpdateManagement/Automation-Pipeline-Examples/README.md

          Module README (online):
            https://github.com/NeilBird/Azure-Local/blob/main/AzLocal.UpdateManagement/README.md

          Module on the PowerShell Gallery:
            https://www.powershellgallery.com/packages/AzLocal.UpdateManagement

        Generated by AzLocal.UpdateManagement v__MODULE_VERSION__
        Run timestamp (UTC): __TIMESTAMP__
        ========================================================================
        '@
        $readme = $readme.Replace('__MODULE_VERSION__', "$installedVersion").Replace('__TIMESTAMP__', $generatedUtc)
        Set-Content -Path $readmePath -Value $readme -Encoding ASCII
        Write-Host "Instructions written to: $readmePath"
        
        # Set output for next steps
        echo "CSV_PATH=$csvPath" >> $env:GITHUB_OUTPUT
        echo "JSON_PATH=$jsonPath" >> $env:GITHUB_OUTPUT
        echo "CLUSTER_COUNT=$($inventory.Count)" >> $env:GITHUB_OUTPUT
      id: inventory
    
    - name: Compute Artifact Timestamp
      id: artifact-stamp
      shell: pwsh
      # every downloadable artifact gets a UTC timestamp suffix so multiple runs on
      # the same day produce distinct zip names.
      run: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        "timestamp=$stamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Artifact timestamp: $stamp"

    - name: Upload Inventory Artifact
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-cluster-inventory_${{ steps.artifact-stamp.outputs.timestamp }}
        path: |
          ./artifacts/*.csv
          ./artifacts/*.json
        retention-days: 30
    
    - name: Summary
      shell: pwsh
      run: |
        $csvPath = "${{ steps.inventory.outputs.CSV_PATH }}"
        if (Test-Path $csvPath) {
            $data = Import-Csv $csvPath
            
            "## Cluster Inventory Summary" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Metric | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| Total Clusters | $($data.Count) |" >> $env:GITHUB_STEP_SUMMARY
            
            $withTag = ($data | Where-Object { $_.HasUpdateRingTag -eq 'Yes' }).Count
            $withoutTag = ($data | Where-Object { $_.HasUpdateRingTag -eq 'No' }).Count
            "| With UpdateRing Tag | $withTag |" >> $env:GITHUB_STEP_SUMMARY
            "| Without UpdateRing Tag | $withoutTag |" >> $env:GITHUB_STEP_SUMMARY
            
            "" >> $env:GITHUB_STEP_SUMMARY
            "### UpdateRing Distribution" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            
            $rings = $data | Where-Object { $_.UpdateRing } | Group-Object UpdateRing
            if ($rings) {
                "| UpdateRing | Count |" >> $env:GITHUB_STEP_SUMMARY
                "|------------|-------|" >> $env:GITHUB_STEP_SUMMARY
                foreach ($ring in $rings) {
                    "| $($ring.Name) | $($ring.Count) |" >> $env:GITHUB_STEP_SUMMARY
                }
            } else {
                "No UpdateRing tags found." >> $env:GITHUB_STEP_SUMMARY
            }
        }

