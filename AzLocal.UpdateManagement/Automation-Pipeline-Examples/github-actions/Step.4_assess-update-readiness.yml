# Assess Update Readiness (Pre-flight go/no-go gate)
# --------------------------------------------------
# Runs Get-AzureLocalClusterUpdateReadiness and Test-AzureLocalClusterHealth -BlockingOnly
# against a target UpdateRing (or the whole fleet) BEFORE Step.5_apply-updates.yml runs.
#
# Outputs two JUnit XML artifacts consumed by the Actions test reporter:
#   - readiness.xml       (one test per cluster; fails if ReadyForUpdate = $false)
#   - health-blocking.xml (one test per cluster; fails if any Critical health failure exists)
#
# CSV artifacts are also attached for spreadsheet triage:
#   - readiness.csv
#   - health-blocking.csv
#
# This workflow is REPORT-ONLY and always succeeds. It surfaces not-ready / unhealthy
# clusters via the JUnit test reporter (Checks tab), the CSV artifacts, and the step
# summary - but it does NOT block downstream runs. In large fleets, day-to-day
# environmental issues (transient storage noise, a single node out, etc.) routinely affect
# a small subset of clusters; blocking the entire wave for one unhealthy cluster is rarely
# the desired behavior. Step.5_apply-updates.yml is itself per-cluster scoped, so clusters that
# are not ready will simply no-op there too.
#
# If you want a hard pass/fail signal for a chained gate, read the job outputs
# (not_ready, critical_failures) from a downstream workflow via `workflow_run` and apply
# your own tolerance threshold there.
#
# Remediation of Critical health failures is out of scope for this module - see the module
# README "Assess Readiness and Health BEFORE Applying Updates" section for pointers.

name: Assess Update Readiness

on:
  # BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
  # Add `schedule:` cron blocks here to enable automated readiness checks, e.g.:
  #   schedule:
  #     - cron: '0 4 * * *'  # Daily at 04:00 UTC, before apply-updates windows
  # Content between BEGIN/END markers is preserved by
  # Update-AzureLocalPipelineExample across module upgrades.
  # END-AZLOCAL-CUSTOMIZE:schedule-triggers

  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope of clusters to check'
        required: true
        default: 'by-update-ring'
        type: choice
        options:
          - 'by-update-ring'
          - 'all'
      update_ring:
        # v0.7.66: accepts a single ring (Wave1), a semicolon-delimited list (Prod;Ring2),
        # or '***' (three stars - deliberate, not a typo) to match every cluster that HAS the UpdateRing tag set.
        description: "UpdateRing tag value (only used when scope=by-update-ring). Single ring, 'Prod;Ring2', or '***'."
        required: false
        default: 'Wave1'
      module_version:
        description: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
        required: false
        default: ''

env:
  # Module version this workflow YAML was generated against. The install step compares
  # this to the version actually installed and to the latest on PSGallery, and emits a
  # ::notice annotation if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.68'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): manual workflow_dispatch input >
  # repository variable 'REQUIRED_MODULE_VERSION' > empty (latest).
  REQUIRED_MODULE_VERSION: ${{ github.event.inputs.module_version || vars.REQUIRED_MODULE_VERSION || '' }}

jobs:
  assess:
    name: Assess readiness + blocking health
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      checks: write
    outputs:
      not_ready: ${{ steps.gate.outputs.NOT_READY }}
      critical_failures: ${{ steps.gate.outputs.CRITICAL_FAILURES }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Azure CLI Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI Resource Graph Extension
        shell: pwsh
        run: az extension add --name resource-graph --yes

      - name: Install AzLocal.UpdateManagement from PSGallery
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
          if ($env:REQUIRED_MODULE_VERSION) {
              $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
              Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
          } else {
              Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
          }
          Install-Module @installArgs
          Import-Module AzLocal.UpdateManagement -Force
          $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
          $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
          $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
          Write-Host ""
          Write-Host "Module version summary"
          Write-Host "  Installed on runner       : $installed"
          Write-Host "  YAML generated against    : $generated"
          Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
          Write-Host ""
          Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
          # Drift signal 0 (v0.7.66): the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
          if ($installed -lt $generated) {
              $msg = "AzLocal.UpdateManagement v$installed is OLDER than the version this workflow YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzureLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update'."
              Write-Host "::warning title=AzLocal.UpdateManagement is older than workflow YAML expects::$msg"
          }
          if ($installed -gt $generated) {
              $msg = "Workflow YAML was generated against AzLocal.UpdateManagement v$generated but the runner installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
              Write-Host "::notice title=Workflow YAML may be stale::$msg"
          }
          if ($latest -and ($latest -gt $installed)) {
              $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
              Write-Host "::notice title=Newer AzLocal.UpdateManagement version available on PSGallery::$msg"
          }

      - name: Run readiness + blocking health checks
        id: gate
        shell: pwsh
        env:
          INPUT_SCOPE: ${{ github.event.inputs.scope }}
          INPUT_UPDATE_RING: ${{ github.event.inputs.update_ring }}
        run: |
          Import-Module AzLocal.UpdateManagement -Force

          $scope = $env:INPUT_SCOPE
          $updateRing = $env:INPUT_UPDATE_RING

          $outputDir = './artifacts'
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $readinessCsv = Join-Path $outputDir 'readiness.csv'
          $readinessXml = Join-Path $outputDir 'readiness.xml'
          $healthCsv    = Join-Path $outputDir 'health-blocking.csv'
          $healthXml    = Join-Path $outputDir 'health-blocking.xml'

          $scopeParams = @{}
          if ($scope -eq 'by-update-ring' -and $updateRing) {
              $scopeParams['ScopeByUpdateRingTag'] = $true
              $scopeParams['UpdateRingValue']      = $updateRing
              Write-Host "Scope: UpdateRing = $updateRing"
          } else {
              Write-Host "Scope: all clusters (via inventory)"
              $inventory = Get-AzureLocalClusterInventory -PassThru
              if (-not $inventory -or $inventory.Count -eq 0) {
                  Write-Warning 'No clusters found in inventory.'
                  "NOT_READY=0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                  "CRITICAL_FAILURES=0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                  exit 0
              }
              $scopeParams['ClusterResourceIds'] = @($inventory | Select-Object -ExpandProperty ResourceId)
          }

          Write-Host ''
          Write-Host '========================================' -ForegroundColor Cyan
          Write-Host 'Step 1: Readiness (Get-AzureLocalClusterUpdateReadiness)' -ForegroundColor Cyan
          Write-Host '========================================' -ForegroundColor Cyan

          # CSV for humans
          $readiness = Get-AzureLocalClusterUpdateReadiness @scopeParams `
              -ExportPath $readinessCsv `
              -PassThru

          # JUnit XML for the test reporter (ExportPath .xml auto-detects JUnitXml)
          $null = Get-AzureLocalClusterUpdateReadiness @scopeParams `
              -ExportPath $readinessXml

          $notReady = @($readiness | Where-Object { $_.ReadyForUpdate -ne $true }).Count
          $total = @($readiness).Count

          Write-Host ''
          Write-Host "Total clusters in scope: $total"
          Write-Host "Not ready for update  : $notReady"

          Write-Host ''
          Write-Host '========================================' -ForegroundColor Cyan
          Write-Host 'Step 2: Blocking health (Test-AzureLocalClusterHealth -BlockingOnly)' -ForegroundColor Cyan
          Write-Host '========================================' -ForegroundColor Cyan

          # Reuse the same scope. -UpdateSummary skip-fetch is not available here because the
          # per-cluster summaries are private to Get-AzureLocalClusterUpdateReadiness; a fresh
          # call is cheap and keeps the function self-contained.
          $health = Test-AzureLocalClusterHealth @scopeParams `
              -BlockingOnly `
              -ExportPath $healthCsv `
              -PassThru

          $null = Test-AzureLocalClusterHealth @scopeParams `
              -BlockingOnly `
              -ExportPath $healthXml

          $critical = @($health | Where-Object { $_.Severity -eq 'Critical' }).Count
          $clustersWithCritical = @($health | Where-Object { $_.Severity -eq 'Critical' } |
              Select-Object -ExpandProperty ClusterName -Unique).Count

          Write-Host ''
          Write-Host "Critical findings      : $critical"
          Write-Host "Clusters with Critical : $clustersWithCritical"

          "NOT_READY=$notReady"                   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "CRITICAL_FAILURES=$clustersWithCritical" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # GitHub step summary
          $lines = New-Object 'System.Collections.Generic.List[string]'
          $lines.Add('## Update Readiness Assessment')
          $lines.Add('')
          $lines.Add('| Metric | Count |')
          $lines.Add('|--------|-------|')
          $lines.Add("| Total clusters in scope | $total |")
          $lines.Add("| Not ready for update | $notReady |")
          $lines.Add("| Clusters with Critical health failures | $clustersWithCritical |")
          $lines.Add("| Total Critical findings | $critical |")
          $lines.Add('')
          $scopeLabel = $scope
          if ($updateRing) { $scopeLabel = "$scope (UpdateRing = $updateRing)" }
          $lines.Add("**Scope**: $scopeLabel")
          $lines.Add('')
          if ($notReady -gt 0 -or $clustersWithCritical -gt 0) {
              $lines.Add("> **Action required**: $notReady cluster(s) not ready and/or $clustersWithCritical cluster(s) with Critical health failures. Review the JUnit results in the Checks tab and the CSV artifacts; remediate (hardware vendor SBE / firmware / cluster health) before or alongside the next apply-updates run. **The healthy clusters are safe to proceed** - Step.5_apply-updates.yml is per-cluster scoped.")
          } else {
              $lines.Add('> **All clear**: every cluster in scope is ready for update. Safe to proceed with Step.5_apply-updates.yml for this ring.')
          }

          # Per-cluster detail table (installed version is useful for operators even
          # for clusters that ARE ready, so always include it when we have rows).
          if ($total -gt 0) {
              $lines.Add('')
              $lines.Add('### Cluster detail')
              $lines.Add('')
              $lines.Add('| Cluster | Current version | Current SBE version | Update state | Health | Ready | Recommended update |')
              $lines.Add('|---------|-----------------|---------------------|--------------|--------|-------|--------------------|')
              foreach ($r in $readiness) {
                  $cv  = if ($r.CurrentVersion) { $r.CurrentVersion } else { '-' }
                  $csv = if ($r.PSObject.Properties['CurrentSbeVersion'] -and $r.CurrentSbeVersion) { $r.CurrentSbeVersion } else { '-' }
                  $ru  = if ($r.RecommendedUpdate) { $r.RecommendedUpdate } else { '-' }
                  $lines.Add("| $($r.ClusterName) | $cv | $csv | $($r.UpdateState) | $($r.HealthState) | $($r.ReadyForUpdate) | $ru |")
              }
          }
          ($lines -join [Environment]::NewLine) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Compute Artifact Timestamp
        if: always()
        id: artifact-stamp
        shell: pwsh
        # v0.7.66: every downloadable artifact gets a UTC timestamp suffix so multiple runs on
        # the same day produce distinct zip names.
        run: |
          $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
          "timestamp=$stamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Artifact timestamp: $stamp"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: azlocal-readiness-assessment-report_${{ steps.artifact-stamp.outputs.timestamp }}
          path: ./artifacts/*
          retention-days: 30

      - name: Publish readiness JUnit
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Readiness (one test per cluster)
          path: ./artifacts/readiness.xml
          reporter: java-junit
        continue-on-error: true

      - name: Publish blocking-health JUnit
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Blocking Health Checks (one test per cluster)
          path: ./artifacts/health-blocking.xml
          reporter: java-junit
        continue-on-error: true
