# Fleet Update Status Monitoring
# This workflow monitors update status across all Azure Local clusters and generates reports
#
# USE CASES:
# - Daily/weekly health checks on cluster update status
# - Executive dashboards showing fleet-wide update adoption
# - Alerting when clusters have update failures
# - Compliance tracking for update deployments
#
# REPORTS GENERATED:
# - JUnit XML: Shows each cluster as a test case (passed/failed/skipped) for CI/CD visualization
#   (testcase bodies now include `Start Time:` and `End Time:` lines per cluster).
# - CSV: Detailed export for spreadsheet analysis (includes `EndTime` column sourced
#   from properties.progress.endTimeUtc, with fallback to properties.lastUpdatedTime - blank for InProgress runs).
# - HTML report (Recent Update Run History section): includes `End Time` column for the
#   aggregated multi-attempt row.
# - JSON: Machine-readable format for custom integrations
#
# AUTHENTICATION:
# Uses OpenID Connect (OIDC) - recommended for secretless authentication
# See: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect

# Workflow name carries the same Step.N - prefix as the filename so the GitHub
# Actions sidebar (which sorts workflows alphabetically by this `name:` field)
# lists the eight pipelines in execution order.
name: Step.6 - Fleet Update Status

on:
  # BEGIN-AZLOCAL-CUSTOMIZE:schedule-triggers
  # Edits inside this block are preserved across Update-AzureLocalPipelineExample
  # module upgrades. Add or modify `schedule:` cron blocks below.
  # Run on schedule (e.g., daily at 6 AM UTC)
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 AM UTC
  # END-AZLOCAL-CUSTOMIZE:schedule-triggers

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope of clusters to check'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'              # All clusters across all subscriptions
          - 'by-update-ring'   # Filter by UpdateRing tag
      update_ring:
        # accepts a single ring (Wave1), a semicolon-delimited list (Prod;Ring2),
        # or '***' (three stars - deliberate, not a typo) to match every cluster that HAS the UpdateRing tag set.
        description: "UpdateRing tag value (only used when scope=by-update-ring). Single ring, 'Prod;Ring2', or '***'."
        required: false
        default: ''
      include_update_runs:
        description: 'Include recent update run history in report'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      module_version:
        description: 'Pin AzLocal.UpdateManagement version (empty = latest from PSGallery). See Automation-Pipeline-Examples/README.md section 5 "Optional configuration".'
        required: false
        default: ''
      # --- ITSM Connector (ServiceNow auto-raise on fleet-update-status) ---
      # Set raise_itsm_ticket=true to open ServiceNow incidents from each unresolved
      # Failed update run reported by the '📜 Update Run History and Error Details'
      # testsuite (and any failed AzureLocalFleetUpdateStatus row). Default is false
      # so existing schedules stay byte-identical until you opt in. The connector reads
      # the JUnit file Step.6 already produces (./reports/readiness-status.xml) and
      # the trigger matrix in ./.itsm/azurelocal-itsm.yml.
      raise_itsm_ticket:
        description: 'Open ITSM tickets (ServiceNow) for fleet-update-status failures'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      itsm_config_path:
        description: 'Path to ITSM matrix config (YAML or JSON)'
        required: false
        default: './.itsm/azurelocal-itsm.yml'
      itsm_dry_run:
        description: 'ITSM: build payloads + run read-only dedupe but do NOT create tickets'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      itsm_force_create:
        description: 'ITSM: bypass dedupe and always create new tickets (use with caution)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  # Module version this workflow YAML was generated against. The install step compares
  # this to the version actually installed and to the latest on PSGallery, and emits a
  # ::notice annotation if the YAML appears stale - prompting you to refresh via
  # Copy-AzureLocalPipelineExample -Update. See Automation-Pipeline-Examples/README.md section 5.
  GENERATED_AGAINST_MODULE_VERSION: '0.7.71'
  # Resolution order for the module version pin (leave all unset to install the latest,
  # which is the default "fix-forward" behaviour): manual workflow_dispatch input >
  # repository variable 'REQUIRED_MODULE_VERSION' > empty (latest).
  REQUIRED_MODULE_VERSION: ${{ github.event.inputs.module_version || vars.REQUIRED_MODULE_VERSION || '' }}

jobs:
  fleet-status:
    name: Collect Fleet Update Status
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      checks: write  # Required for test reporter
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    # OIDC Authentication - recommended
    - name: Azure CLI Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        # AZURE_SUBSCRIPTION_ID is a repository *Variable* (vars.*), not a Secret. It
        # is consumed ONLY here: azure/login@v3 runs `az account set --subscription
        # <id>` after the OIDC token exchange so the runner has a default
        # `az account` context. It is NOT used to scope Azure Resource Graph queries
        # (those run fleet-wide across every subscription the federated identity can
        # read) and is NOT interpolated into Azure portal deep-link URLs (those use
        # the per-row `subscriptionId` returned by ARG).
        # Set it via: gh variable set AZURE_SUBSCRIPTION_ID --body <subId>
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    - name: Install Azure CLI Resource Graph Extension
      shell: pwsh
      run: |
        az extension add --name resource-graph --yes
    
    - name: Install AzLocal.UpdateManagement from PSGallery
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $installArgs = @{ Name = 'AzLocal.UpdateManagement'; Scope = 'CurrentUser'; Force = $true; AllowClobber = $true }
        if ($env:REQUIRED_MODULE_VERSION) {
            $installArgs.RequiredVersion = $env:REQUIRED_MODULE_VERSION
            Write-Host "REQUIRED_MODULE_VERSION is set - pinning install to v$($env:REQUIRED_MODULE_VERSION)."
        } else {
            Write-Host "REQUIRED_MODULE_VERSION is empty - installing the latest version from PSGallery (default fix-forward behaviour)."
        }
        Install-Module @installArgs
        Import-Module AzLocal.UpdateManagement -Force
        $installed = (Get-Module AzLocal.UpdateManagement | Sort-Object Version -Descending | Select-Object -First 1).Version
        $generated = [version]$env:GENERATED_AGAINST_MODULE_VERSION
        $latest    = (Find-Module -Name AzLocal.UpdateManagement -Repository PSGallery -ErrorAction SilentlyContinue).Version
        Write-Host ""
        Write-Host "Module version summary"
        Write-Host "  Installed on runner       : $installed"
        Write-Host "  YAML generated against    : $generated"
        Write-Host "  Latest on PSGallery       : $(if ($latest) { $latest } else { '(lookup failed - check network)' })"
        Write-Host ""
        Get-Module AzLocal.UpdateManagement | Format-List Name, Version, Path
        # Drift signal 0: the module installed at runtime is OLDER than the version this YAML was generated against. Cmdlets, parameters, or output schemas referenced by this YAML may not exist in the installed module - emitted as a warning because this is the most likely cause of a hard runtime failure later in the job.
        if ($installed -lt $generated) {
            $msg = "AzLocal.UpdateManagement v$installed is OLDER than the version this workflow YAML was generated against (v$generated). Cmdlets, parameters, or output schemas referenced by this YAML may not exist in v$installed. Set REQUIRED_MODULE_VERSION to v$generated, or refresh the YAML to match the installed module via 'Copy-AzureLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update'."
            Write-Host "::warning title=AzLocal.UpdateManagement is older than workflow YAML expects::$msg"
        }
        if ($installed -gt $generated) {
            $msg = "Workflow YAML was generated against AzLocal.UpdateManagement v$generated but the runner installed v$installed. Pipeline steps may have been improved in later releases - to refresh, re-run 'Copy-AzureLocalPipelineExample -Destination .\.github\workflows -Platform GitHub -Update' (you will be prompted per file; add -Confirm:`$false to bypass). Pipeline YAMLs are under git so 'git diff' shows exactly what changed before commit."
            Write-Host "::notice title=Workflow YAML may be stale::$msg"
        }
        if ($latest -and ($latest -gt $installed)) {
            $msg = "AzLocal.UpdateManagement v$latest is available on PSGallery; this run installed v$installed. Review the module CHANGELOG before bumping REQUIRED_MODULE_VERSION (or clear the pin to install the latest automatically)."
            Write-Host "::notice title=Newer AzLocal.UpdateManagement version available on PSGallery::$msg"
        }
    
    - name: Collect Fleet Update Status
      shell: pwsh
      id: fleet-status
      env:
        INPUT_SCOPE: ${{ github.event.inputs.scope || 'all' }}
        INPUT_UPDATE_RING: ${{ github.event.inputs.update_ring }}
        INPUT_INCLUDE_UPDATE_RUNS: ${{ github.event.inputs.include_update_runs || 'true' }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force
        
        # Create output directory
        $outputDir = "./reports"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        $scope = $env:INPUT_SCOPE
        $updateRing = $env:INPUT_UPDATE_RING
        $includeRuns = $env:INPUT_INCLUDE_UPDATE_RUNS -eq 'true'
        
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Fleet Update Status Collection" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Scope: $scope"
        if ($updateRing) { Write-Host "UpdateRing Filter: $updateRing" }
        Write-Host "Include Update Runs: $includeRuns"
        Write-Host ""
        
        # Step 1: Get cluster inventory to find all clusters
        Write-Host "Step 1: Getting cluster inventory..." -ForegroundColor Yellow
        
        $inventoryCsv = Join-Path $outputDir "cluster-inventory.csv"
        $inventory = Get-AzureLocalClusterInventory -ExportPath $inventoryCsv -PassThru
        
        if (-not $inventory -or $inventory.Count -eq 0) {
            Write-Warning "No clusters found in inventory"
            exit 0
        }
        
        Write-Host "Found $($inventory.Count) total cluster(s)" -ForegroundColor Green
        
        # Step 2: Get readiness status for targeted clusters
        Write-Host ""
        Write-Host "Step 2: Checking update readiness..." -ForegroundColor Yellow
        
        $readinessParams = @{}
        
        if ($scope -eq 'by-update-ring' -and $updateRing) {
            $readinessParams['ScopeByUpdateRingTag'] = $true
            $readinessParams['UpdateRingValue'] = $updateRing
        }
        else {
            # Get all cluster resource IDs from inventory
            $resourceIds = $inventory | Select-Object -ExpandProperty ResourceId
            $readinessParams['ClusterResourceIds'] = $resourceIds
        }
        
        # Export to multiple formats
        $readinessCsv = Join-Path $outputDir "readiness-status.csv"
        $readinessJson = Join-Path $outputDir "readiness-status.json"
        $readinessXml = Join-Path $outputDir "readiness-status.xml"
        
        $readiness = Get-AzureLocalClusterUpdateReadiness @readinessParams -ExportPath $readinessCsv -PassThru
        
        # Also export to JSON
        $hasPrerequisite = @($readiness | Where-Object { $_.HasPrerequisiteUpdates -ne "" }).Count
        $readinessExport = @{
            Timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"
            TotalClusters = $readiness.Count
            Summary = @{
                Ready = ($readiness | Where-Object { $_.ReadyForUpdate -eq $true }).Count
                InProgress = ($readiness | Where-Object { $_.UpdateState -eq "UpdateInProgress" }).Count
                HealthFailures = ($readiness | Where-Object { $_.HealthState -eq "Failure" }).Count
                HasPrerequisite = $hasPrerequisite
                NotReady = ($readiness | Where-Object { $_.ReadyForUpdate -ne $true -and $_.UpdateState -ne "UpdateInProgress" }).Count
            }
            Clusters = $readiness
        }
        $readinessExport | ConvertTo-Json -Depth 10 | Out-File $readinessJson -Encoding UTF8
        
        # Step 3: Generate JUnit XML for CI/CD visualization
        Write-Host ""
        Write-Host "Step 3: Generating JUnit XML report..." -ForegroundColor Yellow
        
        # Build JUnit XML manually for more control over test case details
        $timestamp = Get-Date -Format "yyyy-MM-ddTHH:mm:ss"
        $totalTests = $readiness.Count

        # Critical Health Status (this is what the JUnit XML pass/fail represents):
        #   FAILED = HealthState=Failure OR UpdateState=Failed OR SBE prerequisite blocked
        #   PASSED = everything else
        $failures = @($readiness | Where-Object { $_.HealthState -eq "Failure" -or $_.UpdateState -eq "Failed" -or $_.HasPrerequisiteUpdates -ne "" }).Count
        $criticalHealthPassed = $totalTests - $failures

        # Mutually-exclusive primary status buckets so the summary table rows
        # always sum to Total Clusters. Priority cascade (first match wins):
        #   UpdateFailed > HealthFailure > SbeBlocked > InProgress > ReadyForUpdate > UpToDate > Other
        $stUpdateFailed = 0
        $stHealthFailure = 0
        $stSbeBlocked = 0
        $stInProgress = 0
        $stReadyForUpdate = 0
        $stUpToDate = 0
        $stOther = 0
        foreach ($c in $readiness) {
            if ($c.UpdateState -eq 'Failed') { $stUpdateFailed++ }
            elseif ($c.HealthState -eq 'Failure') { $stHealthFailure++ }
            elseif ($c.HasPrerequisiteUpdates) { $stSbeBlocked++ }
            elseif ($c.UpdateState -eq 'UpdateInProgress') { $stInProgress++ }
            elseif ($c.ReadyForUpdate -eq $true) { $stReadyForUpdate++ }
            elseif ($c.UpdateState -in @('UpToDate','AppliedSuccessfully')) { $stUpToDate++ }
            else { $stOther++ }
        }

        # Legacy variable names (kept for backwards-compatible step outputs)
        $inProgress = $stInProgress
        $ready = $stReadyForUpdate
        $upToDate = $stUpToDate

        # Fleet Version Distribution - pivot clusters by CurrentVersion
        # so the JUnit XML (and the markdown summary) lead with "what versions
        # are presently installed across the fleet, and what % of clusters
        # are on each one". One row per distinct CurrentVersion, sorted by
        # cluster count (descending). Used by both the JUnit emitter below
        # (first testsuite) and the 'Create Status Summary' markdown step.
        $versionGroups = @($readiness | Group-Object {
            if ([string]::IsNullOrWhiteSpace($_.CurrentVersion)) { '(unknown)' } else { [string]$_.CurrentVersion }
        } | Sort-Object Count -Descending)
        $versionDistribution = @($versionGroups | ForEach-Object {
            $clusterNames = @($_.Group | Sort-Object ClusterName | ForEach-Object { [string]$_.ClusterName })
            [PSCustomObject]@{
                Version    = $_.Name
                Count      = $_.Count
                Percentage = if ($totalTests -gt 0) { [math]::Round(($_.Count / $totalTests) * 100, 1) } else { 0 }
                Clusters   = ($clusterNames -join ', ')
            }
        })
        $distinctVersions = $versionDistribution.Count
        $mostCommonVersion = if ($distinctVersions -gt 0) { $versionDistribution[0].Version } else { '(none)' }
        $mostCommonVersionPct = if ($distinctVersions -gt 0) { $versionDistribution[0].Percentage } else { 0 }

        # Compute the "supported YYMM window" used by the SupportStatus column.
        # Azure Local solution-bundle releases use the format <prefix>.YYMM.X.X
        # (YYMM = YY 20-99, MM 01-12; validated by regex '^[0-9]{4}$'). The rolling
        # support window is the most-recent N YYMM values inclusive.
        #
        # ANCHOR PRIORITY:
        #   1) Microsoft manifest (preferred):  Get-AzureLocalLatestSolutionVersion
        #      queries the unauthenticated public catalog at https://aka.ms/AzureEdgeUpdates,
        #      takes the highest YYMM across ApplicableUpdate.UpdateInfo +
        #      PackageMetadata.ServicesUpdates.Update.UpdateInfo, and steps back
        #      6 calendar months (e.g. 2604 -> 2604,2603,2602,2601,2512,2511).
        #      As soon as Microsoft publishes any 2604 release, 2510 drops out of
        #      the window even if NO cluster in the fleet has installed 2604 yet.
        #   2) Fleet-observed fallback (when the manifest is unreachable):
        #      top-6 distinct YYMM values seen in the fleet's own CurrentVersion
        #      values. This is the GA behaviour preserved as a safety net.
        #
        # Supported   = YYMM is in the anchor window
        # Unsupported = YYMM is parseable but older than the anchor window
        # Unknown     = CurrentVersion is empty / malformed / has no YYMM token
        #
        # Cross-check with the Microsoft Azure Local lifecycle docs before any
        # operator action.
        $supportSource         = 'fleet-observed'
        $latestReleasedYymm    = ''
        $latestReleasedVersion = ''
        $manifestFetchedAt     = ''
        $manifestUrl           = 'https://aka.ms/AzureEdgeUpdates'
        $manifestError         = ''
        try {
            Write-Host "Querying $manifestUrl for the latest released Azure Local solution version..."
            $manifestProbe = Get-AzureLocalLatestSolutionVersion -ErrorAction Stop
            $supportedYymms        = @($manifestProbe.SupportedYYMMs)
            $supportSource         = 'Microsoft manifest'
            $latestReleasedYymm    = [string]$manifestProbe.LatestYYMM
            $latestReleasedVersion = [string]$manifestProbe.LatestVersion
            $manifestFetchedAt     = $manifestProbe.ManifestFetchedAt.ToString('o')
            Write-Host ("Latest released solution version: {0} (YYMM={1}); support window anchored on Microsoft manifest." -f $latestReleasedVersion, $latestReleasedYymm) -ForegroundColor Green
        } catch {
            $manifestError = $_.Exception.Message
            Write-Host "::warning::Failed to query $manifestUrl - falling back to fleet-observed top-6 YYMM window. Error: $manifestError"
            $observedYymms = @($versionDistribution | ForEach-Object {
                $parts = ([string]$_.Version) -split '\.'
                if ($parts.Count -ge 2) { $parts[1] } else { '' }
            } | Where-Object { $_ -match '^[0-9]{4}$' } | Sort-Object -Unique)
            $supportedYymms = @($observedYymms | Sort-Object -Descending | Select-Object -First 6)
        }
        $supportedCount = 0
        $unsupportedCount = 0
        $unknownVersionCount = 0
        foreach ($v in $versionDistribution) {
            $parts = ([string]$v.Version) -split '\.'
            $yymm = if ($parts.Count -ge 2) { $parts[1] } else { '' }
            $supportStatus = if ($yymm -match '^[0-9]{4}$') {
                if ($supportedYymms -contains $yymm) { 'Supported' } else { 'Unsupported' }
            } else { 'Unknown' }
            $v | Add-Member -MemberType NoteProperty -Name Yymm -Value $yymm -Force
            $v | Add-Member -MemberType NoteProperty -Name SupportStatus -Value $supportStatus -Force
            switch ($supportStatus) {
                'Supported'   { $supportedCount   += [int]$v.Count }
                'Unsupported' { $unsupportedCount += [int]$v.Count }
                'Unknown'     { $unknownVersionCount += [int]$v.Count }
            }
        }
        $supportedYymmWindow = if ($supportedYymms.Count -gt 0) { ($supportedYymms -join ',') } else { '(none)' }

        Write-Host ""
        Write-Host "Fleet Version Distribution ($distinctVersions distinct version(s) across $totalTests cluster(s)):" -ForegroundColor Cyan
        Write-Host ("Support source: {0}" -f $supportSource)
        if ($latestReleasedYymm) {
            Write-Host ("Latest released YYMM (Microsoft manifest): {0} ({1})" -f $latestReleasedYymm, $latestReleasedVersion)
        }
        Write-Host ("Supported YYMM window (top {0}): {1}" -f $supportedYymms.Count, $supportedYymmWindow)
        foreach ($v in $versionDistribution) {
            Write-Host ("  {0,-30} {1,5} cluster(s)  ({2,5}%)  [{3}]" -f $v.Version, $v.Count, $v.Percentage, $v.SupportStatus)
        }

        # Build XML using string concatenation (avoids YAML parser issues with here-strings)
        $xmlContent = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
        $xmlContent += '<testsuites>' + "`n"

        # Emit Fleet Version Distribution as the FIRST testsuite so
        # JUnit consumers (dorny/test-reporter, Azure DevOps Test tab, etc.)
        # render the "what versions are installed across the fleet" overview
        # ahead of the per-cluster Critical Health Status testsuite.
        # Each testcase = one distinct CurrentVersion (all marked passed).
        # Per-testcase <properties> carry Count / Percentage / Clusters so
        # downstream consumers can read them programmatically.
        $xmlContent += "  <testsuite name=`"Fleet Version Distribution`" tests=`"$distinctVersions`" failures=`"0`" errors=`"0`" skipped=`"0`" time=`"0`" timestamp=`"$timestamp`">" + "`n"
        $xmlContent += '    <properties>' + "`n"
        $xmlContent += "      <property name=`"testCategory`" value=`"FleetVersionDistribution`"/>" + "`n"
        $xmlContent += "      <property name=`"description`" value=`"Overall Fleet Update Status - cluster count and percentage per distinct CurrentVersion (StackHCI build presently installed). Source field: Get-AzureLocalClusterUpdateReadiness.CurrentVersion. SupportStatus uses the rolling 6-month YYMM window anchored on the latest released Azure Local solution version published at https://aka.ms/AzureEdgeUpdates (supportSource='Microsoft manifest'); when the manifest is unreachable the pipeline falls back to the top-6 distinct YYMM values observed in the fleet (supportSource='fleet-observed'). Cross-check against the Microsoft Azure Local lifecycle docs before operator action.`"/>" + "`n"
        $xmlContent += "      <property name=`"scope`" value=`"$scope`"/>" + "`n"
        $xmlContent += "      <property name=`"updateRing`" value=`"$updateRing`"/>" + "`n"
        $xmlContent += "      <property name=`"totalClusters`" value=`"$totalTests`"/>" + "`n"
        $xmlContent += "      <property name=`"distinctVersions`" value=`"$distinctVersions`"/>" + "`n"
        $xmlContent += "      <property name=`"mostCommonVersion`" value=`"$([string]$mostCommonVersion -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '`"','&quot;')`"/>" + "`n"
        $xmlContent += "      <property name=`"mostCommonVersionPercentage`" value=`"$mostCommonVersionPct`"/>" + "`n"
        $xmlContent += "      <property name=`"supportSource`" value=`"$supportSource`"/>" + "`n"
        $xmlContent += "      <property name=`"latestReleasedYymm`" value=`"$latestReleasedYymm`"/>" + "`n"
        $latestReleasedVersionEsc = ([string]$latestReleasedVersion) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
        $xmlContent += "      <property name=`"latestReleasedVersion`" value=`"$latestReleasedVersionEsc`"/>" + "`n"
        $xmlContent += "      <property name=`"manifestUrl`" value=`"$manifestUrl`"/>" + "`n"
        $xmlContent += "      <property name=`"manifestFetchedAt`" value=`"$manifestFetchedAt`"/>" + "`n"
        $xmlContent += "      <property name=`"supportedYymmWindow`" value=`"$supportedYymmWindow`"/>" + "`n"
        $xmlContent += "      <property name=`"supportedClusters`" value=`"$supportedCount`"/>" + "`n"
        $xmlContent += "      <property name=`"unsupportedClusters`" value=`"$unsupportedCount`"/>" + "`n"
        $xmlContent += "      <property name=`"unknownVersionClusters`" value=`"$unknownVersionCount`"/>" + "`n"
        $xmlContent += '    </properties>' + "`n"
        foreach ($v in $versionDistribution) {
            $vNameEsc     = ([string]$v.Version)  -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
            $vTestName    = "Version-$vNameEsc"
            $vClustersEsc = ([string]$v.Clusters) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
            $vSystemOut   = "Version: $($v.Version)`nYYMM: $($v.Yymm)`nSupportStatus: $($v.SupportStatus)`nClusters: $($v.Count)`nPercentage: $($v.Percentage)%`nClusterNames: $($v.Clusters)"
            $vSystemOut   = $vSystemOut -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            $xmlContent += "    <testcase name=`"$vTestName`" classname=`"FleetVersionDistribution`" time=`"0`">`n"
            $xmlContent += "      <properties>`n"
            $xmlContent += "        <property name=`"Version`" value=`"$vNameEsc`"/>`n"
            $xmlContent += "        <property name=`"Yymm`" value=`"$($v.Yymm)`"/>`n"
            $xmlContent += "        <property name=`"SupportStatus`" value=`"$($v.SupportStatus)`"/>`n"
            $xmlContent += "        <property name=`"ClusterCount`" value=`"$($v.Count)`"/>`n"
            $xmlContent += "        <property name=`"Percentage`" value=`"$($v.Percentage)`"/>`n"
            $xmlContent += "        <property name=`"Clusters`" value=`"$vClustersEsc`"/>`n"
            $xmlContent += "      </properties>`n"
            $xmlContent += "      <system-out><![CDATA[$vSystemOut]]></system-out>`n"
            $xmlContent += "    </testcase>`n"
        }
        $xmlContent += "  </testsuite>`n"

        $xmlContent += "  <testsuite name=`"AzureLocalFleetUpdateStatus`" tests=`"$totalTests`" failures=`"$failures`" errors=`"0`" skipped=`"0`" time=`"0`" timestamp=`"$timestamp`">" + "`n"
        $xmlContent += '    <properties>' + "`n"
        $xmlContent += "      <property name=`"testCategory`" value=`"CriticalHealthStatus`"/>" + "`n"
        $xmlContent += "      <property name=`"description`" value=`"Each testcase = one cluster's Critical Health Status. PASSED = healthy + no failures + not SBE-blocked. FAILED = HealthState=Failure OR UpdateState=Failed OR SBE prerequisite blocked.`"/>" + "`n"
        $xmlContent += "      <property name=`"scope`" value=`"$scope`"/>" + "`n"
        $xmlContent += "      <property name=`"updateRing`" value=`"$updateRing`"/>" + "`n"
        $xmlContent += "      <property name=`"totalClusters`" value=`"$totalTests`"/>" + "`n"
        $xmlContent += "      <property name=`"criticalHealthPassed`" value=`"$criticalHealthPassed`"/>" + "`n"
        $xmlContent += "      <property name=`"criticalHealthFailed`" value=`"$failures`"/>" + "`n"
        $xmlContent += "      <property name=`"primaryUpdateFailed`" value=`"$stUpdateFailed`"/>" + "`n"
        $xmlContent += "      <property name=`"primaryHealthFailure`" value=`"$stHealthFailure`"/>" + "`n"
        $xmlContent += "      <property name=`"primarySbeBlocked`" value=`"$stSbeBlocked`"/>" + "`n"
        $xmlContent += "      <property name=`"primaryInProgress`" value=`"$stInProgress`"/>" + "`n"
        $xmlContent += "      <property name=`"primaryReadyForUpdate`" value=`"$stReadyForUpdate`"/>" + "`n"
        $xmlContent += "      <property name=`"primaryUpToDate`" value=`"$stUpToDate`"/>" + "`n"
        $xmlContent += "      <property name=`"primaryNeedsInvestigation`" value=`"$stOther`"/>" + "`n"
        $xmlContent += '    </properties>' + "`n"

        # bucket clusters into 'failed' vs 'passed' BEFORE emission so dorny/test-reporter
        # renders all failed clusters first (in the run summary, in source order). Within each bucket
        # clusters are sorted by ClusterName for stable, scannable output.
        $failedClusters = @()
        $passedClusters = @()
        foreach ($cluster in $readiness) {
            if ($cluster.HealthState -eq "Failure" -or $cluster.UpdateState -eq "Failed" -or ($cluster.HasPrerequisiteUpdates -ne "")) {
                $failedClusters += $cluster
            } else {
                $passedClusters += $cluster
            }
        }
        $orderedClusters = @($failedClusters | Sort-Object ClusterName) + @($passedClusters | Sort-Object ClusterName)

        foreach ($cluster in $orderedClusters) {
            $clusterName = $cluster.ClusterName -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
            $testName = "UpdateStatus-$clusterName"
            $className = "AzureLocalFleetUpdateStatus.$($cluster.ResourceGroup)"

            # Determine test outcome
            $status = "passed"
            $failureMessage = ""
            $failureType = ""

            if ($cluster.HealthState -eq "Failure" -or $cluster.UpdateState -eq "Failed") {
                $status = "failed"
                $failureType = "UpdateFailure"
                $failureMessage = "UpdateState: $($cluster.UpdateState), Health: $($cluster.HealthState)"
                if ($cluster.HealthCheckFailures) {
                    $failureMessage += ", Issues: $($cluster.HealthCheckFailures -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                }
            }
            elseif ($cluster.HasPrerequisiteUpdates -ne "") {
                $status = "failed"
                $failureType = "HasPrerequisite"
                $failureMessage = "Updates blocked by SBE prerequisite: $($cluster.HasPrerequisiteUpdates -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                if ($cluster.SBEDependency) {
                    $failureMessage += " - Vendor: $($cluster.SBEDependency -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;')"
                }
            }

            # Build system-out with cluster details (using string concat to avoid YAML parser issues)
            $systemOut = "Cluster: $($cluster.ClusterName)`n"
            $systemOut += "Resource Group: $($cluster.ResourceGroup)`n"
            $systemOut += "Subscription: $($cluster.SubscriptionId)`n"
            $systemOut += "Update State: $($cluster.UpdateState)`n"
            $systemOut += "Health State: $($cluster.HealthState)`n"
            $systemOut += "Ready for Update: $($cluster.ReadyForUpdate)`n"
            $systemOut += "Available Updates: $($cluster.AvailableUpdates)`n"
            $systemOut += "Ready Updates: $($cluster.ReadyUpdates)`n"
            $systemOut += "Has Prerequisite Updates: $($cluster.HasPrerequisiteUpdates)`n"
            $systemOut += "SBE Dependency: $($cluster.SBEDependency)`n"
            $systemOut += "Recommended Update: $($cluster.RecommendedUpdate)"
            $systemOut = $systemOut -replace '&', '&amp;' -replace '<', '&lt;' -replace '>', '&gt;'
            
            $xmlContent += "`n    <testcase name=`"$testName`" classname=`"$className`" time=`"0`">`n"
            # per-testcase <properties> for the ITSM connector. The
            # dedupe key in New-AzureLocalIncident is SHA256(ClusterResourceId|UpdateName|Category);
            # without these three properties on every testcase the connector
            # reports Action='Skipped' with "Row missing ClusterResourceId or UpdateName".
            # Status is mirrored so the trigger-matrix evaluator can pick the
            # right severity/category for fleet-update-status rows.
            $clusterResIdEsc = ([string]$cluster.ResourceId) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
            $recoUpdEsc      = ([string]$cluster.RecommendedUpdate) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
            $clusterPortalEsc = if ($cluster.ResourceId) { "https://portal.azure.com/#@/resource$($cluster.ResourceId)" -replace '&','&amp;' -replace '"','&quot;' } else { '' }
            $xmlContent += "      <properties>`n"
            $xmlContent += "        <property name=`"ClusterName`" value=`"$clusterName`"/>`n"
            $xmlContent += "        <property name=`"ClusterResourceId`" value=`"$clusterResIdEsc`"/>`n"
            $xmlContent += "        <property name=`"UpdateName`" value=`"$recoUpdEsc`"/>`n"
            $xmlContent += "        <property name=`"Status`" value=`"$(if ($status -eq 'failed') { $failureType } else { 'Success' })`"/>`n"
            $xmlContent += "        <property name=`"ClusterPortalUrl`" value=`"$clusterPortalEsc`"/>`n"
            $xmlContent += "      </properties>`n"
            $xmlContent += "      <system-out><![CDATA[$systemOut]]></system-out>`n"
            
            if ($status -eq "failed") {
                $xmlContent += "      <failure message=`"Critical Health Status: Failed`" type=`"$failureType`">$failureMessage</failure>`n"
            }
            
            $xmlContent += "    </testcase>`n"
        }
        
        $xmlContent += "  </testsuite>`n"

        # ---------------------------------------------------------------
        # '📜 Update Run History and Error Details' testsuite.
        # ARG-first Update Run History projection (fleet-scale)
        # table. Each Failed/unresolved update run becomes a testcase with
        # the verbose error details (DeepestErrMsg) as the failure body and
        # Status / CurrentStep / Duration / PortalLink in system-out. The
        # cmdlet's -OnlyUnresolved filter dedupes against any later Succeeded
        # run on the same (cluster, update) pair (dedup aligned with the Azure portal update-runs view).
        # ---------------------------------------------------------------
        Write-Host "" 
        Write-Host "Step 3b: Collecting Update Run History + Verbose Error Details (ARG-first, fleet-scale)..." -ForegroundColor Yellow
        $runFailures = @()
        try {
            $runFailures = @(Get-AzureLocalUpdateRunFailures -State Failed -OnlyUnresolved -Since (Get-Date).AddDays(-30))
        }
        catch {
            Write-Warning "Get-AzureLocalUpdateRunFailures threw: $($_.Exception.Message). Continuing with empty run-history section."
            $runFailures = @()
        }
        $runFailures = @($runFailures | Sort-Object StartTime -Descending)
        $runHistoryCount = $runFailures.Count
        Write-Host "Found $runHistoryCount unresolved Failed update run(s)." -ForegroundColor $(if ($runHistoryCount -gt 0) { 'Yellow' } else { 'Green' })

        # Export run-history rows as CSV + JSON for the artifact bundle.
        $runHistoryCsv  = Join-Path $outputDir "update-run-history.csv"
        $runHistoryJson = Join-Path $outputDir "update-run-history.json"
        if ($runHistoryCount -gt 0) {
            $runFailures |
                Select-Object ClusterName, UpdateName, State, Status, CurrentStep, Duration, StartTime, LastUpdated, DeepestStepName, ErrorCategory, DeepestErrMsg, UpdateRunPortalUrl, ClusterResourceId, RunId |
                Export-Csv -Path $runHistoryCsv -NoTypeInformation -Force
            $runFailures | ConvertTo-Json -Depth 4 | Out-File $runHistoryJson -Encoding UTF8
        }

        $xmlContent += "  <testsuite name=`"📜 Update Run History and Error Details`" tests=`"$runHistoryCount`" failures=`"$runHistoryCount`" errors=`"0`" skipped=`"0`" time=`"0`" timestamp=`"$timestamp`">`n"
        $xmlContent += "    <properties>`n"
        $xmlContent += "      <property name=`"description`" value=`"Verbose error details for each unresolved Failed update run (ARG-first, fleet-scale).`"/>`n"
        $xmlContent += "      <property name=`"sourceCmdlet`" value=`"Get-AzureLocalUpdateRunFailures -State Failed -OnlyUnresolved -Since (Get-Date).AddDays(-30)`"/>`n"
        $xmlContent += "      <property name=`"failedRunCount`" value=`"$runHistoryCount`"/>`n"
        $xmlContent += "    </properties>`n"

        foreach ($f in $runFailures) {
            $fcName     = ([string]$f.ClusterName) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            $fuName     = ([string]$f.UpdateName)  -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            $fStatus    = ([string]$f.Status)      -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            $fCurStep   = ([string]$f.CurrentStep) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            $fDuration  = [string]$f.Duration
            $fStart     = [string]$f.StartTime
            $fLast      = [string]$f.LastUpdated
            $fCategory  = [string]$f.ErrorCategory
            $fPortal    = [string]$f.UpdateRunPortalUrl
            $fErr       = if ($f.DeepestErrMsg) {
                if ($f.DeepestErrMsg.Length -gt 4000) { $f.DeepestErrMsg.Substring(0,4000) + ' ... (truncated)' } else { $f.DeepestErrMsg }
            } else { '(no error message captured)' }
            $fErrEsc    = $fErr -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
            $fStackEsc  = ([string]$f.StackTracePreview) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'

            $tcName     = "$fcName - $fuName"
            $tcClass    = "UpdateRunHistory"
            $tcSysOut   = "Cluster: $fcName`nUpdate: $fuName`nUpdate State: Failed`nStatus: $fStatus`nCurrent Step: $fCurStep`nDuration: $fDuration`nTime Started: $fStart`nLast Updated: $fLast`nError Category: $fCategory`nPortal Link: $fPortal"
            if ($f.StackTracePreview) { $tcSysOut += "`nStack Trace Preview: $fStackEsc" }
            $tcSysOut   = $tcSysOut -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'

            $xmlContent += "`n    <testcase name=`"$tcName`" classname=`"$tcClass`" time=`"0`">`n"
            # properties for the ITSM connector dedupe key plus extended context
            # (UpdateRunPortalUrl, ClusterPortalUrl, CurrentStep,
            # Duration, ErrorCategory) so the optional incident-body template
            # rendered by New-AzureLocalIncident can deep-link straight into
            # the SingleInstanceHistoryDetails ReactView for this failed run.
            $fClusterResIdEsc = ([string]$f.ClusterResourceId) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
            $fClusterPortalEsc = if ($f.ClusterResourceId) { "https://portal.azure.com/#@/resource$($f.ClusterResourceId)" -replace '&','&amp;' -replace '"','&quot;' } else { '' }
            $fPortalEsc       = $fPortal -replace '&','&amp;' -replace '"','&quot;'
            $fStatusEsc       = ([string]$f.Status) -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
            $fCurStepAttr     = $fCurStep -replace '"','&quot;'
            $fDurationAttr    = $fDuration -replace '"','&quot;'
            $fCategoryAttr    = $fCategory -replace '"','&quot;'
            $xmlContent += "      <properties>`n"
            $xmlContent += "        <property name=`"ClusterName`" value=`"$fcName`"/>`n"
            $xmlContent += "        <property name=`"ClusterResourceId`" value=`"$fClusterResIdEsc`"/>`n"
            $xmlContent += "        <property name=`"UpdateName`" value=`"$fuName`"/>`n"
            $xmlContent += "        <property name=`"Status`" value=`"Failed`"/>`n"
            $xmlContent += "        <property name=`"UpdateState`" value=`"$fStatusEsc`"/>`n"
            $xmlContent += "        <property name=`"CurrentStep`" value=`"$fCurStepAttr`"/>`n"
            $xmlContent += "        <property name=`"Duration`" value=`"$fDurationAttr`"/>`n"
            $xmlContent += "        <property name=`"ErrorCategory`" value=`"$fCategoryAttr`"/>`n"
            $xmlContent += "        <property name=`"UpdateRunPortalUrl`" value=`"$fPortalEsc`"/>`n"
            $xmlContent += "        <property name=`"ClusterPortalUrl`" value=`"$fClusterPortalEsc`"/>`n"
            $xmlContent += "      </properties>`n"
            $xmlContent += "      <system-out><![CDATA[$tcSysOut]]></system-out>`n"
            $xmlContent += "      <failure message=`"$fcName / $fuName failed at: $fCurStep`" type=`"$fCategory`"><![CDATA[$fErr]]></failure>`n"
            $xmlContent += "    </testcase>`n"
        }

        $xmlContent += "  </testsuite>`n"
        $xmlContent += "</testsuites>`n"
        
        $xmlContent | Out-File $readinessXml -Encoding UTF8
        Write-Host "JUnit XML saved to: $readinessXml" -ForegroundColor Green
        
        # Step 4: Collect additional fleet data using fleet-wide capabilities
        # NOTE: Readiness (Step 2) already fetches summaries and available updates internally.
        # Steps 4a/4b re-export this data in dedicated CSV files for analysis.
        # Use ClusterResourceIds (not ClusterNames) to avoid redundant name-to-ID resolution.
        
        # Build resource ID list for downstream calls (avoids per-cluster name resolution)
        $fleetResourceIds = @()
        if ($scope -eq 'by-update-ring' -and $updateRing) {
            # For tag-based scope, get IDs from readiness results
            $fleetResourceIds = @($readiness | Where-Object { $_.SubscriptionId -and $_.ResourceGroup -and $_.ClusterName } | ForEach-Object {
                "/subscriptions/$($_.SubscriptionId)/resourceGroups/$($_.ResourceGroup)/providers/Microsoft.AzureStackHCI/clusters/$($_.ClusterName)"
            })
        }
        else {
            $fleetResourceIds = @($inventory | Select-Object -ExpandProperty ResourceId)
        }
        
        # Step 4a: Get update summary across fleet
        Write-Host ""
        Write-Host "Step 4a: Collecting fleet update summaries..." -ForegroundColor Yellow
        
        $summaryCsv = Join-Path $outputDir "update-summaries.csv"
        $summaries = Get-AzureLocalUpdateSummary -ClusterResourceIds $fleetResourceIds -ExportPath $summaryCsv -PassThru
        Write-Host "Update summaries collected for $($summaries.Count) cluster(s)" -ForegroundColor Green
        
        # Step 4b: Get available updates across fleet
        Write-Host ""
        Write-Host "Step 4b: Collecting available updates..." -ForegroundColor Yellow
        
        $availableCsv = Join-Path $outputDir "available-updates.csv"
        $available = Get-AzureLocalAvailableUpdates -ClusterResourceIds $fleetResourceIds -ExportPath $availableCsv -PassThru
        Write-Host "Found $($available.Count) available update(s) across fleet" -ForegroundColor Green
        
        # Step 4c: Optionally collect recent update runs using fleet-wide query
        if ($includeRuns) {
            Write-Host ""
            Write-Host "Step 4c: Collecting recent update run history..." -ForegroundColor Yellow
            
            $runsCsv = Join-Path $outputDir "update-runs.csv"
            $allRuns = Get-AzureLocalUpdateRuns -ClusterResourceIds $fleetResourceIds -Latest -ExportPath $runsCsv -PassThru
            Write-Host "Update runs collected for $($allRuns.Count) cluster(s)" -ForegroundColor Green
            
            # Display summary
            $succeeded = @($allRuns | Where-Object { $_.State -eq 'Succeeded' }).Count
            $inProgressRuns = @($allRuns | Where-Object { $_.State -eq 'InProgress' }).Count
            $failedRuns = @($allRuns | Where-Object { $_.State -eq 'Failed' }).Count
            Write-Host "  Succeeded: $succeeded, In Progress: $inProgressRuns, Failed: $failedRuns"
        }
        
        # Step 5: Output summary
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Fleet Status Summary" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Total Clusters: $totalTests"
        Write-Host ""
        Write-Host "Critical Health Status (matches JUnit XML pass/fail):" -ForegroundColor White
        Write-Host "  Passed: $criticalHealthPassed" -ForegroundColor Green
        Write-Host "  Failed: $failures" -ForegroundColor $(if ($failures -gt 0) { 'Red' } else { 'Green' })
        Write-Host ""
        Write-Host "Primary Status (each cluster counted once; rows sum to Total):" -ForegroundColor White
        Write-Host "  Up to Date: $stUpToDate" -ForegroundColor Green
        Write-Host "  Ready for Update: $stReadyForUpdate" -ForegroundColor Cyan
        Write-Host "  Update In Progress: $stInProgress" -ForegroundColor Yellow
        Write-Host "  SBE Prerequisite Blocked: $stSbeBlocked" -ForegroundColor $(if ($stSbeBlocked -gt 0) { 'Yellow' } else { 'Green' })
        Write-Host "  Health Failure: $stHealthFailure" -ForegroundColor $(if ($stHealthFailure -gt 0) { 'Red' } else { 'Green' })
        Write-Host "  Update Failed: $stUpdateFailed" -ForegroundColor $(if ($stUpdateFailed -gt 0) { 'Red' } else { 'Green' })
        Write-Host "  Needs Investigation: $stOther" -ForegroundColor $(if ($stOther -gt 0) { 'Yellow' } else { 'Green' })

        # Set output variables for downstream steps
        echo "TOTAL_CLUSTERS=$totalTests" >> $env:GITHUB_OUTPUT
        echo "CRITICAL_HEALTH_PASSED=$criticalHealthPassed" >> $env:GITHUB_OUTPUT
        echo "CRITICAL_HEALTH_FAILED=$failures" >> $env:GITHUB_OUTPUT
        echo "UP_TO_DATE=$stUpToDate" >> $env:GITHUB_OUTPUT
        echo "IN_PROGRESS=$stInProgress" >> $env:GITHUB_OUTPUT
        echo "READY=$stReadyForUpdate" >> $env:GITHUB_OUTPUT
        echo "SBE_BLOCKED=$stSbeBlocked" >> $env:GITHUB_OUTPUT
        echo "HEALTH_FAILURE=$stHealthFailure" >> $env:GITHUB_OUTPUT
        echo "UPDATE_FAILED=$stUpdateFailed" >> $env:GITHUB_OUTPUT
        echo "NEEDS_INVESTIGATION=$stOther" >> $env:GITHUB_OUTPUT
        echo "FAILURES=$failures" >> $env:GITHUB_OUTPUT
        echo "HAS_PREREQUISITE=$hasPrerequisite" >> $env:GITHUB_OUTPUT
        echo "RUN_HISTORY_COUNT=$runHistoryCount" >> $env:GITHUB_OUTPUT

        # persist version-distribution rows as a base64 JSON blob so
        # the 'Create Status Summary' step can render the markdown table
        # (with SupportStatus) without re-reading the CSV.
        if ($distinctVersions -gt 0) {
            $vTop = $versionDistribution | Select-Object Version, Yymm, SupportStatus, Count, Percentage, Clusters
            $vJson = $vTop | ConvertTo-Json -Depth 3 -Compress
            $vB64  = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($vJson))
            echo "VERSION_DIST_B64=$vB64" >> $env:GITHUB_OUTPUT
            echo "VERSION_DIST_COUNT=$distinctVersions" >> $env:GITHUB_OUTPUT
            echo "SUPPORTED_YYMM_WINDOW=$supportedYymmWindow" >> $env:GITHUB_OUTPUT
            echo "SUPPORTED_CLUSTERS=$supportedCount" >> $env:GITHUB_OUTPUT
            echo "UNSUPPORTED_CLUSTERS=$unsupportedCount" >> $env:GITHUB_OUTPUT
            echo "UNKNOWN_VERSION_CLUSTERS=$unknownVersionCount" >> $env:GITHUB_OUTPUT
            echo "SUPPORT_SOURCE=$supportSource" >> $env:GITHUB_OUTPUT
            echo "LATEST_RELEASED_YYMM=$latestReleasedYymm" >> $env:GITHUB_OUTPUT
            echo "LATEST_RELEASED_VERSION=$latestReleasedVersion" >> $env:GITHUB_OUTPUT
        } else {
            echo "VERSION_DIST_B64=" >> $env:GITHUB_OUTPUT
            echo "VERSION_DIST_COUNT=0" >> $env:GITHUB_OUTPUT
            echo "SUPPORTED_YYMM_WINDOW=" >> $env:GITHUB_OUTPUT
            echo "SUPPORTED_CLUSTERS=0" >> $env:GITHUB_OUTPUT
            echo "UNSUPPORTED_CLUSTERS=0" >> $env:GITHUB_OUTPUT
            echo "UNKNOWN_VERSION_CLUSTERS=0" >> $env:GITHUB_OUTPUT
            echo "SUPPORT_SOURCE=$supportSource" >> $env:GITHUB_OUTPUT
            echo "LATEST_RELEASED_YYMM=$latestReleasedYymm" >> $env:GITHUB_OUTPUT
            echo "LATEST_RELEASED_VERSION=$latestReleasedVersion" >> $env:GITHUB_OUTPUT
        }

        # persist update-run-history rows as a base64 JSON blob so the
        # 'Create Status Summary' step can render the markdown table without
        # re-querying ARG. Truncated to top 25 failures to keep the workflow
        # output env-var size sane.
        # include ClusterPortalUrl so the markdown table can render
        # Cluster Name as a deep link into the Azure portal cluster blade.
        if ($runHistoryCount -gt 0) {
            $top = $runFailures | Select-Object -First 25 ClusterName, ClusterPortalUrl, UpdateName, State, Status, CurrentStep, Duration, StartTime, LastUpdated, DeepestErrMsg, UpdateRunPortalUrl
            $json = $top | ConvertTo-Json -Depth 4 -Compress
            $b64  = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json))
            echo "RUN_HISTORY_B64=$b64" >> $env:GITHUB_OUTPUT
        } else {
            echo "RUN_HISTORY_B64=" >> $env:GITHUB_OUTPUT
        }
        
        # Fail the workflow if there are health failures
        if ($failures -gt 0) {
            Write-Host ""
            Write-Warning " $failures cluster(s) have update failures or health issues!"
            Write-Host "Check the detailed reports for more information."
            # Note: We don't exit 1 here to allow reports to be uploaded
        }
    
    - name: Compute Artifact Timestamp
      if: always()
      id: artifact-stamp
      shell: pwsh
      # every downloadable artifact gets a UTC timestamp suffix so multiple runs on
      # the same day produce distinct zip names (e.g. azlocal-fleet-update-status-report_20260518_143217.zip).
      run: |
        $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd_HHmmss')
        "timestamp=$stamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Artifact timestamp: $stamp"

    - name: Upload Fleet Status Reports
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-fleet-update-status-report_${{ steps.artifact-stamp.outputs.timestamp }}
        path: ./reports/
        retention-days: 90
    
    # Create the markdown summary FIRST so it appears at the top of the
    # GitHub Actions run summary view. The Publish Test Results step (dorny)
    # writes its testsuite expansion AFTER, and is configured below to only
    # render failed suites/tests so large fleets (200+ clusters) do not
    # produce a noisy expanded section.
    - name: Create Status Summary
      if: always()
      shell: pwsh
      run: |
        $total = "${{ steps.fleet-status.outputs.TOTAL_CLUSTERS }}"
        $chPassed = "${{ steps.fleet-status.outputs.CRITICAL_HEALTH_PASSED }}"
        $chFailed = "${{ steps.fleet-status.outputs.CRITICAL_HEALTH_FAILED }}"
        $upToDate = "${{ steps.fleet-status.outputs.UP_TO_DATE }}"
        $inProgress = "${{ steps.fleet-status.outputs.IN_PROGRESS }}"
        $ready = "${{ steps.fleet-status.outputs.READY }}"
        $sbeBlocked = "${{ steps.fleet-status.outputs.SBE_BLOCKED }}"
        $healthFailure = "${{ steps.fleet-status.outputs.HEALTH_FAILURE }}"
        $updateFailed = "${{ steps.fleet-status.outputs.UPDATE_FAILED }}"
        $needsInvestigation = "${{ steps.fleet-status.outputs.NEEDS_INVESTIGATION }}"
        $hasPrerequisite = "${{ steps.fleet-status.outputs.HAS_PREREQUISITE }}"
        $versionDistB64    = "${{ steps.fleet-status.outputs.VERSION_DIST_B64 }}"
        $versionDistCount  = "${{ steps.fleet-status.outputs.VERSION_DIST_COUNT }}"
        $supportedYymmWin  = "${{ steps.fleet-status.outputs.SUPPORTED_YYMM_WINDOW }}"
        $supportedClusters = "${{ steps.fleet-status.outputs.SUPPORTED_CLUSTERS }}"
        $unsupportedClusters = "${{ steps.fleet-status.outputs.UNSUPPORTED_CLUSTERS }}"
        $unknownVersionClusters = "${{ steps.fleet-status.outputs.UNKNOWN_VERSION_CLUSTERS }}"
        $supportSource     = "${{ steps.fleet-status.outputs.SUPPORT_SOURCE }}"
        $latestReleasedYymm    = "${{ steps.fleet-status.outputs.LATEST_RELEASED_YYMM }}"
        $latestReleasedVersion = "${{ steps.fleet-status.outputs.LATEST_RELEASED_VERSION }}"
        $generatedUtc = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss UTC')

        # Render the Overall Fleet Update Status (Version Distribution)
        # table FIRST so it leads the summary, matching the position of the
        # 'Fleet Version Distribution' testsuite at the top of the JUnit XML.
        $versionSection = ''
        if ($versionDistCount -and [int]$versionDistCount -gt 0 -and $versionDistB64) {
            try {
                $vRows = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($versionDistB64)) | ConvertFrom-Json
                $versionSection += "### Overall Fleet Update Status (Version Distribution)`n`n"
                $versionSection += "_One row per distinct ``CurrentVersion`` reported by ``Get-AzureLocalClusterUpdateReadiness``. Sorted by cluster count (descending). Percentage is share of the $total cluster(s) in scope._`n`n"
                if ($supportSource -eq 'Microsoft manifest' -and $latestReleasedYymm) {
                    $versionSection += "_``SupportStatus`` uses the **rolling 6-month YYMM window anchored on the Microsoft public catalog** ([aka.ms/AzureEdgeUpdates](https://aka.ms/AzureEdgeUpdates)). Latest released YYMM = **$latestReleasedYymm** (``$latestReleasedVersion``); supported window = ``$supportedYymmWin``. As soon as Microsoft publishes a release with a newer YYMM, the window slides forward and the oldest in-window YYMM falls out._`n`n"
                    $versionSection += "_**Supported** = cluster's YYMM is inside the manifest-anchored window; **Unsupported** = older YYMM; **Unknown** = ``CurrentVersion`` empty or not in ``<prefix>.YYMM.X.X`` form. Always cross-check against the [Azure Local lifecycle cadence](https://learn.microsoft.com/azure/azure-local/update/about-updates-23h2#lifecycle-cadence) and the [Azure Local release information](https://learn.microsoft.com/azure/azure-local/release-information-23h2#about-azure-local-releases) before taking action._`n`n"
                } else {
                    $versionSection += "_``SupportStatus`` falls back to a **fleet-observed heuristic** (aka.ms/AzureEdgeUpdates was unreachable from the runner). **Supported** = YYMM is in the top-6 most-recent distinct YYMM values observed across the fleet (``$supportedYymmWin``); **Unsupported** = older YYMM; **Unknown** = ``CurrentVersion`` empty or not in ``<prefix>.YYMM.X.X`` form. Always cross-check against the [Azure Local lifecycle cadence](https://learn.microsoft.com/azure/azure-local/update/about-updates-23h2#lifecycle-cadence) and the [Azure Local release information](https://learn.microsoft.com/azure/azure-local/release-information-23h2#about-azure-local-releases) before taking action._`n`n"
                }
                $versionSection += "| Version | YYMM | Support | Cluster Count | Percentage | Clusters |`n"
                $versionSection += "|---------|------|---------|---------------|------------|----------|`n"
                foreach ($vr in @($vRows)) {
                    $supportEmoji = switch ($vr.SupportStatus) {
                        'Supported'   { '✅ Supported' }
                        'Unsupported' { '⚠️ Unsupported' }
                        default       { '❓ Unknown' }
                    }
                    $clCell = [string]$vr.Clusters
                    if ($clCell.Length -gt 250) { $clCell = $clCell.Substring(0,250) + ' ...' }
                    $clCell = $clCell -replace '\|','\|'
                    $versionSection += ('| {0} | {1} | {2} | {3} | {4}% | {5} |' -f $vr.Version, $vr.Yymm, $supportEmoji, $vr.Count, $vr.Percentage, $clCell) + "`n"
                }
                $versionSection += "`n_Support roll-up: Supported = $supportedClusters cluster(s), Unsupported = $unsupportedClusters, Unknown = $unknownVersionClusters. Anchor source: ``$supportSource``._`n`n"
            } catch {
                Write-Warning "Failed to render Fleet Version Distribution markdown table: $($_.Exception.Message)"
                $versionSection = ''
            }
        }

        $summary = @"
        ## Fleet Update Status Summary  _(generated $generatedUtc)_

        $versionSection
        ### Critical Health Status (matches JUnit XML pass/fail)

        | Metric | Count | Status |
        |--------|-------|--------|
        | **Passed** (healthy, no failures, not SBE-blocked) | $chPassed | ✅ |
        | **Failed** (HealthState=Failure OR UpdateState=Failed OR SBE prerequisite blocked) | $chFailed | $(if ([int]$chFailed -gt 0) { '❌' } else { '✅' }) |

        ### Primary Status (each cluster counted once; rows sum to Total Clusters)

        | Metric | Count | Status |
        |--------|-------|--------|
        | **Total Clusters** | $total | ℹ️ |
        | **Up to Date** | $upToDate | ✅ |
        | **Ready for Update** | $ready | 🟢 |
        | **Update In Progress** | $inProgress | 🔄 |
        | **SBE Prerequisite Blocked** | $sbeBlocked | $(if ([int]$sbeBlocked -gt 0) { '🟡' } else { '✅' }) |
        | **Health Failure** (HealthState=Failure) | $healthFailure | $(if ([int]$healthFailure -gt 0) { '❌' } else { '✅' }) |
        | **Update Failed** (UpdateState=Failed) | $updateFailed | $(if ([int]$updateFailed -gt 0) { '❌' } else { '✅' }) |
        | **Needs Investigation** | $needsInvestigation | $(if ([int]$needsInvestigation -gt 0) { '⚠️' } else { '✅' }) |

        Priority cascade used to bucket each cluster exactly once:
        Update Failed > Health Failure > SBE Prerequisite Blocked > Update In Progress > Ready for Update > Up to Date > Needs Investigation.
        "@

        # Actions Required section
        $actions = @()
        if ([int]$updateFailed -gt 0) { $actions += "- **$updateFailed cluster(s) have UpdateState=Failed** - Review the most recent update run in Azure Portal and the ``update-runs.csv`` artifact for the failure detail." }
        if ([int]$healthFailure -gt 0) { $actions += "- **$healthFailure cluster(s) have HealthState=Failure** - Resolve critical health check issues in Azure Portal before retrying any updates." }
        if ([int]$hasPrerequisite -gt 0) { $actions += "- **$hasPrerequisite cluster(s) blocked by SBE prerequisite** - Install the required Solution Builder Extension (SBE) update from the hardware vendor. See ``available-updates.csv`` for vendor details (Publisher, Family)." }

        if ($actions.Count -gt 0) {
            $summary += "`n`n### Actions Required`n`n"
            $summary += ($actions -join "`n")
        }

        # '📜 Update Run History and Error Details' markdown table
        # provides an ARG-first fleet-scale view of recent unresolved failures. Rendered only when
        # there are unresolved failed runs to surface. Uses the base64 JSON
        # passed forward from the fleet-status step output so we don't re-query.
        # Cluster Name renders as a portal hyperlink (per-row
        # ClusterPortalUrl from ARG) so the operator can jump straight to the
        # cluster blade. Verbose Error Details renders inside an inline
        # <details><summary>...</summary>...</details> block so the full
        # parser/orchestrator stack is preserved (no 250-char truncation) but
        # the table stays scannable - rows expand on click. HTML-special chars
        # in the error text are escaped to keep the renderer honest.
        $runHistoryCount = "${{ steps.fleet-status.outputs.RUN_HISTORY_COUNT }}"
        $runHistoryB64   = "${{ steps.fleet-status.outputs.RUN_HISTORY_B64 }}"
        if ($runHistoryCount -and ([int]$runHistoryCount) -gt 0 -and $runHistoryB64) {
            try {
                $rows = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($runHistoryB64)) | ConvertFrom-Json
                $summary += "`n`n### 📜 Update Run History and Error Details`n`n"
                $summary += "_ARG-first, fleet-scale failure-detail view. Shows up to 25 most recent unresolved Failed update runs (last 30 days). Source cmdlet: ``Get-AzureLocalUpdateRunFailures -State Failed -OnlyUnresolved``._`n`n"
                $summary += "| Cluster Name | Update Name | Update State | Status | Current Step | Verbose Error Details | Duration | Time Started | Last Updated |`n"
                $summary += "|---|---|---|---|---|---|---|---|---|`n"
                foreach ($r in @($rows)) {
                    $errCell = if ($r.DeepestErrMsg) {
                        $e = [string]$r.DeepestErrMsg
                        # HTML-encode so '<', '>', '&' in stack traces don't get
                        # parsed as tags by the renderer; escape pipes so the
                        # table row stays intact; collapse newlines to <br> so
                        # multi-line stack traces remain readable inside the
                        # collapsible block.
                        $e = $e -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;'
                        $e = $e -replace "`r`n",'<br>' -replace "`n",'<br>' -replace '\|','\|'
                        '<details><summary>Show error</summary><br><code>' + $e + '</code></details>'
                    } else { '_(none)_' }
                    $clusterCell = if ($r.ClusterPortalUrl) { "[$($r.ClusterName)]($($r.ClusterPortalUrl))" } else { $r.ClusterName }
                    $updCell = if ($r.UpdateRunPortalUrl) { "[$($r.UpdateName)]($($r.UpdateRunPortalUrl))" } else { $r.UpdateName }
                    $summary += "| $clusterCell | $updCell | $($r.State) | $($r.Status) | $($r.CurrentStep) | $errCell | $($r.Duration) | $($r.StartTime) | $($r.LastUpdated) |`n"
                }
            } catch {
                Write-Warning "Failed to render Update Run History markdown table: $($_.Exception.Message)"
            }
        }

        $summary += @"

        ### Reports Available
        - ``readiness-status.csv`` - Detailed cluster status for spreadsheet analysis
        - ``readiness-status.json`` - Machine-readable format for integrations
        - ``readiness-status.xml`` - JUnit XML for CI/CD visualization (now includes the '📜 Update Run History and Error Details' suite)
        - ``cluster-inventory.csv`` - Full cluster inventory
        - ``update-summaries.csv`` - Fleet-wide update state summaries
        - ``available-updates.csv`` - All available updates across fleet
        - ``update-runs.csv`` - Recent update run history (if enabled)
        - ``update-run-history.csv`` - Verbose error details for unresolved Failed update runs (ARG-first, fleet-scale)
        - ``update-run-history.json`` - Same as above in JSON form for integrations

        *Generated at $(Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")*
        "@

        $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

    # Publish JUnit test results AFTER the markdown summary so the "Fleet
    # Update Status Summary" tables are the first thing visible on the run
    # page. dorny renders its testsuite expansion below; list-suites and
    # list-tests are set to "failed" so the expansion stays compact even
    # for fleets with 200+ clusters (only failing rows are shown).
    - name: Publish Test Results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Fleet Update Status Report
        path: ./reports/readiness-status.xml
        reporter: java-junit
        fail-on-error: false  # Don't fail the action on test failures
        list-suites: failed    # collapse passing suites (compact view for large fleets)
        list-tests: failed     # within failed suites, only render failed tests

    # ----------------------------------------------------------------------
    # ITSM Connector (ServiceNow auto-raise on fleet failures)
    #
    # Fully opt-in (gated on inputs.raise_itsm_ticket == 'true'). Runs AFTER
    # the JUnit file is uploaded + test results published, so a) failing
    # clusters are already surfaced via dorny/test-reporter and the run
    # summary, and b) the ITSM action is strictly additive - failures here
    # never affect the fleet-update-status exit code.
    #
    # Reads the same readiness-status.xml that powers the run summary. The
    # JUnit emitter writes per-testcase <properties> (ClusterName /
    # ClusterResourceId / UpdateName / Status / ErrorCategory /
    # CurrentStep / Duration / UpdateRunPortalUrl / ClusterPortalUrl) so
    # New-AzureLocalIncident can compute the SHA256 dedupe key and the
    # Mustache body template can deep-link straight into the Azure portal
    # SingleInstanceHistoryDetails ReactView for the failed update run.
    # ----------------------------------------------------------------------
    - name: Install powershell-yaml (ITSM config parser)
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      shell: pwsh
      run: |
        if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
            Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber
        }

    - name: Raise ITSM tickets
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      shell: pwsh
      id: itsm
      env:
        # BEGIN-AZLOCAL-CUSTOMIZE:itsm-secrets
        # Bind your ITSM connector secrets here. Defaults match the
        # ServiceNow OAuth client_credentials naming used by azurelocal-itsm.yml.
        # Preserved by Update-AzureLocalPipelineExample across module upgrades.
        ITSM_SN_INSTANCE_URL: ${{ secrets.ITSM_SN_INSTANCE_URL }}
        ITSM_SN_CLIENT_ID:    ${{ secrets.ITSM_SN_CLIENT_ID }}
        ITSM_SN_CLIENT_SECRET: ${{ secrets.ITSM_SN_CLIENT_SECRET }}
        # END-AZLOCAL-CUSTOMIZE:itsm-secrets
        INPUT_ITSM_CONFIG_PATH:  ${{ github.event.inputs.itsm_config_path }}
        INPUT_ITSM_DRY_RUN:      ${{ github.event.inputs.itsm_dry_run }}
        INPUT_ITSM_FORCE_CREATE: ${{ github.event.inputs.itsm_force_create }}
      run: |
        Import-Module AzLocal.UpdateManagement -Force

        $configPath = $env:INPUT_ITSM_CONFIG_PATH
        $dryRun     = $env:INPUT_ITSM_DRY_RUN -eq 'true'
        $force      = $env:INPUT_ITSM_FORCE_CREATE -eq 'true'

        if (-not (Test-Path $configPath)) {
            Write-Host "::warning::ITSM config not found at '$configPath' - skipping ticket creation."
            exit 0
        }

        $cfg = Get-AzureLocalItsmConfig -Path $configPath

        $junitInput = './reports/readiness-status.xml'
        if (-not (Test-Path $junitInput)) {
            Write-Host "::warning::No readiness-status.xml found at '$junitInput' - skipping ticket creation."
            exit 0
        }

        $params = @{
            InputArtifactPath = $junitInput
            Config            = $cfg
            RunMetadata       = @{
                Platform = 'github'
                RunId    = $env:GITHUB_RUN_ID
                RunUrl   = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
                Branch   = $env:GITHUB_REF
            }
            DryRun            = $dryRun
            ForceCreate       = $force
            ExportPath        = './reports/itsm-results.csv'
            ExportJUnitPath   = './reports/itsm-results.xml'
        }

        $results = New-AzureLocalIncident @params
        $results | Format-Table ClusterName, Action, TicketId, Severity -AutoSize

    - name: Upload ITSM Artefacts
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: azlocal-fleet-update-status-itsm-results_${{ steps.artifact-stamp.outputs.timestamp }}
        path: ./reports/itsm-*.*
        retention-days: 30
      continue-on-error: true

    - name: Publish ITSM Test Results
      if: ${{ github.event.inputs.raise_itsm_ticket == 'true' }}
      uses: dorny/test-reporter@v3
      with:
        name: ITSM Tickets (Step.6)
        path: ./reports/itsm-results.xml
        reporter: java-junit
      continue-on-error: true
