# Deploy Azure Local Clusters
# This workflow reads a CSV file from source control and submits ARM Deploy
# requests for eligible clusters that passed validation.
#
# IMPORTANT: This workflow performs ACTUAL deployments. Ensure clusters have
# been validated successfully using the 'Validate Deployments' workflow first.
#
# AUTHENTICATION:
# Uses OpenID Connect (OIDC) - recommended for secretless authentication.
# See: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
#
# PREREQUISITES:
# 1. Azure App Registration with OIDC federated credentials
# 2. RBAC: Azure Stack HCI Administrator + Key Vault Secrets User
#    (plus */register/action if resource providers are not pre-registered — see README)
# 3. Successful validation pass completed via validate-deployments.yml
# 4. Credentials stored in Azure Key Vault (referenced in CSV)

name: Deploy Clusters

on:
  workflow_dispatch:
    inputs:
      csv_file_path:
        description: 'Path to cluster deployments CSV file'
        required: true
        default: 'AzLocal.DeploymentAutomation/automation-pipelines/cluster-deployments.csv'
      require_validation:
        description: 'Require successful validation before deploying'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  MODULE_PATH: './AzLocal.DeploymentAutomation'

jobs:
  deploy-clusters:
    name: Deploy Clusters
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      checks: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # OPTION 1: OpenID Connect (OIDC) - RECOMMENDED
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # OPTION 2: Client Secret - LEGACY (uncomment if OIDC not available)
    # - name: Azure Login (Client Secret)
    #   uses: azure/login@v2
    #   with:
    #     creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Install Az PowerShell Modules
      shell: pwsh
      run: |
        Install-Module Az.Accounts -Force -AllowClobber -Scope CurrentUser
        Install-Module Az.Resources -Force -AllowClobber -Scope CurrentUser
        Install-Module Az.KeyVault -Force -AllowClobber -Scope CurrentUser

    - name: Check Validation Status
      if: ${{ github.event.inputs.require_validation == 'true' }}
      shell: pwsh
      run: |
        Import-Module "${{ env.MODULE_PATH }}/AzLocal.DeploymentAutomation.psd1" -Force

        $csvPath = "${{ github.event.inputs.csv_file_path }}"

        if (-not (Test-Path $csvPath)) {
            Write-Error "CSV file not found: $csvPath"
            exit 1
        }

        $outputDir = "./reports"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Checking Validation Status" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        $statusResults = Get-AzLocalDeploymentStatus `
            -CsvFilePath $csvPath `
            -JUnitOutputPath (Join-Path $outputDir "pre-deploy-status.xml")

        # Check if any clusters have failed validation
        $failedValidation = @($statusResults | Where-Object { $_.Status -eq 'Failed' -and $_.TestName -like '*Validate*' })

        if ($failedValidation.Count -gt 0) {
            Write-Host "##[error]$($failedValidation.Count) cluster(s) have failed validation. Run the Validate workflow first."
            foreach ($fail in $failedValidation) {
                Write-Host "  - $($fail.TestName): $($fail.Message)" -ForegroundColor Red
            }
            exit 1
        }

        Write-Host "Validation status check passed." -ForegroundColor Green

    - name: Deploy Clusters
      shell: pwsh
      id: deploy
      run: |
        Import-Module "${{ env.MODULE_PATH }}/AzLocal.DeploymentAutomation.psd1" -Force

        $csvPath = "${{ github.event.inputs.csv_file_path }}"
        $outputDir = "./reports"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        $junitPath = Join-Path $outputDir "deploy-results.xml"
        $logPath = Join-Path $outputDir "deploy.log"

        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Deploying Clusters" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        $results = Start-AzLocalCsvDeployment `
            -CsvFilePath $csvPath `
            -DeploymentMode 'Deploy' `
            -JUnitOutputPath $junitPath `
            -LogFilePath $logPath `
            -Confirm:$false

        $passed = @($results | Where-Object { $_.Status -eq 'Passed' }).Count
        $failed = @($results | Where-Object { $_.Status -eq 'Failed' }).Count
        $skipped = @($results | Where-Object { $_.Status -eq 'Skipped' }).Count

        echo "PASSED=$passed" >> $env:GITHUB_OUTPUT
        echo "FAILED=$failed" >> $env:GITHUB_OUTPUT
        echo "SKIPPED=$skipped" >> $env:GITHUB_OUTPUT

        if ($failed -gt 0) {
            Write-Host "##[error]$failed cluster(s) failed to deploy."
        }

    - name: Upload Deploy Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: deploy-reports
        path: ./reports/
        retention-days: 30

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Deployment Results
        path: ./reports/deploy-results.xml
        reporter: java-junit
        fail-on-error: true

    - name: Summary
      if: always()
      shell: pwsh
      run: |
        $passed = "${{ steps.deploy.outputs.PASSED }}"
        $failed = "${{ steps.deploy.outputs.FAILED }}"
        $skipped = "${{ steps.deploy.outputs.SKIPPED }}"

        @"
        ## Deployment Summary

        | Metric | Count |
        |--------|-------|
        | Deployments Submitted | $passed |
        | Deployments Failed | $failed |
        | Skipped | $skipped |

        > **Note:** Deployment submission means the ARM deployment request was accepted.
        > Use the **Deployment Monitor** workflow to track ongoing progress.
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
