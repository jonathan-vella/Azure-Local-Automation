# Validate Azure Local Cluster Deployments
# This workflow reads a CSV file from source control, runs pre-flight checks,
# and submits ARM Validate deployments for eligible clusters.
#
# AUTHENTICATION:
# Uses OpenID Connect (OIDC) - recommended for secretless authentication.
# See: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
#
# PREREQUISITES:
# 1. Azure App Registration with OIDC federated credentials
# 2. RBAC: Azure Stack HCI Administrator + Key Vault Secrets User
#    (plus */register/action if resource providers are not pre-registered — see README)
# 3. All physical nodes registered with Azure Arc in expected resource groups
# 4. Credentials stored in Azure Key Vault (referenced in CSV)
# 5. Required resource providers registered (auto-registered during pre-flight if identity has permissions)

name: Validate Deployments

on:
  workflow_dispatch:
    inputs:
      csv_file_path:
        description: 'Path to cluster deployments CSV file'
        required: true
        default: 'AzLocal.DeploymentAutomation/automation-pipelines/cluster-deployments.csv'
      dry_run:
        description: 'Preview which clusters would be validated (WhatIf mode)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  MODULE_PATH: './AzLocal.DeploymentAutomation'

jobs:
  preflight-checks:
    name: Pre-Flight Checks
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      checks: write
    outputs:
      eligible_count: ${{ steps.preflight.outputs.ELIGIBLE_COUNT }}
      total_count: ${{ steps.preflight.outputs.TOTAL_COUNT }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # OPTION 1: OpenID Connect (OIDC) - RECOMMENDED
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # OPTION 2: Client Secret - LEGACY (uncomment if OIDC not available)
    # - name: Azure Login (Client Secret)
    #   uses: azure/login@v2
    #   with:
    #     creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Install Az PowerShell Modules
      shell: pwsh
      run: |
        Install-Module Az.Accounts -Force -AllowClobber -Scope CurrentUser
        Install-Module Az.Resources -Force -AllowClobber -Scope CurrentUser
        Install-Module Az.KeyVault -Force -AllowClobber -Scope CurrentUser

    - name: Run Pre-Flight Checks
      shell: pwsh
      id: preflight
      run: |
        Import-Module "${{ env.MODULE_PATH }}/AzLocal.DeploymentAutomation.psd1" -Force

        $csvPath = "${{ github.event.inputs.csv_file_path }}"

        if (-not (Test-Path $csvPath)) {
            Write-Error "CSV file not found: $csvPath"
            exit 1
        }

        # Create output directory
        $outputDir = "./reports"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        $junitPath = Join-Path $outputDir "preflight-results.xml"
        $logPath = Join-Path $outputDir "preflight.log"

        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Pre-Flight Checks" -ForegroundColor Cyan
        Write-Host "CSV File: $csvPath" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        # Import CSV to get count
        $csvData = Import-Csv $csvPath
        $readyCount = @($csvData | Where-Object { $_.ReadyToDeploy -eq 'TRUE' -or $_.ReadyToDeploy -eq 'true' -or $_.ReadyToDeploy -eq 'True' }).Count
        $totalCount = $csvData.Count

        Write-Host "Total clusters in CSV: $totalCount"
        Write-Host "Clusters with ReadyToDeploy=TRUE: $readyCount"

        # Run pre-flight via the module (validate-only pass)
        $dryRun = "${{ github.event.inputs.dry_run }}" -eq "true"

        $params = @{
            CsvFilePath     = $csvPath
            DeploymentMode  = 'Validate'
            JUnitOutputPath = $junitPath
            LogFilePath     = $logPath
            WhatIf          = $dryRun
            Confirm         = $false
        }

        # For pre-flight only, we just want the pre-flight results without actually deploying
        # We use -WhatIf to prevent actual ARM deployment while still running pre-flight checks
        $results = Start-AzLocalCsvDeployment @params

        $eligible = @($results | Where-Object { $_.Status -eq 'Passed' -or $_.Status -eq 'Skipped' }).Count

        echo "ELIGIBLE_COUNT=$eligible" >> $env:GITHUB_OUTPUT
        echo "TOTAL_COUNT=$readyCount" >> $env:GITHUB_OUTPUT

    - name: Upload Pre-Flight Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: preflight-reports
        path: ./reports/
        retention-days: 30

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Pre-Flight Check Results
        path: ./reports/preflight-results.xml
        reporter: java-junit
        fail-on-error: true

  validate-deployments:
    name: ARM Validate
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      checks: write
    needs: preflight-checks
    if: ${{ needs.preflight-checks.outputs.eligible_count > 0 && github.event.inputs.dry_run != 'true' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Install Az PowerShell Modules
      shell: pwsh
      run: |
        Install-Module Az.Accounts -Force -AllowClobber -Scope CurrentUser
        Install-Module Az.Resources -Force -AllowClobber -Scope CurrentUser
        Install-Module Az.KeyVault -Force -AllowClobber -Scope CurrentUser

    - name: Run ARM Validate
      shell: pwsh
      id: validate
      run: |
        Import-Module "${{ env.MODULE_PATH }}/AzLocal.DeploymentAutomation.psd1" -Force

        $csvPath = "${{ github.event.inputs.csv_file_path }}"
        $outputDir = "./reports"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        $junitPath = Join-Path $outputDir "validate-results.xml"
        $logPath = Join-Path $outputDir "validate.log"

        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "ARM Validate Deployments" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan

        $results = Start-AzLocalCsvDeployment `
            -CsvFilePath $csvPath `
            -DeploymentMode 'Validate' `
            -JUnitOutputPath $junitPath `
            -LogFilePath $logPath `
            -Confirm:$false

        $passed = @($results | Where-Object { $_.Status -eq 'Passed' }).Count
        $failed = @($results | Where-Object { $_.Status -eq 'Failed' }).Count
        $skipped = @($results | Where-Object { $_.Status -eq 'Skipped' }).Count

        echo "PASSED=$passed" >> $env:GITHUB_OUTPUT
        echo "FAILED=$failed" >> $env:GITHUB_OUTPUT
        echo "SKIPPED=$skipped" >> $env:GITHUB_OUTPUT

        if ($failed -gt 0) {
            Write-Host "##[error]$failed cluster(s) failed validation."
        }

    - name: Upload Validate Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validate-reports
        path: ./reports/
        retention-days: 30

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Validation Results
        path: ./reports/validate-results.xml
        reporter: java-junit
        fail-on-error: true

    - name: Summary
      if: always()
      shell: pwsh
      run: |
        $passed = "${{ steps.validate.outputs.PASSED }}"
        $failed = "${{ steps.validate.outputs.FAILED }}"
        $skipped = "${{ steps.validate.outputs.SKIPPED }}"
        $total = "${{ needs.preflight-checks.outputs.TOTAL_COUNT }}"

        @"
        ## Validation Summary

        | Metric | Count |
        |--------|-------|
        | Total ReadyToDeploy | $total |
        | Validation Passed | $passed |
        | Validation Failed | $failed |
        | Skipped | $skipped |
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

  no-eligible-clusters:
    name: No Eligible Clusters
    runs-on: windows-latest
    needs: preflight-checks
    if: ${{ needs.preflight-checks.outputs.eligible_count == 0 }}

    steps:
    - name: Report
      shell: pwsh
      run: |
        $total = "${{ needs.preflight-checks.outputs.TOTAL_COUNT }}"
        @"
        ## No Eligible Clusters

        Found $total cluster(s) with ReadyToDeploy=TRUE, but none passed pre-flight checks.

        **Possible reasons:**
        - Resource groups do not exist
        - Arc nodes are not registered
        - Resource name validation failed
        - Deployments already in-progress

        Download the pre-flight report artifact for details.
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

        Write-Warning "No clusters eligible for validation."
